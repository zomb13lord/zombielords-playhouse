<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roulette Tracker V69.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --accent: #00ff88;
            --red: #ef4444; --black: #000; --green: #2e7d32;
            --blue: #3b82f6; --yellow: #fbbf24;
            --wait: #ffcc00; --text: #e0e0e0;
        }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        
        .lobby-nav {
            background: rgba(2, 6, 23, 0.9); border-bottom: 1px solid rgba(16, 185, 129, 0.3);
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }
        .lobby-nav .brand { font-family: 'Cinzel', serif; color: var(--accent); font-size: 0.8em; text-transform: uppercase; letter-spacing: 2px; font-weight: 900; }
        .lobby-nav a { font-family: 'Cinzel', serif; color: #fff; text-decoration: none; font-size: 0.7em; font-weight: 700; border: 1px solid var(--accent); padding: 5px 12px; border-radius: 2px; text-transform: uppercase; }

        #config-page { padding: 20px; max-width: 500px; margin: 0 auto; }
        .config-grid { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #444; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full { grid-column: span 2; }
        label { font-size: 0.6em; color: #888; font-weight: bold; display: block; margin-bottom: 2px; text-transform: uppercase; }
        select, input { width: 100%; padding: 8px; background: #000; border: 1px solid #555; color: #fff; border-radius: 6px; font-size: 0.9em; }
        .btn-start { width: 100%; padding: 18px; background: var(--green); color: #fff; border: none; border-radius: 8px; font-weight: bold; margin-top: 15px; cursor: pointer; }

        #tracker-page { display: none; }
        .frozen-top { position: sticky; top: 0; background: var(--bg); z-index: 100; padding: 10px; border-bottom: 3px solid #444; }
        .status-box { padding: 10px; border-radius: 8px; text-align: center; min-height: 120px; display: flex; flex-direction: column; justify-content: center; font-weight: bold; border: 2px solid #444; }
        .status-wait { background: #222; color: var(--wait); }
        .status-ready { background: #000; color: #fff; border-color: var(--accent); }
        
        .cmd-card { display: flex; flex-direction: column; border-radius: 6px; border: 2px solid #fff; overflow: hidden; margin-top: 10px; }
        .cmd-head { font-size: 0.7em; padding: 4px; text-transform: uppercase; font-weight: 900; }
        .cmd-body { font-size: 1.1em; padding: 8px; font-weight: 900; background: rgba(0,0,0,0.6); }
        .mode-avoid { background: #800; }
        .mode-place { background: #052; }

        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin: 10px 0; }
        .stat-card { background: #000; padding: 8px 2px; border-radius: 6px; text-align: center; border: 1px solid #333; }
        .val { font-weight: bold; color: var(--accent); font-size: 0.95em; }

        .history-feed { display: flex; gap: 8px; justify-content: center; margin-top: 8px; min-height: 38px; overflow: hidden; }
        .chip { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.85em; border: 2px solid rgba(255,255,255,0.2); color: #fff; flex-shrink: 0; }

        .num-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-width: 400px; margin: 0 auto; margin-top: 15px; }
        .zero-container { grid-column: span 3; width: 100%; display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
        .zero-row { display: grid; grid-template-columns: 1fr; gap: 8px; width: 100%; }
        .zero-row.double { grid-template-columns: 1fr 1fr; }
        
        .num-btn { padding: 18px 0; border: 2px solid #444; border-radius: 6px; color: #fff !important; font-weight: bold; font-size: 1.4em; cursor: pointer; text-align: center; transition: all 0.2s; width: 100%; }
        .btn-green { background: var(--green) !important; } .btn-red { background: var(--red) !important; } .btn-black { background: var(--black) !important; }
        .glow-red { border-color: #fff !important; box-shadow: inset 0 0 20px #ff0000, 0 0 10px #ff0000; transform: scale(0.98); }
        .glow-green { border-color: #fff !important; box-shadow: inset 0 0 20px #00ff00, 0 0 10px #00ff00; transform: scale(1.02); }
        
        .audit-table { width: 100%; border-collapse: collapse; font-size: 0.8em; margin-top: 10px; background: var(--card); border-radius: 8px; }
        .audit-table td { padding: 10px 5px; border-bottom: 1px solid #333; text-align: center; }
        .table-header { font-size: 0.65em; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-top: 20px; font-weight: bold; padding-left: 5px; }
        .heat-bg { background: #000; width: 85%; height: 6px; border-radius: 4px; margin: 4px auto; border: 1px solid #444; overflow: hidden; }
        .heat-fill { height: 100%; transition: width 0.4s; }
    </style>
</head>
<body>

<nav class="lobby-nav">
    <div class="brand">Zombie Lord's</div>
    <a href="lobby.html">Return to Playhouse</a>
</nav>

<div id="config-page">
    <div class="config-grid">
        <h2 class="full" style="margin:0; color:var(--accent);">Logic Engine V69.5</h2>
        <div class="full"><label>Wheel Type</label><select id="wheel-type"><option value="EU" selected>European</option><option value="US">American</option><option value="TZ">Triple Zero</option></select></div>
        <div><label>Domain</label><select id="dom-sel" onchange="toggleSuInput()"><option value="9ST" selected>9 Streets</option><option value="SU">Straight Up</option></select></div>
        <div id="su-config" style="display:none;"><label>Total Bet Count</label><input type="number" id="su-total" value="28"></div>
        <div class="full"><label>Terminal Mode</label><select id="view-mode"><option value="AVOID" selected>AVOID</option><option value="PLACE">PLACE</option></select></div>
        <div class="full"><label>Lookback Window</label><select id="mult-in"><option value="1">Short</option><option value="2">Standard</option><option value="3" selected>Long</option><option value="ALL">ALL</option></select></div>
        <div class="compact-toggles full">
            <div style="display:flex; gap:8px;">
                <div class="toggle-box" style="flex:1">HEDGE <input type="checkbox" id="basket-toggle" checked></div>
                <div class="toggle-box" style="flex:1">PERM HEDGE <input type="checkbox" id="perm-hedge" checked></div>
                <div class="toggle-box" style="flex:1">PUSH (1:1) <input type="checkbox" id="push-toggle"></div>
            </div>
        </div>
        <div><label>Unit ($)</label><input type="number" id="unit-cash" value="1"></div>
        <div><label>Warmup</label><input type="number" id="warm-in" value="16"></div>
        <div><label>CD Loss Streak</label><input type="number" id="cd-trigger" value="2"></div>
        <div><label>CD Wait</label><input type="number" id="cool-in" value="4"></div>
        <div class="full"><label>Stabilization</label><input type="number" id="stab-in" value="3"></div>
    </div>
    <button class="btn-start" id="final-start">START SESSION</button>
</div>

<div id="tracker-page">
    <div class="frozen-top">
        <div id="status-box" class="status-box status-wait"><div id="status-txt">WARMING UP</div><div id="sig-box"></div></div>
        <div class="stat-grid">
            <div class="stat-card"><small>PROFIT</small><span id="stat-p" class="val">$0</span></div>
            <div class="stat-card"><small>HIGH</small><span id="stat-h" class="val">$0</span></div>
            <div class="stat-card"><small>BET</small><span id="stat-b" class="val">$0</span></div>
            <div class="stat-card"><small>ROLLS</small><span id="stat-rolls" class="val">0</span></div>
        </div>
        <div id="feed" class="history-feed"></div>
    </div>
    <div style="padding:15px;">
        <div id="pad" class="num-pad"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;">
            <button id="final-undo" style="background:#444; color:#fff; padding:15px; border:none; border-radius:6px; font-weight:bold;">UNDO</button>
            <button onclick="window.location.reload()" style="background:#800; color:#fff; padding:15px; border:none; border-radius:6px; font-weight:bold;">RESET</button>
        </div>

        <div id="primary-audit-label" class="table-header">Domain Audit</div>
        <table class="audit-table">
            <thead><tr style="color:#666; font-size:0.7em;"><th>UNIT</th><th>EV HITS</th><th>D</th><th>HITS</th><th>SCORE</th></tr></thead>
            <tbody id="audit-body-primary"></tbody>
        </table>

        <div id="su-audit-container" style="display:none;">
            <div class="table-header">Straight Up Audit</div>
            <table class="audit-table">
                <thead><tr style="color:#666; font-size:0.7em;"><th>NUM</th><th>EV HITS</th><th>D</th><th>HITS</th><th>SCORE</th></tr></thead>
                <tbody id="audit-body-su"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
(function() {
    const reds = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
    let state = { history: [], stack: [], primaryPockets: [], suPockets: [], zeros: [], profit: 0, high: 0, unit: 1, cooldownLeft: 0, lossLevel: 0 };
    let conf = {};

    window.toggleSuInput = function() {
        document.getElementById('su-config').style.display = document.getElementById('dom-sel').value === 'SU' ? 'block' : 'none';
    };

    document.getElementById('final-start').onclick = function() {
        const multVal = document.getElementById('mult-in').value;
        const domVal = document.getElementById('dom-sel').value;
        conf = {
            wheel: document.getElementById('wheel-type').value, 
            unitVal: parseFloat(document.getElementById('unit-cash').value) || 1,
            basketOn: document.getElementById('basket-toggle').checked, 
            view: document.getElementById('view-mode').value,
            mult: multVal === 'ALL' ? 'ALL' : parseInt(multVal),
            warm: parseInt(document.getElementById('warm-in').value),
            domain: domVal,
            suTotal: parseInt(document.getElementById('su-total').value),
            cdTrigger: parseInt(document.getElementById('cd-trigger').value),
            cool: parseInt(document.getElementById('cool-in').value)
        };
        state.zeros = conf.wheel === 'EU' ? [0] : (conf.wheel === 'US' ? [0, 37] : [0, 37, 38]);
        state.primaryPockets = []; state.suPockets = [];

        const allNums = [...state.zeros, ...Array.from({length: 36}, (_, i) => i + 1)];
        allNums.forEach((n, idx) => {
            state.suPockets.push({id: idx, label: (n===37?'00':(n===38?'000':n)), nums:[n], hs:0, hits:0, d:0, evHits: 0});
        });

        if (conf.domain === '9ST') {
            for(let i=0; i<12; i++) {
                let startNum = (i*3)+1;
                let nums = [startNum, startNum+1, startNum+2];
                if (i === 0 && conf.basketOn) nums = [...nums, ...state.zeros];
                state.primaryPockets.push({id: i, label: (i===0 && conf.basketOn ? 'BASKET' : 'ST '+startNum), nums: nums, hs:0, hits:0, d:0, evHits: 0});
            }
            document.getElementById('su-audit-container').style.display = 'block';
            document.getElementById('primary-audit-label').innerText = "9 Streets Audit";
        } else {
            state.primaryPockets = state.suPockets;
            document.getElementById('su-audit-container').style.display = 'none';
            document.getElementById('primary-audit-label').innerText = "Straight Up Audit";
        }

        document.getElementById('config-page').style.display='none'; document.getElementById('tracker-page').style.display='block';
        buildFeltPad(conf.wheel); refresh();
    };

    function buildFeltPad(w) {
        const pad = document.getElementById('pad'); pad.innerHTML = '';
        const container = document.createElement('div'); container.className = 'zero-container';
        const makeBtn = (val, txt) => {
            const b = document.createElement('button'); b.id='nb-'+val; b.className='num-btn btn-green'; b.innerText=txt; b.onclick = () => addRoll(val); return b;
        };
        if (w === 'EU') {
            const r = document.createElement('div'); r.className = 'zero-row'; r.appendChild(makeBtn(0, '0')); container.appendChild(r);
        } else if (w === 'US') {
            const r = document.createElement('div'); r.className = 'zero-row double'; r.appendChild(makeBtn(0, '0')); r.appendChild(makeBtn(37, '00')); container.appendChild(r);
        } else {
            const r1 = document.createElement('div'); r1.className = 'zero-row'; r1.appendChild(makeBtn(38, '000')); container.appendChild(r1);
            const r2 = document.createElement('div'); r2.className = 'zero-row double'; r2.style.marginTop = "8px"; r2.appendChild(makeBtn(0, '0')); r2.appendChild(makeBtn(37, '00')); container.appendChild(r2);
        }
        pad.appendChild(container);
        for(let i=1; i<=36; i++) {
            const b = document.createElement('button'); b.id='nb-'+i; b.className='num-btn '+(reds.includes(i)?'btn-red':'btn-black');
            b.innerText=i; b.onclick = () => addRoll(i); pad.appendChild(b);
        }
    }

    function addRoll(n) {
        const snapshot = {
            history: [...state.history],
            profit: state.profit,
            high: state.high,
            unit: state.unit,
            cooldownLeft: state.cooldownLeft,
            lossLevel: state.lossLevel,
            evHitsPrimary: state.primaryPockets.map(p => p.evHits),
            evHitsSU: state.suPockets.map(p => p.evHits)
        };
        state.stack.push(JSON.stringify(snapshot));
        if (state.stack.length > 50) state.stack.shift();

        const statusTxt = document.getElementById('status-txt').innerText;
        const avoids = getBettingAvoids();
        const avoidIds = avoids.map(p => p.id);
        const isWarm = state.history.length >= conf.warm;

        if (isWarm && state.cooldownLeft === 0) {
            state.primaryPockets.forEach(p => {
                const isTargetedAvoid = avoidIds.includes(p.id);
                if (p.nums.includes(n)) {
                    if (conf.view === 'AVOID' && isTargetedAvoid) p.evHits++;
                    else if (conf.view === 'PLACE' && !isTargetedAvoid) p.evHits++;
                }
            });
            const hitInAvoid = avoidIds.some(aid => state.primaryPockets[aid].nums.includes(n));
            if(!hitInAvoid) {
                state.profit += (state.unit * conf.unitVal);
                if (state.profit >= state.high) { state.unit = 1; state.lossLevel = 0; }
            } else {
                state.profit -= (state.unit * conf.unitVal);
                state.lossLevel++; state.unit *= 2;
                if (state.lossLevel >= conf.cdTrigger) state.cooldownLeft = conf.cool;
            }
            if(state.profit > state.high) state.high = state.profit;
        } else if (state.cooldownLeft > 0) {
            state.cooldownLeft--;
        }

        state.history.push(n); engine(); refresh();
    }

    function engine() {
        [state.primaryPockets, state.suPockets].forEach(pool => {
            pool.forEach(p => {
                const cycle = 36 / p.nums.length;
                const odds = p.nums.length / 36;
                let H = conf.mult === 'ALL' ? state.history.length : Math.floor((cycle * conf.mult) + 1);
                const actualH = Math.min(state.history.length, Math.max(1, H));
                let hitCount = 0;
                for(let i = state.history.length - 1; i >= Math.max(0, state.history.length - actualH); i--) {
                    if(p.nums.includes(state.history[i])) hitCount++;
                }
                p.hits = hitCount;
                p.d = 0; for(let i=state.history.length-1; i>=0; i--) { if(p.nums.includes(state.history[i])) break; p.d++; }
                p.hs = ((hitCount / actualH) / odds) * (1 / (1 + (p.d / cycle)));
            });
        });
    }

    function getBettingAvoids() {
        let pool = [...state.primaryPockets];
        pool.sort((a, b) => (Math.abs(a.hs - b.hs) > 0.0001) ? a.hs - b.hs : b.d - a.d);
        const avoidCount = conf.domain === '9ST' ? 3 : (state.primaryPockets.length - conf.suTotal);
        return pool.slice(0, avoidCount);
    }

    function refresh() {
        const avoids = getBettingAvoids();
        const avoidIds = avoids.map(p => p.id);
        const status = (state.history.length < conf.warm) ? "WARMUP" : (state.cooldownLeft > 0 ? "COOLDOWN" : "READY");
        
        document.getElementById('status-txt').innerText = status + (status !== "READY" ? " (" + (status === "WARMUP" ? state.history.length : state.cooldownLeft) + ")" : "");
        document.getElementById('status-box').className = "status-box " + (status === "READY" ? "status-ready" : "status-wait");
        
        document.querySelectorAll('.num-btn').forEach(btn => btn.classList.remove('glow-red', 'glow-green'));
        const sigArea = document.getElementById('sig-box'); sigArea.innerHTML = "";

        if(status === "READY") {
            const places = state.primaryPockets.filter(p => !avoidIds.includes(p.id));
            const head = conf.view === 'AVOID' ? `AVOID ${avoids.length} UNITS` : `PLACE ON ${places.length} UNITS`;
            const body = conf.view === 'AVOID' ? avoids.map(p=>p.label).join(', ') : places.map(p=>p.label).join(', ');
            sigArea.innerHTML = `<div class="cmd-card mode-${conf.view.toLowerCase()}"><div class="cmd-head">${head}</div><div class="cmd-body" style="font-size:0.7em">${body}</div></div>`;
            
            // FIXED HIGHLIGHTING: Dynamically follow view setting
            if (conf.view === 'AVOID') {
                avoids.forEach(p => p.nums.forEach(n => document.getElementById('nb-'+n)?.classList.add('glow-red')));
            } else {
                places.forEach(p => p.nums.forEach(n => document.getElementById('nb-'+n)?.classList.add('glow-green')));
            }
        }

        document.getElementById('stat-p').innerText = `$${state.profit.toFixed(2)}`;
        document.getElementById('stat-h').innerText = `$${state.high.toFixed(2)}`;
        document.getElementById('stat-rolls').innerText = state.history.length;
        
        renderPool(state.primaryPockets, 'audit-body-primary');
        if (conf.domain === '9ST') renderPool(state.suPockets, 'audit-body-su');

        const feed = document.getElementById('feed'); feed.innerHTML = '';
        state.history.slice(-8).reverse().forEach(n => {
            const chip = document.createElement('div'); chip.className='chip';
            chip.style.background = (n === 0 || n > 36) ? '#2e7d32' : (reds.includes(n) ? '#d32f2f' : '#000');
            chip.innerText = n === 37 ? '00' : (n === 38 ? '000' : n); feed.appendChild(chip);
        });
    }

    function renderPool(pool, targetId) {
        const bdy = document.getElementById(targetId); bdy.innerHTML = '';
        const sorted = [...pool].sort((a,b) => b.hs - a.hs);
        sorted.forEach(p => {
            const tr = document.createElement('tr');
            let color = p.hs >= 0.5 ? 'var(--red)' : (p.hs >= 0.4 ? 'var(--yellow)' : 'var(--blue)');
            tr.innerHTML = `<td><b>${p.label}</b><div class="heat-bg"><div class="heat-fill" style="width:${Math.min(100, p.hs*50)}%; background:${color}"></div></div></td><td>${p.evHits}</td><td>${p.d}</td><td>${p.hits}</td><td>${p.hs.toFixed(3)}</td>`;
            bdy.appendChild(tr);
        });
    }

    document.getElementById('final-undo').onclick = () => {
        if(!state.stack.length) return;
        const snap = JSON.parse(state.stack.pop());
        state.history = snap.history; state.profit = snap.profit; state.high = snap.high;
        state.unit = snap.unit; state.cooldownLeft = snap.cooldownLeft; state.lossLevel = snap.lossLevel;
        state.primaryPockets.forEach((p, i) => p.evHits = snap.evHitsPrimary[i]);
        state.suPockets.forEach((p, i) => p.evHits = snap.evHitsSU[i]);
        engine(); refresh();
    };
})();
</script>
</body>
</html>
