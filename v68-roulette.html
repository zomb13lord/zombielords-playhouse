<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roulette Tracker V70.6</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --accent: #00ff88;
            --red-pocket: #d32f2f; --black-pocket: #000; --green-pocket: #2e7d32;
            --blue-high: #3b82f6; --red-high: #ef4444;
            --wait: #ffcc00; --text: #e0e0e0;
        }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        
        .lobby-nav {
            background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(16, 185, 129, 0.3);
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }
        .lobby-nav .brand { font-family: 'Cinzel', serif; color: var(--accent); font-size: 0.8em; text-transform: uppercase; letter-spacing: 2px; font-weight: 900; }
        .nav-links { display: flex; gap: 10px; }
        .nav-btn, .lobby-nav a { font-family: 'Cinzel', serif; color: #fff; text-decoration: none; font-size: 0.7em; font-weight: 700; border: 1px solid var(--accent); padding: 5px 12px; border-radius: 2px; text-transform: uppercase; cursor: pointer; background: transparent; }

        #config-page { padding: 20px; max-width: 500px; margin: 0 auto; }
        .config-grid { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #444; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full { grid-column: span 2; }
        label { font-size: 0.6em; color: #888; font-weight: bold; display: block; margin-bottom: 2px; text-transform: uppercase; }
        select, input { width: 100%; padding: 8px; background: #000; border: 1px solid #555; color: #fff; border-radius: 6px; font-size: 0.9em; }
        .btn-start { width: 100%; padding: 18px; background: var(--green-pocket); color: #fff; border: none; border-radius: 8px; font-weight: bold; margin-top: 15px; cursor: pointer; }

        #tracker-page { display: none; }
        .frozen-top { position: sticky; top: 0; background: var(--bg); z-index: 100; padding: 10px; border-bottom: 3px solid #444; }
        .status-box { padding: 10px; border-radius: 8px; text-align: center; min-height: 130px; display: flex; flex-direction: column; justify-content: center; font-weight: bold; border: 2px solid #444; margin: 10px; }
        .status-ready { background: #000; color: #fff; border-color: var(--accent); }
        .status-wait { background: #222; color: var(--wait); }
        
        .cmd-card { display: flex; flex-direction: column; border-radius: 6px; border: 2px solid #fff; overflow: hidden; margin-top: 10px; }
        .cmd-head { font-size: 0.7em; padding: 4px; text-transform: uppercase; font-weight: 900; }
        .cmd-body { font-size: 1.1em; padding: 8px; font-weight: 900; background: rgba(0,0,0,0.6); }
        .mode-avoid { background: var(--blue-high); }
        .mode-place { background: var(--red-high); }
        .mode-wait { background: #333; color: #888; border-color: #555; }

        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin: 10px; }
        .stat-card { background: #000; padding: 8px 2px; border-radius: 6px; text-align: center; border: 1px solid #333; }
        .val { font-weight: bold; color: var(--accent); font-size: 0.95em; }

        .history-feed { display: flex; gap: 8px; justify-content: center; margin: 8px 0; min-height: 38px; }
        .chip { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.85em; border: 2px solid rgba(255,255,255,0.2); color: #fff; flex-shrink: 0; }

        .num-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-width: 400px; margin: 15px auto; }
        .zero-container { grid-column: span 3; display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
        .num-btn { padding: 18px 0; border: 1px solid #444; border-radius: 6px; color: #fff !important; font-weight: bold; font-size: 1.4em; cursor: pointer; text-align: center; }
        .p-red { background: var(--red-pocket) !important; }
        .p-black { background: var(--black-pocket) !important; }
        .p-green { background: var(--green-pocket) !important; }

        .glow-blue { background: var(--blue-high) !important; border-color: #fff !important; box-shadow: 0 0 15px var(--blue-high); }
        .glow-red { background: var(--red-high) !important; border-color: #fff !important; box-shadow: 0 0 15px var(--red-high); }
        
        .bet-toggle-btn { width: 100%; padding: 18px; border-radius: 8px; border: none; font-weight: 900; font-size: 1.3em; cursor: pointer; margin: 15px 0; text-transform: uppercase; }
        .bet-on { background: var(--accent); color: #000; }
        .bet-off { background: #333; color: #777; border: 1px solid #444; }

        .audit-table { width: 100%; border-collapse: collapse; font-size: 0.8em; margin-top: 10px; background: var(--card); border-radius: 8px; }
        .audit-table th { color: #888; font-size: 0.7em; padding: 10px 5px; text-transform: uppercase; }
        .audit-table td { padding: 10px 5px; border-bottom: 1px solid #333; text-align: center; }
        .heat-bg { background: #000; width: 85%; height: 6px; border-radius: 4px; margin: 4px auto; border: 1px solid #444; overflow: hidden; }
        .heat-fill { height: 100%; transition: width 0.4s; }
    </style>
</head>
<body>

<nav class="lobby-nav">
    <div class="brand">Zombie Lord's</div>
    <div class="nav-links">
        <button id="nav-config" class="nav-btn" style="display:none;" onclick="location.reload()">Config</button>
        <a href="lobby.html">Lobby</a>
    </div>
</nav>

<div id="config-page">
    <div class="config-grid">
        <h2 class="full" style="margin:0; color:var(--accent);">Manual Auditor V70.6</h2>
        <div class="full"><label>Wheel Type</label><select id="wheel-type"><option value="EU" selected>European</option><option value="US">American</option><option value="TZ">Triple Zero</option></select></div>
        <div class="full"><label>Audit Domain</label><select id="dom-sel"><option value="9ST" selected>9 Streets</option><option value="36SN">36 Singles</option></select></div>
        <div class="full"><label>Strategy</label><select id="strat-sel"><option value="COLD">Cold Hunt</option><option value="HOT" selected>Hot Hunt</option></select></div>
        <div><label>Target Count</label><input type="number" id="target-count" value="28"></div>
        <div><label>Warmup</label><input type="number" id="warm-in" value="16"></div>
        <div class="full"><label>Lookback Window</label><select id="mult-in"><option value="1">Short</option><option value="2">Standard</option><option value="3" selected>Long</option><option value="ALL">ALL</option></select></div>
        <div class="full"><label>Terminal Mode</label><select id="view-mode"><option value="AVOID" selected>AVOID</option><option value="PLACE">PLACE</option></select></div>
        <div><label>Unit Value ($)</label><input type="number" id="unit-cash" value="5"></div>
    </div>
    <button class="btn-start" id="final-start">START SESSION</button>
</div>

<div id="tracker-page">
    <div class="frozen-top">
        <div id="status-box" class="status-box status-wait"><div id="status-txt">WARMING UP</div><div id="sig-box"></div></div>
        <div class="stat-grid">
            <div class="stat-card"><small>PROFIT</small><span id="stat-p" class="val">$0</span></div>
            <div class="stat-card"><small>HIGH</small><span id="stat-h" class="val">$0</span></div>
            <div class="stat-card"><small>BET</small><span id="stat-b" class="val">$0</span></div>
            <div class="stat-card"><small>ROLLS</small><span id="stat-rolls" class="val">0</span></div>
        </div>
        <div id="history-feed" class="history-feed"></div>
    </div>
    <div style="padding:15px;">
        <div id="pad" class="num-pad"></div>
        <button id="bet-toggle" class="bet-toggle-btn bet-off">BET: OFF</button>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button id="final-undo" style="background:#444; color:#fff; padding:15px; border:none; border-radius:6px; font-weight:bold;">UNDO</button>
            <button onclick="window.location.reload()" style="background:#800; color:#fff; padding:15px; border:none; border-radius:6px; font-weight:bold;">RESET</button>
        </div>
        <table class="audit-table">
            <thead><tr><th>STREET / SN</th><th>D</th><th>HITS</th><th>SCORE</th></tr></thead>
            <tbody id="audit-body"></tbody>
        </table>
    </div>
</div>

<script>
(function() {
    const reds = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
    let sessionRolls = [];
    let stack = [];
    let state = { pockets: [], profit: 0, high: 0, unit: 1, isBetting: false };
    let conf = {};

    document.getElementById('final-start').onclick = function() {
        conf = {
            wheel: document.getElementById('wheel-type').value, unitVal: parseFloat(document.getElementById('unit-cash').value) || 5,
            view: document.getElementById('view-mode').value, domain: document.getElementById('dom-sel').value,
            strategy: document.getElementById('strat-sel').value, target: parseInt(document.getElementById('target-count').value) || 28,
            mult: document.getElementById('mult-in').value === 'ALL' ? 'ALL' : parseInt(document.getElementById('mult-in').value),
            warm: parseInt(document.getElementById('warm-in').value)
        };
        initPockets();
        document.getElementById('config-page').style.display='none'; 
        document.getElementById('tracker-page').style.display='block';
        document.getElementById('nav-config').style.display='inline-block';
        buildPad(); refresh();
    };

    function initPockets() {
        const zeros = conf.wheel === 'EU' ? [0] : (conf.wheel === 'US' ? [0, 37] : [0, 37, 38]);
        state.pockets = [];
        if(conf.domain === '9ST') {
            for(let i=0; i<12; i++){
                let s = (i*3)+1;
                state.pockets.push({id: i, label: 'ST '+s, nums: [s, s+1, s+2], hs:0, hits:0, d:0});
            }
        } else {
            [...zeros, ...Array.from({length:36},(_,i)=>i+1)].forEach((n, idx) => {
                state.pockets.push({id: idx, label: (n==37?'00':(n==38?'000':n.toString())), nums:[n], hs:0, hits:0, d:0});
            });
        }
    }

    document.getElementById('bet-toggle').onclick = function() {
        if(sessionRolls.length < conf.warm) return;
        state.isBetting = !state.isBetting;
        this.className = "bet-toggle-btn " + (state.isBetting ? "bet-on" : "bet-off");
        this.innerText = "BET: " + (state.isBetting ? "ON" : "OFF");
        refresh();
    };

    function buildPad() {
        const pad = document.getElementById('pad'); pad.innerHTML = '';
        const zCont = document.createElement('div'); zCont.className = 'zero-container';
        const makeBtn = (n) => {
            const b = document.createElement('button'); b.id='nb-'+n; 
            b.innerText = n === 37 ? '00' : (n === 38 ? '000' : n);
            b.className = (n === 0 || n > 36) ? 'num-btn p-green' : (reds.includes(n) ? 'num-btn p-red' : 'num-btn p-black');
            b.onclick = () => addRoll(n); return b;
        };
        if(conf.wheel === 'EU') zCont.appendChild(makeBtn(0));
        else if(conf.wheel === 'US'){
            const r = document.createElement('div'); r.style.display="grid"; r.style.gridTemplateColumns="1fr 1fr"; r.style.gap="8px";
            r.appendChild(makeBtn(0)); r.appendChild(makeBtn(37)); zCont.appendChild(r);
        } else {
            zCont.appendChild(makeBtn(38));
            const r = document.createElement('div'); r.style.display="grid"; r.style.gridTemplateColumns="1fr 1fr"; r.style.gap="8px"; r.style.marginTop="8px";
            r.appendChild(makeBtn(0)); r.appendChild(makeBtn(37)); zCont.appendChild(r);
        }
        pad.appendChild(zCont);
        for(let i=1; i<=36; i++) pad.appendChild(makeBtn(i));
    }

    function addRoll(n) {
        stack.push(JSON.stringify({p: state.profit, h: state.high, u: state.unit, b: state.isBetting, rolls: [...sessionRolls]}));
        
        let auditPool = [...state.pockets];
        if(conf.strategy === 'COLD') auditPool.sort((a,b) => a.hs - b.hs || b.d - a.d);
        else auditPool.sort((a,b) => b.hs - a.hs || a.d - b.d);
        const strategySet = auditPool.slice(0, conf.target);
        const strategyIds = strategySet.map(p => p.id);

        if(state.isBetting) {
            const streetIdx = Math.floor((n-1)/3);
            const isHit = (conf.domain === '9ST') ? (n > 0 && n <= 36 && strategyIds.includes(streetIdx)) : strategySet.some(p => p.nums.includes(n));
            
            let covered = 0; strategySet.forEach(p => covered += p.nums.length);
            const stake = covered * state.unit * conf.unitVal;

            if(isHit) {
                state.profit += (state.unit * conf.unitVal * 36) - stake;
                if(state.profit >= state.high) state.unit = 1;
            } else {
                state.profit -= stake; state.unit *= 2; state.isBetting = false;
                const btn = document.getElementById('bet-toggle');
                btn.className = "bet-toggle-btn bet-off"; btn.innerText = "BET: OFF";
            }
            if(state.profit > state.high) state.high = state.profit;
        }
        sessionRolls.push(n); engine(); refresh();
    }

    function engine() {
        state.pockets.forEach(p => {
            const cycle = (conf.domain === '9ST' ? 12 : 36);
            let winSize = conf.mult === 'ALL' ? sessionRolls.length : (cycle * conf.mult) + 1;
            const actualWin = Math.max(1, Math.min(sessionRolls.length, winSize));
            let h = 0; const winArr = sessionRolls.slice(-actualWin);
            winArr.forEach(r => { if(p.nums.includes(r)) h++; });
            p.hits = h;
            let d = 0; for(let i=sessionRolls.length-1; i>=0; i--) { if(p.nums.includes(sessionRolls[i])) break; d++; }
            p.d = d;
            const fr = (h / actualWin) / (p.nums.length / 36);
            p.hs = fr * (1 / (1 + (d / cycle)));
        });
    }

    function refresh() {
        const auditTable = [...state.pockets].sort((a,b) => b.hs - a.hs);
        let auditSorted = [...state.pockets];
        if(conf.strategy === 'COLD') auditSorted.sort((a,b) => a.hs - b.hs || b.d - a.d);
        else auditSorted.sort((a,b) => b.hs - a.hs || a.d - b.d);
        
        const strategySet = auditSorted.slice(0, conf.target);
        const stratIds = strategySet.map(p => p.id);
        let displaySet = (conf.view === 'PLACE') ? strategySet : state.pockets.filter(p => !stratIds.includes(p.id));

        const warmup = sessionRolls.length < conf.warm;
        document.getElementById('status-txt').innerText = warmup ? `WARMUP (${sessionRolls.length}/${conf.warm})` : (state.isBetting ? "ACTIVE" : "READY (WAIT)");
        document.getElementById('status-box').className = "status-box " + (state.isBetting ? "status-ready" : "status-wait");
        
        document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('glow-blue', 'glow-red'));
        if(!warmup) {
            const hCls = (conf.view === 'AVOID') ? 'glow-blue' : 'glow-red';
            displaySet.forEach(p => p.nums.forEach(n => document.getElementById('nb-'+n)?.classList.add(hCls)));
            const labels = [...displaySet].sort((a,b)=>a.id-b.id).map(p=>p.label);
            document.getElementById('sig-box').innerHTML = `<div class="cmd-card ${state.isBetting?(conf.view==='AVOID'?'mode-avoid':'mode-place'):'mode-wait'}"><div class="cmd-head">${state.isBetting ? conf.view : 'READY'}</div><div class="cmd-body">${labels.join(', ')}</div></div>`;
        }
        
        document.getElementById('stat-p').innerText = `$${state.profit.toFixed(0)}`;
        document.getElementById('stat-h').innerText = `$${state.high.toFixed(0)}`;
        document.getElementById('stat-rolls').innerText = sessionRolls.length;

        let covered = 0; strategySet.forEach(p => covered += p.nums.length);
        document.getElementById('stat-b').innerText = state.isBetting ? `$${(covered * state.unit * conf.unitVal).toFixed(0)}` : "$0";
        
        const feed = document.getElementById('history-feed'); feed.innerHTML = '';
        sessionRolls.slice(-8).reverse().forEach(n => {
            const chip = document.createElement('div'); chip.className = 'chip';
            chip.style.background = (n === 0 || n > 36) ? 'var(--green-pocket)' : (reds.includes(n) ? 'var(--red-pocket)' : '#000');
            chip.innerText = n === 37 ? '00' : (n === 38 ? '000' : n); feed.appendChild(chip);
        });

        const bdy = document.getElementById('audit-body'); bdy.innerHTML = '';
        auditTable.forEach(p => {
            const tr = document.createElement('tr');
            let color = p.hs >= 0.5 ? 'var(--red-pocket)' : (p.hs >= 0.4 ? 'var(--yellow)' : 'var(--blue-high)');
            const w = Math.min(100, (p.hs / 2) * 100);
            tr.innerHTML = `<td><b>${p.label}</b><div class="heat-bg"><div class="heat-fill" style="width:${w}%; background:${color}"></div></div></td><td>${p.d}</td><td>${p.hits}</td><td>${p.hs.toFixed(3)}</td>`;
            bdy.appendChild(tr);
        });
    }

    document.getElementById('final-undo').onclick = function() { 
        if(!stack.length) return; 
        const prev = JSON.parse(stack.pop());
        state.profit = prev.p; state.high = prev.h; state.unit = prev.u; state.isBetting = prev.b; sessionRolls = prev.rolls;
        engine(); refresh(); 
    };
})();
</script>
</body>
</html>
