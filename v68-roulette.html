<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roulette Tracker V69.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --accent: #00ff88;
            --red: #ef4444; --black: #000; --green: #2e7d32;
            --blue: #3b82f6; --yellow: #fbbf24;
            --wait: #ffcc00; --text: #e0e0e0;
        }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        
        .lobby-nav {
            background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(16, 185, 129, 0.3);
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; 
            z-index: 1000; position: sticky; top: 0;
        }
        .lobby-nav .brand { font-family: 'Cinzel', serif; color: var(--accent); font-size: 0.8em; text-transform: uppercase; letter-spacing: 2px; font-weight: 900; }
        .nav-links { display: flex; gap: 10px; }
        .lobby-nav a, .nav-btn { font-family: 'Cinzel', serif; color: #fff; text-decoration: none; font-size: 0.65em; font-weight: 700; border: 1px solid var(--accent); padding: 5px 10px; border-radius: 2px; text-transform: uppercase; cursor: pointer; background: transparent; }

        #config-page { padding: 20px; max-width: 500px; margin: 0 auto; }
        .config-grid { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #444; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full { grid-column: span 2; }
        label { font-size: 0.6em; color: #888; font-weight: bold; display: block; margin-bottom: 2px; text-transform: uppercase; }
        select, input { width: 100%; padding: 8px; background: #000; border: 1px solid #555; border-radius: 6px; color: #fff; font-size: 0.9em; }
        .btn-start { width: 100%; padding: 18px; background: var(--green); color: #fff; border: none; border-radius: 8px; font-weight: bold; margin-top: 15px; cursor: pointer; }

        #tracker-page { display: none; }
        .status-box { padding: 10px; border-radius: 8px; text-align: center; min-height: 120px; display: flex; flex-direction: column; justify-content: center; font-weight: bold; border: 2px solid #444; margin: 10px; }
        .status-wait { background: #222; color: var(--wait); }
        .status-ready { background: #000; color: #fff; border-color: var(--accent); }
        
        .cmd-card { display: flex; flex-direction: column; border-radius: 6px; border: 2px solid #fff; overflow: hidden; margin-top: 10px; }
        .cmd-head { font-size: 0.7em; padding: 4px; text-transform: uppercase; font-weight: 900; }
        .cmd-body { font-size: 0.9em; padding: 8px; font-weight: 900; background: rgba(0,0,0,0.6); }
        .mode-avoid { background: #004488; }
        .mode-place { background: #880000; }
        .mode-wait { background: #333; color: #999; border-color: #555; }

        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin: 10px; }
        .stat-card { background: #000; padding: 8px 2px; border-radius: 6px; text-align: center; border: 1px solid #333; }
        .val { font-weight: bold; color: var(--accent); font-size: 0.95em; }

        .num-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-width: 400px; margin: 0 auto; margin-top: 15px;}
        .num-btn { padding: 18px 0; border: 2px solid #444; border-radius: 6px; color: #fff !important; font-weight: bold; font-size: 1.4em; cursor: pointer; text-align: center; }
        
        .highlight-avoid { background: #004488 !important; border-color: #00aaff !important; box-shadow: 0 0 15px #00aaff; }
        .highlight-place { background: #880000 !important; border-color: #ff4444 !important; box-shadow: 0 0 15px #ff4444; }

        .bet-toggle-btn { width: 100%; padding: 15px; border-radius: 6px; border: none; font-weight: 900; font-size: 1.2em; cursor: pointer; margin-bottom: 15px;}
        .bet-on { background: var(--accent); color: #000; border: 2px solid #fff; }
        .bet-off { background: #444; color: #888; border: 2px solid #222; }

        .audit-table { width: 100%; border-collapse: collapse; font-size: 0.75em; margin-top: 20px; background: var(--card); border-radius: 8px; table-layout: fixed; }
        .audit-table td { padding: 8px 2px; border-bottom: 1px solid #333; text-align: center; }
        .heat-bg { background: #000; width: 90%; height: 6px; border-radius: 4px; margin: 4px auto; border: 1px solid #444; overflow: hidden; }
        .heat-fill { height: 100%; transition: width 0.4s; }
    </style>
</head>
<body>

<nav class="lobby-nav">
    <div class="brand">Zombie Lord's</div>
    <div class="nav-links">
        <button id="nav-config" class="nav-btn" style="display:none;" onclick="showConfig()">Config</button>
        <a href="lobby.html">Lobby</a>
    </div>
</nav>

<div id="config-page">
    <div class="config-grid">
        <h2 class="full" style="margin:0; color:var(--accent);">Manual Auditor V69.5</h2>
        <div class="full"><label>Wheel Type</label><select id="wheel-type"><option value="EU" selected>European</option><option value="US">American</option><option value="TZ">Triple Zero</option></select></div>
        <div class="full"><label>Audit Domain</label><select id="dom-sel"><option value="9ST" selected>9 Streets (N=3)</option><option value="36SN">36 Singles (N=1)</option></select></div>
        <div><label>Bet Target Count</label><input type="number" id="target-count" value="3"></div>
        <div><label>Warmup</label><input type="number" id="warm-in" value="16"></div>
        <div class="full"><label>Lookback Window</label><select id="mult-in"><option value="1">Short</option><option value="2">Standard</option><option value="3" selected>Long</option><option value="ALL">ALL</option></select></div>
        <div class="full"><label>Terminal Mode</label><select id="view-mode"><option value="AVOID" selected>AVOID</option><option value="PLACE">PLACE</option></select></div>
        <div><label>Unit ($)</label><input type="number" id="unit-cash" value="1"></div>
    </div>
    <button class="btn-start" id="final-start">START SESSION</button>
</div>

<div id="tracker-page">
    <div id="status-box" class="status-box status-wait"><div id="status-txt">WARMING UP</div><div id="sig-box"></div></div>
    <div class="stat-grid">
        <div class="stat-card"><small>PROFIT</small><span id="stat-p" class="val">$0</span></div>
        <div class="stat-card"><small>HIGH</small><span id="stat-h" class="val">$0</span></div>
        <div class="stat-card"><small>BET</small><span id="stat-b" class="val">$0</span></div>
        <div class="stat-card"><small>ROLLS</small><span id="stat-rolls" class="val">0</span></div>
    </div>
    <div style="padding:15px;">
        <button id="bet-toggle" class="bet-toggle-btn bet-off">BET: OFF</button>
        <div id="pad" class="num-pad"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;">
            <button id="final-undo" style="background:#444; color:#fff; padding:15px; border:none; border-radius:6px; font-weight:bold;">UNDO</button>
            <button onclick="window.location.reload()" style="background:#800; color:#fff; padding:15px; border:none; border-radius:6px; font-weight:bold;">RESET</button>
        </div>
        <table class="audit-table">
            <thead><tr><th style="width:30%">UNIT</th><th style="width:15%">W</th><th style="width:15%">D</th><th style="width:15%">H</th><th style="width:25%">SCORE</th></tr></thead>
            <tbody id="audit-body"></tbody>
        </table>
    </div>
</div>

<script>
(function() {
    const reds = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
    let state = { history: [], stack: [], pockets: [], profit: 0, high: 0, unit: 1, isBetting: false };
    let conf = {};

    window.showConfig = function() {
        document.getElementById('tracker-page').style.display = 'none';
        document.getElementById('config-page').style.display = 'block';
        document.getElementById('nav-config').style.display = 'none';
    };

    document.getElementById('final-start').onclick = function() {
        conf = {
            wheel: document.getElementById('wheel-type').value, unitVal: parseFloat(document.getElementById('unit-cash').value) || 1,
            view: document.getElementById('view-mode').value, domain: document.getElementById('dom-sel').value,
            targetCount: parseInt(document.getElementById('target-count').value) || 3,
            mult: document.getElementById('mult-in').value === 'ALL' ? 'ALL' : parseInt(document.getElementById('mult-in').value),
            warm: parseInt(document.getElementById('warm-in').value)
        };
        const zeros = conf.wheel === 'EU' ? [0] : (conf.wheel === 'US' ? [0, 37] : [0, 37, 38]);
        state.pockets = [];
        if(conf.domain === '9ST') {
            for(let i=0; i<12; i++){
                let s = (i*3)+1;
                state.pockets.push({id: i, label: 'ST '+s, nums: [s, s+1, s+2], hs:0, hits:0, d:0, winH:0});
            }
        } else {
            [...zeros, ...Array.from({length:36},(_,i)=>i+1)].forEach((n, idx) => {
                state.pockets.push({id: idx, label: (n==37?'00':(n==38?'000':n.toString())), nums: [n], hs:0, hits:0, d:0, winH:0});
            });
        }
        document.getElementById('config-page').style.display='none'; 
        document.getElementById('tracker-page').style.display='block';
        document.getElementById('nav-config').style.display='inline-block';
        buildFeltPad(); engine(); refresh();
    };

    document.getElementById('bet-toggle').onclick = function() {
        if (state.history.length < conf.warm) return;
        state.isBetting = !state.isBetting;
        this.innerText = state.isBetting ? "BET: ON" : "BET: OFF";
        this.className = "bet-toggle-btn " + (state.isBetting ? "bet-on" : "bet-off");
        refresh();
    };

    function buildFeltPad() {
        const pad = document.getElementById('pad'); pad.innerHTML = '';
        for(let i=1; i<=36; i++) {
            const b = document.createElement('button'); b.id='nb-'+i; b.className='num-btn '+(reds.includes(i)?'btn-red':'btn-black');
            b.innerText=i; b.onclick = () => addRoll(i); pad.appendChild(b);
        }
    }

    function addRoll(n) {
        state.stack.push(JSON.stringify({...state, history:[...state.history]}));
        const targets = getTargetGroup();
        const targetIds = targets.map(p => p.id);
        const streetIdx = Math.floor((n-1)/3);

        if(state.isBetting) {
            const isTargetHit = (conf.domain === '9ST') ? targetIds.includes(streetIdx) : targets.some(p => p.nums.includes(n));
            const win = (conf.view === 'AVOID') ? !isTargetHit : isTargetHit;
            const totalStake = conf.targetCount * state.unit * conf.unitVal;

            if(win) {
                // Correct Math: (Unit * 36) - Stake for Singles; (Unit * 12) - Stake for Streets
                const payoutMult = (conf.domain === '9ST') ? 12 : 36;
                state.profit += (state.unit * conf.unitVal * payoutMult) - totalStake;
                if (state.profit >= state.high) state.unit = 1;
            } else {
                state.profit -= totalStake;
                state.unit *= 2;
                state.isBetting = false;
                document.getElementById('bet-toggle').className = "bet-toggle-btn bet-off";
                document.getElementById('bet-toggle').innerText = "BET: OFF";
            }
            if(state.profit > state.high) state.high = state.profit;
        }
        state.history.push(n); engine(); refresh();
    }

    function engine() {
        state.pockets.forEach(p => {
            const cycle = (conf.domain === '9ST') ? 12 : 36;
            const odds = p.nums.length / 36;
            let H = conf.mult === 'ALL' ? state.history.length : Math.floor((cycle * conf.mult) + 1);
            const actualH = Math.max(1, Math.min(state.history.length, H)); p.winH = actualH;
            let hits = 0; for(let i=state.history.length-1; i>=state.history.length-actualH; i--) if(p.nums.includes(state.history[i])) hits++;
            p.hits = hits; p.fr = (hits/actualH)/odds;
            let d = 0; for(let i=state.history.length-1; i>=0; i--) { if(p.nums.includes(state.history[i])) break; d++; }
            p.d = d; p.hs = p.fr * (1/(1+(d/cycle)));
        });
    }

    function getTargetGroup() {
        let pool = [...state.pockets];
        pool.sort((a,b) => (conf.view === 'AVOID') ? (a.hs-b.hs || b.d-a.d) : (b.hs-a.hs || a.d-b.d));
        return pool.slice(0, conf.targetCount);
    }

    function refresh() {
        const audit = [...state.pockets].sort((a,b) => b.hs - a.hs);
        const targets = getTargetGroup();
        const warmup = state.history.length < conf.warm;
        
        document.getElementById('status-txt').innerText = warmup ? `WARMUP (${state.history.length}/${conf.warm})` : (state.isBetting ? "BETTING ACTIVE" : "READY (WAITING)");
        document.getElementById('status-box').className = "status-box " + (state.isBetting ? "status-ready" : "status-wait");
        
        const sigArea = document.getElementById('sig-box'); sigArea.innerHTML = "";
        document.querySelectorAll('.num-btn').forEach(btn => btn.classList.remove('highlight-avoid', 'highlight-place'));

        if(!warmup) {
            const hCls = (conf.view === 'AVOID') ? 'highlight-avoid' : 'highlight-place';
            targets.forEach(p => p.nums.forEach(n => document.getElementById('nb-'+n)?.classList.add(hCls)));
            const sortedLabels = [...targets].sort((a,b)=>a.id - b.id).map(p=>p.label);
            sigArea.innerHTML = `<div class="cmd-card ${state.isBetting ? (conf.view==='AVOID'?'mode-avoid':'mode-place') : 'mode-wait'}">
                <div class="cmd-head">${state.isBetting ? conf.view : 'READY'} COMMANDER</div>
                <div class="cmd-body">${sortedLabels.join(', ')}</div>
            </div>`;
        }
        
        document.getElementById('stat-p').innerText = `$${state.profit.toFixed(0)}`;
        document.getElementById('stat-h').innerText = `$${state.high.toFixed(0)}`;
        document.getElementById('stat-rolls').innerText = state.history.length;
        document.getElementById('stat-b').innerText = state.isBetting ? `$${(conf.targetCount * state.unit * conf.unitVal).toFixed(0)}` : "$0";
        
        const bdy = document.getElementById('audit-body'); bdy.innerHTML = '';
        audit.forEach(p => {
            const tr = document.createElement('tr');
            let color = p.hs >= 0.5 ? 'var(--red)' : (p.hs >= 0.4 ? 'var(--yellow)' : 'var(--blue)');
            tr.innerHTML = `<td><b>${p.label}</b><div class="heat-bg"><div class="heat-fill" style="width:${Math.min(100,(p.hs/2)*100)}%; background:${color}"></div></div></td><td>${p.winH}</td><td>${p.d}</td><td>${p.hits}</td><td>${p.hs.toFixed(3)}</td>`;
            bdy.appendChild(tr);
        });
    }

    document.getElementById('final-undo').onclick = function() { 
        if(!state.stack.length) return; 
        state = JSON.parse(state.stack.pop()); engine(); refresh(); 
    };
})();
</script>
</body>
</html>
