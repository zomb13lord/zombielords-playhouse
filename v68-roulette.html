<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roulette Tracker V69.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --accent: #00ff88;
            --red: #ef4444; --black: #000; --green: #2e7d32;
            --blue: #3b82f6; --yellow: #fbbf24;
            --wait: #ffcc00; --text: #e0e0e0;
        }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        
        .lobby-nav {
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(16, 185, 129, 0.3);
            padding: 10px 15px;
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }
        .lobby-nav .brand { font-family: 'Cinzel', serif; color: var(--accent); font-size: 0.8em; text-transform: uppercase; letter-spacing: 2px; font-weight: 900; }
        .lobby-nav a { font-family: 'Cinzel', serif; color: #fff; text-decoration: none; font-size: 0.7em; font-weight: 700; border: 1px solid var(--accent); padding: 5px 12px; border-radius: 2px; text-transform: uppercase; }

        #config-page { padding: 20px; max-width: 500px; margin: 0 auto; }
        .config-grid { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #444; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full { grid-column: span 2; }
        label { font-size: 0.6em; color: #888; font-weight: bold; display: block; margin-bottom: 2px; text-transform: uppercase; }
        select, input { width: 100%; padding: 8px; background: #000; border: 1px solid #555; color: #fff; border-radius: 6px; font-size: 0.9em; }
        .btn-start { width: 100%; padding: 18px; background: var(--green); color: #fff; border: none; border-radius: 8px; font-weight: bold; margin-top: 15px; cursor: pointer; }

        #tracker-page { display: none; }
        .frozen-top { position: sticky; top: 0; background: var(--bg); z-index: 100; padding: 10px; border-bottom: 3px solid #444; }
        .status-box { padding: 10px; border-radius: 8px; text-align: center; min-height: 120px; display: flex; flex-direction: column; justify-content: center; font-weight: bold; border: 2px solid #444; }
        .status-wait { background: #222; color: var(--wait); }
        .status-ready { background: #000; color: #fff; border-color: var(--accent); }
        
        .cmd-card { display: flex; flex-direction: column; border-radius: 6px; border: 2px solid #fff; overflow: hidden; margin-top: 10px; }
        .cmd-head { font-size: 0.7em; padding: 4px; text-transform: uppercase; font-weight: 900; }
        .cmd-body { font-size: 1.1em; padding: 8px; font-weight: 900; background: rgba(0,0,0,0.6); }
        .mode-avoid { background: #004488; } /* Blue for Cold/Avoid */
        .mode-place { background: #880000; } /* Red for Hot/Place */
        .mode-wait { background: #444; color: #aaa; }

        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin: 10px 0; }
        .stat-card { background: #000; padding: 8px 2px; border-radius: 6px; text-align: center; border: 1px solid #333; }
        .val { font-weight: bold; color: var(--accent); font-size: 0.95em; }

        .history-feed { display: flex; gap: 8px; justify-content: center; margin-top: 8px; min-height: 38px; overflow: hidden; }
        .chip { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.85em; border: 2px solid rgba(255,255,255,0.2); color: #fff; flex-shrink: 0; }

        .num-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-width: 400px; margin: 0 auto; margin-top: 15px;}
        .zero-container { grid-column: span 3; display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
        .num-btn { padding: 18px 0; border: 2px solid #444; border-radius: 6px; color: #fff !important; font-weight: bold; font-size: 1.4em; cursor: pointer; text-align: center; transition: 0.2s; }
        
        /* DYNAMIC HIGHLIGHTS */
        .highlight-blue { background: #004488 !important; border-color: #00aaff !important; box-shadow: 0 0 15px #00aaff; }
        .highlight-red { background: #880000 !important; border-color: #ff4444 !important; box-shadow: 0 0 15px #ff4444; }

        .btn-green { background: var(--green); }
        .btn-red { background: #440000; } /* Dark base for Red pockets */
        .btn-black { background: #000; }
        
        .bet-toggle-btn { width: 100%; padding: 15px; border-radius: 6px; border: none; font-weight: 900; font-size: 1.2em; cursor: pointer; transition: 0.3s; margin-bottom: 15px;}
        .bet-on { background: var(--accent); color: #000; border: 2px solid #fff; }
        .bet-off { background: #444; color: #888; border: 2px solid #222; }

        .audit-table { width: 100%; border-collapse: collapse; font-size: 0.8em; margin-top: 20px; background: var(--card); border-radius: 8px; }
        .audit-table td { padding: 10px 5px; border-bottom: 1px solid #333; text-align: center; }
        .heat-bg { background: #000; width: 85%; height: 6px; border-radius: 4px; margin: 4px auto; border: 1px solid #444; overflow: hidden; }
        .heat-fill { height: 100%; transition: width 0.4s; }
    </style>
</head>
<body>

<nav class="lobby-nav">
    <div class="brand">Zombie Lord's</div>
    <a href="lobby.html">Return to Playhouse</a>
</nav>

<div id="config-page">
    <div class="config-grid">
        <h2 class="full" style="margin:0; color:var(--accent);">Manual Auditor V69.1</h2>
        <div class="full"><label>Wheel Type</label><select id="wheel-type"><option value="EU" selected>European</option><option value="US">American</option><option value="TZ">Triple Zero</option></select></div>
        <div class="full"><label>Lookback Window</label><select id="mult-in"><option value="1">Short</option><option value="2">Standard</option><option value="3" selected>Long</option><option value="ALL">ALL</option></select></div>
        <div class="full"><label>Terminal Mode</label><select id="view-mode"><option value="AVOID" selected>AVOID</option><option value="PLACE">PLACE</option></select></div>
        <div class="full">
            <div style="display:flex; gap:8px;">
                <div class="toggle-box" style="flex:1; display:flex; justify-content:space-between;">HEDGE <input type="checkbox" id="basket-toggle" checked></div>
                <div class="toggle-box" style="flex:1; display:flex; justify-content:space-between;">PUSH (1:1) <input type="checkbox" id="push-toggle"></div>
            </div>
        </div>
        <div><label>Unit ($)</label><input type="number" id="unit-cash" value="1"></div>
        <div><label>Warmup</label><input type="number" id="warm-in" value="16"></div>
    </div>
    <button class="btn-start" id="final-start">START SESSION</button>
</div>

<div id="tracker-page">
    <div class="frozen-top">
        <div id="status-box" class="status-box status-wait"><div id="status-txt">WARMING UP</div><div id="sig-box"></div></div>
        <div class="stat-grid">
            <div class="stat-card"><small>PROFIT</small><span id="stat-p" class="val">$0</span></div>
            <div class="stat-card"><small>HIGH</small><span id="stat-h" class="val">$0</span></div>
            <div class="stat-card"><small>BET</small><span id="stat-b" class="val">$0</span></div>
            <div class="stat-card"><small>ROLLS</small><span id="stat-rolls" class="val">0</span></div>
        </div>
        <div id="feed" class="history-feed"></div>
    </div>
    <div style="padding:15px;">
        <button id="bet-toggle" class="bet-toggle-btn bet-off">BET: OFF</button>
        <div id="pad" class="num-pad"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;">
            <button id="final-undo" style="background:#444; color:#fff; padding:15px; border:none; border-radius:6px; font-weight:bold;">UNDO</button>
            <button onclick="window.location.reload()" style="background:#800; color:#fff; padding:15px; border:none; border-radius:6px; font-weight:bold;">RESET</button>
        </div>
        <table class="audit-table">
            <thead><tr style="color:#666; font-size:0.7em;"><th>STREET / BASKET</th><th>H-WIN</th><th>D</th><th>HITS</th><th>SCORE</th></tr></thead>
            <tbody id="audit-body"></tbody>
        </table>
    </div>
</div>

<script>
(function() {
    const reds = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
    let state = { history: [], stack: [], pockets: [], zeros: [], profit: 0, high: 0, unit: 1, isBetting: false };
    let conf = {};

    document.getElementById('final-start').onclick = function() {
        const multVal = document.getElementById('mult-in').value;
        conf = {
            wheel: document.getElementById('wheel-type').value, unitVal: parseFloat(document.getElementById('unit-cash').value) || 1,
            basketOn: document.getElementById('basket-toggle').checked, pushOn: document.getElementById('push-toggle').checked,
            view: document.getElementById('view-mode').value,
            mult: multVal === 'ALL' ? 'ALL' : parseInt(multVal), warm: parseInt(document.getElementById('warm-in').value)
        };
        state.zeros = conf.wheel === 'EU' ? [0] : (conf.wheel === 'US' ? [0, 37] : [0, 37, 38]);
        state.pockets = [];
        for(let i=0; i<12; i++) {
            let startNum = (i*3)+1;
            let label = (i === 0 && conf.basketOn) ? 'BASKET' : 'ST '+startNum;
            let nums = [startNum, startNum+1, startNum+2];
            if (i === 0 && conf.basketOn) nums = [...nums, ...state.zeros];
            state.pockets.push({id: i, label: label, nums: nums, hs:0, hits:0, d:0, winH: 0});
        }
        document.getElementById('config-page').style.display='none'; 
        document.getElementById('tracker-page').style.display='block';
        buildFeltPad(conf.wheel); refresh();
    };

    document.getElementById('bet-toggle').onclick = function() {
        if (state.history.length < conf.warm) return; // Optional: disable toggle during warmup
        state.isBetting = !state.isBetting;
        this.innerText = state.isBetting ? "BET: ON" : "BET: OFF";
        this.className = state.isBetting ? "bet-toggle-btn bet-on" : "bet-toggle-btn bet-off";
        refresh();
    };

    function buildFeltPad(w) {
        const pad = document.getElementById('pad'); pad.innerHTML = '';
        const container = document.createElement('div'); container.className = 'zero-container';
        const makeBtn = (val, txt) => {
            const b = document.createElement('button'); b.id='nb-'+val; b.className='num-btn btn-green'; b.innerText=txt; b.onclick = () => addRoll(val); return b;
        };
        if (w === 'EU') container.appendChild(makeBtn(0, '0'));
        else if (w === 'US') {
            const row = document.createElement('div'); row.style.display="grid"; row.style.gridTemplateColumns="1fr 1fr"; row.style.gap="8px";
            row.appendChild(makeBtn(0, '0')); row.appendChild(makeBtn(37, '00')); container.appendChild(row);
        } else {
            const r1 = document.createElement('div'); r1.appendChild(makeBtn(38, '000')); container.appendChild(r1);
            const r2 = document.createElement('div'); r2.style.display="grid"; r2.style.gridTemplateColumns="1fr 1fr"; r2.style.gap="8px";
            r2.appendChild(makeBtn(0, '0')); r2.appendChild(makeBtn(37, '00')); container.appendChild(r2);
        }
        pad.appendChild(container);
        for(let i=1; i<=36; i++) {
            const b = document.createElement('button'); b.id='nb-'+i; b.className='num-btn '+(reds.includes(i)?'btn-red':'btn-black');
            b.innerText=i; b.onclick = () => addRoll(i); pad.appendChild(b);
        }
    }

    function addRoll(n) {
        state.stack.push(JSON.stringify({history:[...state.history], profit:state.profit, high:state.high, unit:state.unit, isBetting:state.isBetting}));
        
        const avoids = getBettingAvoids();
        const avoidIds = avoids.map(p => p.id);
        const streetIdx = (n === 0 || n > 36) ? 0 : Math.floor((n-1)/3);

        if(state.isBetting) {
            const win = !avoidIds.includes(streetIdx);
            const isBasketHit = state.pockets[0].nums.includes(n);
            if(win) {
                if (conf.basketOn && isBasketHit && !avoidIds.includes(0)) {
                    let payout = { 'EU': 8, 'US': 6, 'TZ': 5 }[conf.wheel];
                    state.profit += conf.pushOn ? (state.unit * conf.unitVal * ((payout + 1) - 9)) : (state.unit * conf.unitVal * ((3 * payout + 3) - 19));
                } else {
                    state.profit += (state.unit * conf.unitVal * ((conf.basketOn && !conf.pushOn) ? 5 : 3));
                }
                if (state.profit >= state.high) state.unit = 1;
            } else {
                if (!(conf.basketOn && isBasketHit && !avoidIds.includes(0))) {
                    state.profit -= (state.unit * conf.unitVal * ((avoidIds.includes(0) || conf.pushOn || !conf.basketOn) ? 9 : 19));
                    state.unit *= 2;
                    state.isBetting = false; // AUTO-OFF ON LOSS
                    const btn = document.getElementById('bet-toggle');
                    btn.innerText = "BET: OFF"; btn.className = "bet-toggle-btn bet-off";
                }
            }
            if(state.profit > state.high) state.high = state.profit;
        }
        
        state.history.push(n); engine(); refresh();
    }

    function engine() {
        state.pockets.forEach(p => {
            const cycle = 12; const odds = 3 / 36;
            let H = conf.mult === 'ALL' ? state.history.length : Math.floor((cycle * conf.mult) + 1);
            if (H < 1) H = 1; const actualH = Math.min(state.history.length, H); p.winH = actualH;
            let hitCount = 0; const startIdx = Math.max(0, state.history.length - actualH);
            for(let i = state.history.length - 1; i >= startIdx; i--) { if(p.nums.includes(state.history[i])) hitCount++; }
            p.hits = hitCount; p.fr = (hitCount / actualH) / odds;
            let d = 0; for(let i=state.history.length-1; i>=0; i--) { if(p.nums.includes(state.history[i])) break; d++; }
            p.d = d; p.hs = p.fr * (1 / (1 + (d / cycle)));
        });
    }

    function getBettingAvoids() {
        let pool = [...state.pockets];
        pool.sort((a, b) => (Math.abs(a.hs - b.hs) > 0.0001) ? a.hs - b.hs : b.d - a.d);
        return pool.slice(0, 3);
    }

    function refresh() {
        const auditSorted = [...state.pockets].sort((a,b) => b.hs - a.hs);
        const avoids = getBettingAvoids();
        const warmup = state.history.length < conf.warm;
        
        document.getElementById('status-txt').innerText = warmup ? `WARMUP (${state.history.length}/${conf.warm})` : (state.isBetting ? "BETTING ACTIVE" : "WAITING FOR ENTRY");
        document.getElementById('status-box').className = "status-box " + (state.isBetting ? "status-ready" : "status-wait");
        
        const sigArea = document.getElementById('sig-box'); sigArea.innerHTML = "";
        
        // Reset Pad Highlights
        document.querySelectorAll('.num-btn').forEach(btn => btn.classList.remove('highlight-blue', 'highlight-red'));

        if(!warmup) {
            const aIds = avoids.map(x=>x.id);
            const p9 = state.pockets.filter(p => !aIds.includes(p.id));
            
            // ASCENDING SORT FOR LABELS
            const sortedAvoids = [...avoids].sort((a,b) => a.id - b.id);
            const sortedP9 = [...p9].sort((a,b) => a.id - b.id);

            // Number Pad Coloring
            avoids.forEach(p => p.nums.forEach(n => document.getElementById('nb-'+n)?.classList.add('highlight-blue')));
            p9.forEach(p => p.nums.forEach(n => document.getElementById('nb-'+n)?.classList.add('highlight-red')));

            if(state.isBetting) {
                if(conf.view === 'AVOID') sigArea.innerHTML = `<div class="cmd-card mode-avoid"><div class="cmd-head">AVOID STREETS</div><div class="cmd-body">${sortedAvoids.map(p=>p.label).join(', ')}</div></div>`;
                else sigArea.innerHTML = `<div class="cmd-card mode-place"><div class="cmd-head">PLACE ON</div><div class="cmd-body">${sortedP9.map(p=>p.label).join(', ')}</div></div>`;
            } else {
                sigArea.innerHTML = `<div class="cmd-card mode-wait"><div class="cmd-head">COMMANDER</div><div class="cmd-body">WAIT...</div></div>`;
            }
        }
        
        document.getElementById('stat-p').innerText = `$${state.profit.toFixed(2)}`;
        document.getElementById('stat-h').innerText = `$${state.high.toFixed(2)}`;
        document.getElementById('stat-rolls').innerText = state.history.length;
        document.getElementById('stat-b').innerText = state.isBetting ? `$${(state.unit * 9 * conf.unitVal).toFixed(2)}` : "$0";
        
        const feed = document.getElementById('feed'); feed.innerHTML = '';
        state.history.slice(-8).reverse().forEach(n => {
            const chip = document.createElement('div'); chip.className='chip';
            chip.style.background = (n === 0 || n > 36) ? '#2e7d32' : (reds.includes(n) ? '#d32f2f' : '#000');
            chip.innerText = n === 37 ? '00' : (n === 38 ? '000' : n); feed.appendChild(chip);
        });

        const bdy = document.getElementById('audit-body'); bdy.innerHTML = '';
        auditSorted.forEach((p, idx) => renderRow(p, bdy));
    }

    function renderRow(p, bdy) {
        const tr = document.createElement('tr');
        let color = p.hs >= 0.5 ? 'var(--red)' : (p.hs >= 0.4 ? 'var(--yellow)' : 'var(--blue)');
        tr.innerHTML = `<td><b>${p.label}</b><div class="heat-bg"><div class="heat-fill" style="width:${Math.min(100,(p.hs/2)*100)}%; background:${color}"></div></div></td><td>${p.winH}</td><td>${p.d}</td><td>${p.hits}</td><td>${p.hs.toFixed(3)}</td>`;
        bdy.appendChild(tr);
    }

    document.getElementById('final-undo').onclick = function() { 
        if(!state.stack.length) return; 
        Object.assign(state, JSON.parse(state.stack.pop())); 
        const btn = document.getElementById('bet-toggle');
        btn.innerText = state.isBetting ? "BET: ON" : "BET: OFF";
        btn.className = state.isBetting ? "bet-toggle-btn bet-on" : "bet-toggle-btn bet-off";
        engine(); refresh(); 
    };
})();
</script>
</body>
</html>
