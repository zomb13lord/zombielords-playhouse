<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Node | Strategic Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@300;600;800&display=swap');
        :root { --emerald: #10b981; --gold: #c5a059; --bg-dark: #020617; }

        body { 
            margin: 0; padding: 0; background-color: var(--bg-dark); color: #f8fafc; 
            font-family: 'Montserrat', sans-serif; min-height: 100vh; display: flex; flex-direction: column;
            background-image: linear-gradient(to bottom, rgba(2, 6, 23, 0.8) 0%, rgba(2, 6, 23, 0.98) 100%), 
                              url('https://zomb13lord.github.io/zombielords-playhouse/background.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow: hidden;
        }

        .cinzel { font-family: 'Cinzel', serif; }
        .shard { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 8px; }

        /* Numpad Styling */
        .numpad-btn { transition: all 0.1s ease; cursor: pointer; display: flex; align-items: center; justify-content: center; user-select: none; font-weight: 800; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }
        .numpad-btn:active { transform: scale(0.95); filter: brightness(1.3); }

        .btn-red { background-color: #991b1b; color: white; }
        .btn-black { background-color: #0f172a; color: white; }
        .btn-green { background-color: #065f46; color: white; }

        /* History Chip Styling */
        .chip { width: 42px; height: 42px; display: flex; items-center: center; justify-content: center; border-radius: 50%; font-weight: 900; font-family: 'Cinzel'; border: 2px solid rgba(255,255,255,0.15); box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .latest-chip { border-color: var(--gold); box-shadow: 0 0 20px rgba(197, 160, 89, 0.4); transform: scale(1.15); }

        .config-select { background: #020617; border: 1px solid #334155; color: #94a3b8; font-size: 11px; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <nav class="p-4 flex justify-between items-center bg-slate-950/60 backdrop-blur-xl border-b border-emerald-900/30 sticky top-0 z-[50] h-[76px] flex-shrink-0">
        <div class="flex flex-col items-center cursor-pointer hover:opacity-80 transition-opacity" onclick="window.location.assign('lobby.html')">
            <h2 class="text-sm font-black text-emerald-500 tracking-tighter uppercase leading-none">Zombie Lord's</h2>
            <span class="text-[9px] text-slate-200 tracking-[0.4em] uppercase font-bold mt-1">Playhouse</span>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="window.location.assign('roulette-config.html')" class="text-[10px] text-slate-400 hover:text-emerald-400 transition-all uppercase font-bold tracking-[0.2em]">Config</button>
            <button id="btn-save-archive" onclick="handleSaveArchive()" class="text-[10px] text-emerald-400 hover:text-emerald-300 transition-all uppercase font-bold tracking-[0.2em]">Archive</button>
            <button onclick="auth.signOut().then(()=>window.location.href='index.html')" class="text-[10px] border border-red-500/40 px-4 py-1.5 bg-red-950/30 hover:bg-red-600 hover:text-white transition-all uppercase font-black tracking-[0.2em]">Logout</button>
        </div>
    </nav>

    <main class="flex-grow flex flex-col gap-4 p-4 w-full max-w-[1400px] mx-auto overflow-hidden">
        
        <div class="shard p-4 flex flex-col gap-6 flex-shrink-0">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="text-center px-4 border-r border-emerald-900/30">
                        <div class="text-[8px] text-slate-500 uppercase tracking-widest font-bold">Total</div>
                        <div id="hud-count" class="text-lg cinzel text-white">0</div>
                    </div>
                    <div>
                        <h3 class="text-[10px] cinzel text-emerald-500 uppercase font-black tracking-[0.2em]">Data Stream</h3>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <select id="view-limit" class="config-select" onchange="renderHistory()">
                        <option value="6">6 Chips</option>
                        <option value="9" selected>9 Chips</option>
                        <option value="12">12 Chips</option>
                    </select>
                    <button onclick="undoRoll()" class="text-[10px] text-slate-400 hover:text-white uppercase font-bold transition-colors"><i class="fa-solid fa-rotate-left mr-1"></i> Undo</button>
                    <button onclick="resetRolls()" class="text-[10px] text-red-500/70 hover:text-red-400 uppercase font-bold transition-colors">Reset</button>
                </div>
            </div>

            <div id="history-chips" class="flex flex-row-reverse justify-center gap-4 md:gap-6 min-h-[50px]">
                <span class="text-xs text-slate-700 uppercase tracking-[0.3em] italic">Awaiting Input</span>
            </div>
        </div>

        <div class="shard flex-grow overflow-hidden flex flex-col p-2 md:p-4">
            <div id="numpad-container" class="w-full h-full">
                </div>
        </div>
    </main>

    <div id="archive-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/95 backdrop-blur-md hidden">
        <div class="max-w-sm w-full p-8 shard text-center relative border border-emerald-500/50">
            <h2 class="cinzel text-2xl text-emerald-400 mb-4 uppercase tracking-widest font-black">Commit Archive</h2>
            <input type="text" id="archive-name" placeholder="SESSION NAME" class="w-full bg-slate-950 border border-emerald-900/50 rounded p-3 mb-6 uppercase text-white text-center outline-none">
            <button onclick="confirmArchive()" class="w-full p-4 bg-emerald-900/40 border border-emerald-500 text-emerald-400 uppercase font-black tracking-widest rounded hover:bg-emerald-500 hover:text-slate-900 transition-all">Save Archive</button>
            <button onclick="document.getElementById('archive-modal').classList.add('hidden')" class="mt-4 text-[10px] text-slate-500 uppercase tracking-widest">Cancel</button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-6 py-2 rounded-full text-xs font-black uppercase tracking-widest opacity-0 transition-opacity pointer-events-none z-[200]">Sync Complete</div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBSUXdz7HqwkENhQqEJLItxYm-LAwkgbmY", authDomain: "zombielords-playhouse.firebaseapp.com", projectId: "zombielords-playhouse", storageBucket: "zombielords-playhouse.firebasestorage.app", messagingSenderId: "795162260246", appId: "1:795162260246:web:97f0361751ac1359b31637" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(); const auth = firebase.auth();
        let sessionData = null; let currentUid = null;
        const redNums = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];

        auth.onAuthStateChanged(user => { if(user){ currentUid = user.uid; initTracker(); } else window.location.href="index.html"; });

        async function initTracker() {
            const doc = await db.collection("users").doc(currentUid).collection("sessions").doc("active_session").get();
            if(doc.exists) {
                sessionData = doc.data(); if(!sessionData.rolls) sessionData.rolls = [];
                document.getElementById('btn-save-archive').innerText = sessionData.name ? "SAVE" : "ARCHIVE";
                renderNumpad(); renderHistory(); updateHUD();
            } else window.location.assign('roulette-config.html');
        }

        // PHYSICAL TABLE MAPPING
        // Rows on a roulette table (3 to 36, 2 to 35, 1 to 34)
        const feltLayout = [
            [3, 6, 9, 12, 15, 18, 21, 24, 27, 30, 33, 36], // Top Row
            [2, 5, 8, 11, 14, 17, 20, 23, 26, 29, 32, 35], // Mid Row
            [1, 4, 7, 10, 13, 16, 19, 22, 25, 28, 31, 34]  // Bottom Row
        ];

        function getNumColor(n) {
            if(n === '0' || n === '00' || n === '000') return 'btn-green';
            return redNums.includes(parseInt(n)) ? 'btn-red' : 'btn-black';
        }

        function renderNumpad() {
            const container = document.getElementById('numpad-container');
            const wheel = sessionData.wheel || "US";
            const zeroes = wheel === 'TZ' ? ['000','00','0'] : (wheel === 'US' ? ['00','0'] : ['0']);
            const isMobile = window.innerWidth < 768;

            let html = '';

            if(!isMobile) {
                // DESKTOP: 13-column grid (1 for zeroes, 12 for numbers)
                html = `<div class="grid grid-cols-13 h-full gap-1.5">`;
                
                // Zero Column
                html += `<div class="grid grid-rows-3 gap-1.5">`;
                zeroes.forEach(z => html += `<button onclick="inputRoll('${z}')" class="numpad-btn btn-green text-xl">${z}</button>`);
                // Fill empty zero slots if necessary to keep 3 height
                for(let i=0; i < (3 - zeroes.length); i++) html += `<div class="opacity-0"></div>`;
                html += `</div>`;

                // Numbers 1-36 (12 Columns)
                for(let col = 0; col < 12; col++) {
                    html += `<div class="grid grid-rows-3 gap-1.5">`;
                    for(let row = 0; row < 3; row++) {
                        const val = feltLayout[row][col];
                        html += `<button onclick="inputRoll('${val}')" class="numpad-btn ${getNumColor(val)} text-xl">${val}</button>`;
                    }
                    html += `</div>`;
                }
                html += `</div>`;
            } else {
                // MOBILE: 3-column grid (Roulette Portrait)
                html = `<div class="grid grid-cols-3 h-full gap-1.5">`;
                
                // Zero Header
                const zSpan = zeroes.length === 1 ? 'col-span-3' : (zeroes.length === 2 ? 'col-span-1' : 'col-span-1');
                zeroes.forEach(z => {
                    const mobileSpan = zeroes.length === 1 ? 'col-span-3' : (zeroes.length === 2 && z === '00' ? 'col-span-1' : (zeroes.length === 2 ? 'col-span-2' : 'col-span-1'));
                    html += `<button onclick="inputRoll('${z}')" class="numpad-btn btn-green ${mobileSpan} h-14 text-lg">${z}</button>`;
                });

                // Numbers 1-36 (Rows of 3)
                for(let col = 0; col < 12; col++) {
                    // Mobile reads bottom to top of column or left to right? 
                    // Standard mobile app layout matches felt columns:
                    const rowVals = [feltLayout[2][col], feltLayout[1][col], feltLayout[0][col]];
                    rowVals.forEach(val => {
                        html += `<button onclick="inputRoll('${val}')" class="numpad-btn ${getNumColor(val)} h-14 text-lg">${val}</button>`;
                    });
                }
                html += `</div>`;
            }
            container.innerHTML = html;
        }

        function renderHistory() {
            const limit = parseInt(document.getElementById('view-limit').value);
            const container = document.getElementById('history-chips');
            const rolls = sessionData.rolls || [];
            if(rolls.length === 0) return;

            container.innerHTML = rolls.slice(0, limit).map((r, i) => `
                <div class="chip ${getChipColor(r.n)} ${i === 0 ? 'latest-chip' : 'opacity-60 scale-90'}">
                    ${r.n}
                </div>
            `).join('');
        }

        function getChipColor(n) {
            if(n === '0' || n === '00' || n === '000') return 'chip-green';
            return redNums.includes(parseInt(n)) ? 'chip-red' : 'chip-black';
        }

        function updateHUD() {
            const rolls = sessionData.rolls || [];
            document.getElementById('hud-count').innerText = rolls.length;
            const last = rolls[0] ? rolls[0].n : '--';
            const el = document.getElementById('hud-last');
            el.innerText = last;
            el.className = `cinzel text-4xl font-black ${last==='--' ? 'text-slate-700' : (getChipColor(last).replace('chip','text'))}`;
        }

        async function inputRoll(n) {
            sessionData.rolls.unshift({ n: n.toString(), t: Date.now() });
            renderHistory(); updateHUD();
            await db.collection("users").doc(currentUid).collection("sessions").doc("active_session").update({ rolls: sessionData.rolls });
        }

        async function undoRoll() {
            if(sessionData.rolls.length > 0) {
                sessionData.rolls.shift(); renderHistory(); updateHUD();
                await db.collection("users").doc(currentUid).collection("sessions").doc("active_session").update({ rolls: sessionData.rolls });
            }
        }

        async function resetRolls() {
            if(confirm("Purge all rolls?")) {
                sessionData.rolls = []; renderHistory(); updateHUD();
                await db.collection("users").doc(currentUid).collection("sessions").doc("active_session").update({ rolls: [] });
            }
        }

        async function handleSaveArchive() {
            if(sessionData.name) {
                const snap = await db.collection("users").doc(currentUid).collection("sessions").where("name","==",sessionData.name).get();
                if(!snap.empty) {
                    await snap.docs[0].ref.update({ rolls: sessionData.rolls, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                    showToast();
                }
            } else { document.getElementById('archive-modal').classList.remove('hidden'); }
        }

        async function confirmArchive() {
            const name = document.getElementById('archive-name').value.toUpperCase().trim() || "SESSION_" + Date.now();
            const data = { ...sessionData, name, timestamp: firebase.firestore.FieldValue.serverTimestamp() };
            await db.collection("users").doc(currentUid).collection("sessions").add(data);
            await db.collection("users").doc(currentUid).collection("sessions").doc("active_session").update({ name });
            sessionData.name = name; document.getElementById('archive-modal').classList.add('hidden');
            document.getElementById('btn-save-archive').innerText = "SAVE"; showToast();
        }

        function showToast() { const t = document.getElementById('toast'); t.classList.remove('opacity-0'); setTimeout(()=>t.classList.add('opacity-0'), 2000); }

        window.addEventListener('resize', renderNumpad);
    </script>
</body>
</html>
