<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Node | Strategic Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@300;600;800&display=swap');
        
        :root { 
            --gold: #c5a059; 
            --bg-dark: #020617; 
            --emerald: #10b981; 
        }

        body { 
            margin: 0; padding: 0;
            background-color: var(--bg-dark); 
            color: #f8fafc; 
            font-family: 'Montserrat', sans-serif; 
            height: 100vh;
            display: flex; 
            flex-direction: column;
            background-image: linear-gradient(to bottom, rgba(2, 6, 23, 0.6) 0%, rgba(2, 6, 23, 0.95) 100%), 
                              url('https://zomb13lord.github.io/zombielords-playhouse/background.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            overflow: hidden; /* Prevents body scroll, handles scrolling internally */
        }

        .cinzel { font-family: 'Cinzel', serif; }
        
        .shard { 
            background: rgba(15, 23, 42, 0.65); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(16, 185, 129, 0.2); 
            border-radius: 6px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .numpad-btn { 
            transition: all 0.15s ease; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        
        /* Color Theming for the Board */
        .btn-red { background: rgba(127, 29, 29, 0.3); border: 1px solid rgba(239, 68, 68, 0.4); color: #fca5a5; }
        .btn-red:hover, .btn-red:active { background: rgba(220, 38, 38, 0.8); border-color: #f87171; color: white; box-shadow: 0 0 15px rgba(239, 68, 68, 0.5); }
        
        .btn-black { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(100, 116, 139, 0.4); color: #cbd5e1; }
        .btn-black:hover, .btn-black:active { background: rgba(51, 65, 85, 0.9); border-color: #94a3b8; color: white; box-shadow: 0 0 15px rgba(148, 163, 184, 0.5); }
        
        .btn-green { background: rgba(6, 95, 70, 0.4); border: 1px solid rgba(16, 185, 129, 0.5); color: #6ee7b7; }
        .btn-green:hover, .btn-green:active { background: rgba(5, 150, 105, 0.9); border-color: #34d399; color: white; box-shadow: 0 0 15px rgba(16, 185, 129, 0.5); }

        .history-pill { 
            background: rgba(2, 6, 23, 0.6); 
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 4px;
            padding: 8px 12px; 
            margin-bottom: 6px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }
        .history-pill:hover { background: rgba(15, 23, 42, 0.9); border-color: rgba(16, 185, 129, 0.3); }

        .metric-box {
            background: rgba(2, 6, 23, 0.8);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 4px;
        }

        /* Hide scrollbar for sleekness */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

    <nav class="p-4 flex justify-between items-center bg-slate-950/80 backdrop-blur-xl border-b border-emerald-900/40 sticky top-0 z-[50] h-[70px] flex-shrink-0">
        <div class="flex flex-col items-center cursor-pointer hover:opacity-80 transition-opacity" onclick="window.location.assign('lobby.html')">
            <h2 class="text-sm font-black text-emerald-500 tracking-tighter uppercase leading-none drop-shadow-[0_0_10px_rgba(16,185,129,0.5)]">Live Node</h2>
            <span id="protocol-tag" class="text-[8px] text-slate-400 tracking-[0.2em] uppercase font-bold mt-1">Initializing...</span>
        </div>
        
        <div class="flex items-center gap-3 md:gap-6">
            <button onclick="window.location.assign('roulette-config.html')" class="text-[9px] text-slate-400 hover:text-emerald-400 transition-all uppercase font-bold tracking-widest"><i class="fa-solid fa-gear md:mr-1"></i> <span class="hidden md:inline">Config</span></button>
            <button onclick="triggerArchive()" class="text-[9px] border border-emerald-500/40 px-3 py-1.5 bg-emerald-950/30 text-emerald-400 hover:bg-emerald-600 hover:text-white transition-all uppercase font-black tracking-widest rounded"><i class="fa-solid fa-vault md:mr-1"></i> <span class="hidden md:inline">Archive</span></button>
        </div>
    </nav>

    <main class="flex-grow flex flex-col md:flex-row gap-4 p-4 w-full max-w-6xl mx-auto overflow-hidden">
        
        <div class="w-full md:w-1/3 lg:w-1/4 shard flex flex-col overflow-hidden order-2 md:order-1 h-48 md:h-full">
            <div class="p-3 border-b border-emerald-900/40 bg-slate-900/50 flex justify-between items-center">
                <h3 class="text-[10px] cinzel text-emerald-500 uppercase font-black tracking-[0.2em]">Data Stream</h3>
                <span id="hud-count" class="text-[10px] text-slate-400 font-bold">0 Rolls</span>
            </div>
            <div id="history-log" class="overflow-y-auto flex-grow p-3 no-scrollbar space-y-1">
                <div class="text-center text-slate-600 text-xs mt-4 italic uppercase tracking-widest">Awaiting Input...</div>
            </div>
        </div>

        <div class="w-full md:w-2/3 lg:w-3/4 flex flex-col gap-4 overflow-hidden order-1 md:order-2 h-[calc(100vh-320px)] md:h-full">
            
            <div class="shard p-4 flex gap-4 justify-between items-center flex-shrink-0">
                <div class="metric-box flex-1 p-3 text-center">
                    <div class="text-[9px] text-slate-500 uppercase tracking-widest mb-1 font-bold">Latest Signature</div>
                    <div id="hud-last" class="cinzel text-emerald-400 text-4xl md:text-5xl font-black drop-shadow-[0_0_15px_rgba(16,185,129,0.3)]">--</div>
                </div>
                
                <div class="metric-box flex-1 p-3 text-center hidden sm:block">
                    <div class="text-[9px] text-slate-500 uppercase tracking-widest mb-1 font-bold">Target Status</div>
                    <div class="cinzel text-slate-300 text-xl md:text-2xl font-bold mt-2">STANDBY</div>
                </div>
                
                <div class="metric-box flex-1 p-3 text-center">
                    <div class="text-[9px] text-slate-500 uppercase tracking-widest mb-1 font-bold">Current Action</div>
                    <div class="cinzel text-emerald-500 text-xl md:text-2xl font-bold mt-2 animate-pulse">OBSERVE</div>
                </div>
            </div>

            <div id="numpad-container" class="shard p-4 flex-grow overflow-y-auto no-scrollbar flex flex-col justify-center">
                </div>
        </div>
    </main>

    <div id="archive-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/95 backdrop-blur-md hidden">
        <div class="max-w-sm w-full p-8 shard text-center relative border border-emerald-500/50 shadow-[0_0_50px_rgba(16,185,129,0.1)]">
            <button onclick="closeArchive()" class="absolute top-4 right-4 text-slate-500 hover:text-red-400 transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
            <h2 class="cinzel text-2xl text-emerald-400 mb-2 uppercase tracking-widest font-black">Commit to Vault</h2>
            <p class="text-xs text-slate-400 mb-6 uppercase tracking-widest">Finalize Session Data</p>
            
            <label class="block text-left text-[9px] text-emerald-500 uppercase tracking-widest font-bold mb-2">Designation</label>
            <input type="text" id="archive-name" placeholder="E.g. ALPHA RUN 01" class="w-full bg-slate-950 border border-emerald-900/50 rounded p-3 mb-6 uppercase text-white outline-none focus:border-emerald-400 focus:shadow-[0_0_15px_rgba(16,185,129,0.3)] transition-all font-bold tracking-wider text-sm">
            
            <button onclick="confirmArchive()" class="w-full p-4 bg-emerald-900/40 border border-emerald-500 text-emerald-400 uppercase font-black tracking-widest rounded hover:bg-emerald-500 hover:text-slate-900 transition-all flex justify-center items-center gap-3">
                <i class="fa-solid fa-database"></i> Save Archive
            </button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBSUXdz7HqwkENhQqEJLItxYm-LAwkgbmY", authDomain: "zombielords-playhouse.firebaseapp.com", projectId: "zombielords-playhouse", storageBucket: "zombielords-playhouse.firebasestorage.app", messagingSenderId: "795162260246", appId: "1:795162260246:web:97f0361751ac1359b31637" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); 
        const db = firebase.firestore();
        
        let sessionData = null;
        const redNums = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];

        // Ensure user is logged in
        auth.onAuthStateChanged(user => { 
            if (!user) window.location.href = "index.html"; 
            else initTracker(); 
        });

        async function initTracker() {
            try {
                const doc = await db.collection("users").doc(auth.currentUser.uid).collection("sessions").doc("active_session").get();
                if (doc.exists) {
                    sessionData = doc.data();
                    const strat = sessionData.strategy ? sessionData.strategy.toUpperCase() : "FIXED";
                    const wheel = sessionData.wheel || "US";
                    
                    document.getElementById('protocol-tag').innerText = `PROTOCOL: ${strat} | WHEEL: ${wheel}`;
                    
                    if(sessionData.rolls && sessionData.rolls.length > 0) {
                        const lastRoll = sessionData.rolls[0].n;
                        document.getElementById('hud-last').innerText = lastRoll;
                        document.getElementById('hud-last').className = `cinzel text-4xl md:text-5xl font-black drop-shadow-[0_0_15px_rgba(255,255,255,0.2)] ${getColorTextClass(lastRoll)}`;
                    }
                    
                    renderNumpad(wheel);
                    renderHistory();
                } else {
                    // No active session found, force them to config
                    window.location.assign('roulette-config.html');
                }
            } catch (err) {
                console.error("Tracker Init Error:", err);
            }
        }

        function getColorTextClass(n) {
            if(n === '0' || n === '00' || n === '000') return 'text-emerald-400';
            if(redNums.includes(parseInt(n))) return 'text-red-400';
            return 'text-slate-300';
        }

        function renderNumpad(wheelType) {
            const container = document.getElementById('numpad-container');
            let html = '';
            
            // Build the Zero row based on wheel type
            let zeroes = ['0'];
            if(wheelType === 'US') zeroes = ['00', '0'];
            if(wheelType === 'TZ') zeroes = ['000', '00', '0'];
            
            html += `<div class="grid grid-cols-${zeroes.length} gap-2 mb-2">`;
            zeroes.forEach(z => {
                html += `<button onclick="inputRoll('${z}')" class="numpad-btn btn-green cinzel text-2xl md:text-3xl py-4 md:py-6 rounded-md font-black shadow-md">${z}</button>`;
            });
            html += `</div>`;

            // Build the 1-36 Grid
            html += `<div class="grid grid-cols-3 gap-2">`;
            for(let i=1; i<=36; i++) {
                const isRed = redNums.includes(i);
                const btnClass = isRed ? 'btn-red' : 'btn-black';
                html += `<button onclick="inputRoll('${i}')" class="numpad-btn ${btnClass} cinzel text-2xl md:text-3xl py-3 md:py-5 rounded-md font-black shadow-md">${i}</button>`;
            }
            html += `</div>`;

            container.innerHTML = html;
        }

        async function inputRoll(n) {
            const now = new Date();
            const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const roll = { n: n.toString(), t: timeStr };
            
            if(!sessionData.rolls) sessionData.rolls = [];
            sessionData.rolls.unshift(roll); // Add to beginning of array
            
            // Update HUD
            document.getElementById('hud-last').innerText = n;
            document.getElementById('hud-last').className = `cinzel text-4xl md:text-5xl font-black drop-shadow-[0_0_15px_rgba(255,255,255,0.2)] ${getColorTextClass(n)}`;
            
            renderHistory();
            
            // Background save to Firestore
            try {
                await db.collection("users").doc(auth.currentUser.uid).collection("sessions").doc("active_session").update({ 
                    rolls: sessionData.rolls 
                });
            } catch (err) {
                console.error("Failed to sync roll to database:", err);
            }
        }

        function renderHistory() {
            if(!sessionData.rolls || sessionData.rolls.length === 0) return;
            
            document.getElementById('hud-count').innerText = `${sessionData.rolls.length} ROLLS`;
            
            const historyHtml = sessionData.rolls.map((r, index) => {
                const colorClass = getColorTextClass(r.n);
                const isLatest = index === 0 ? 'border-l-2 border-l-emerald-400 bg-slate-800/80' : '';
                
                return `
                    <div class="history-pill ${isLatest}">
                        <div class="flex items-center gap-3">
                            <span class="text-[9px] text-slate-500 font-bold w-4">#${sessionData.rolls.length - index}</span>
                            <span class="cinzel text-lg font-black ${colorClass}">${r.n}</span>
                        </div>
                        <span class="text-[9px] text-slate-500 tracking-widest uppercase">${r.t}</span>
                    </div>
                `;
            }).join('');
            
            document.getElementById('history-log').innerHTML = historyHtml;
        }

        // Modal Controls
        function triggerArchive() { 
            // Pre-fill name if it exists
            if(sessionData.name) document.getElementById('archive-name').value = sessionData.name;
            document.getElementById('archive-modal').classList.remove('hidden'); 
        }
        
        function closeArchive() { 
            document.getElementById('archive-modal').classList.add('hidden'); 
        }
        
        async function confirmArchive() {
            const nameInput = document.getElementById('archive-name').value.trim();
            const archiveName = nameInput !== "" ? nameInput.toUpperCase() : "TRIAL_NODE_" + Math.floor(Math.random()*1000);
            
            try {
                // Prep data payload
                const archivedData = { 
                    ...sessionData, 
                    name: archiveName, 
                    timestamp: firebase.firestore.FieldValue.serverTimestamp() 
                };
                
                // Add to general sessions collection (creates new doc with auto-ID)
                await db.collection("users").doc(auth.currentUser.uid).collection("sessions").add(archivedData);
                
                // Delete active session to clean slate
                await db.collection("users").doc(auth.currentUser.uid).collection("sessions").doc("active_session").delete();
                
                window.location.assign("archives.html");
            } catch (err) {
                console.error("Archive Failed:", err);
                alert("Failed to commit archive to database.");
            }
        }
    </script>
</body>
</html>
