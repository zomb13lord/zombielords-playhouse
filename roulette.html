<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Node | Strategic Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@300;600;800&display=swap');
        
        :root { --emerald: #10b981; --bg-dark: #020617; }

        body { 
            margin: 0; padding: 0; background-color: var(--bg-dark); color: #f8fafc; 
            font-family: 'Montserrat', sans-serif; min-height: 100vh; display: flex; flex-direction: column;
            background-image: linear-gradient(to bottom, rgba(2, 6, 23, 0.7) 0%, rgba(2, 6, 23, 0.95) 100%), 
                              url('https://zomb13lord.github.io/zombielords-playhouse/background.png');
            background-size: cover; background-position: center; background-attachment: fixed;
        }

        .cinzel { font-family: 'Cinzel', serif; }
        .shard { background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(16px); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 8px; }

        /* Numpad Button Logic */
        .numpad-btn { transition: all 0.1s ease; cursor: pointer; display: flex; align-items: center; justify-content: center; user-select: none; font-weight: 800; }
        .numpad-btn:active { transform: scale(0.95); filter: brightness(1.2); }

        /* Color States */
        .chip-red, .btn-red { background-color: #b91c1c; color: white; border: 1px solid rgba(255,255,255,0.1); }
        .chip-black, .btn-black { background-color: #0f172a; color: white; border: 1px solid rgba(255,255,255,0.1); }
        .chip-green, .btn-green { background-color: #059669; color: white; border: 1px solid rgba(255,255,255,0.1); }

        .latest-chip { border: 2px solid var(--gold); box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); z-index: 10; transform: scale(1.1); }

        /* Custom Dropdown */
        .config-select { background: #0f172a; border: 1px solid #1e293b; color: #94a3b8; font-size: 10px; padding: 4px 8px; border-radius: 4px; outline: none; cursor: pointer; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <nav class="p-4 flex justify-between items-center bg-slate-950/60 backdrop-blur-xl border-b border-emerald-900/30 sticky top-0 z-[50] h-[76px] flex-shrink-0">
        <div class="flex flex-col items-center cursor-pointer hover:opacity-80 transition-opacity" onclick="window.location.assign('lobby.html')">
            <h2 class="text-sm font-black text-emerald-500 tracking-tighter uppercase leading-none">Zombie Lord's</h2>
            <span class="text-[9px] text-slate-200 tracking-[0.4em] uppercase font-bold mt-1">Playhouse</span>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="window.location.assign('roulette-config.html')" class="text-[10px] text-slate-400 hover:text-emerald-400 transition-all uppercase font-bold tracking-[0.2em]">Config</button>
            <button id="btn-save-archive" onclick="handleSaveArchive()" class="text-[10px] text-emerald-400 hover:text-emerald-300 transition-all uppercase font-bold tracking-[0.2em]">Archive</button>
            <button onclick="auth.signOut().then(()=>window.location.href='index.html')" class="text-[10px] border border-red-500/40 px-4 py-1.5 bg-red-950/30 hover:bg-red-600 hover:text-white transition-all uppercase font-black tracking-[0.2em]">Logout</button>
        </div>
    </nav>

    <main class="flex-grow flex flex-col gap-4 p-4 w-full max-w-6xl mx-auto no-scrollbar overflow-y-auto">
        
        <div class="shard p-4 grid grid-cols-2 md:grid-cols-3 gap-4 items-center">
            <div class="bg-black/40 p-3 rounded text-center">
                <div class="text-[9px] text-slate-500 uppercase tracking-widest font-bold mb-1">Last Signature</div>
                <div id="hud-last" class="cinzel text-3xl font-black">--</div>
            </div>
            <div class="bg-black/40 p-3 rounded text-center hidden md:block border-x border-emerald-900/20">
                <div class="text-[9px] text-slate-500 uppercase tracking-widest font-bold mb-1">Status</div>
                <div class="cinzel text-emerald-500 text-xl font-bold animate-pulse">OBSERVE</div>
            </div>
            <div class="bg-black/40 p-3 rounded text-center">
                <div class="text-[9px] text-slate-500 uppercase tracking-widest font-bold mb-1">Session Data</div>
                <div id="hud-count" class="cinzel text-xl text-slate-300 font-bold">0 ROLLS</div>
            </div>
        </div>

        <div class="shard p-4 flex flex-col gap-4">
            <div class="flex justify-between items-center border-b border-emerald-900/20 pb-3">
                <h3 class="text-[10px] cinzel text-emerald-500 uppercase font-black tracking-[0.2em]">Data Stream</h3>
                <div class="flex items-center gap-3">
                    <select id="view-limit" class="config-select" onchange="renderHistory()">
                        <option value="3">Show 3</option>
                        <option value="6">Show 6</option>
                        <option value="9" selected>Show 9</option>
                        <option value="12">Show 12</option>
                    </select>
                    <button onclick="undoRoll()" class="text-[9px] text-slate-400 hover:text-white uppercase font-bold"><i class="fa-solid fa-rotate-left mr-1"></i> Undo</button>
                    <button onclick="resetRolls()" class="text-[9px] text-red-400 hover:text-red-200 uppercase font-bold"><i class="fa-solid fa-trash mr-1"></i> Reset</button>
                </div>
            </div>
            
            <div id="history-chips" class="flex flex-row-reverse justify-center flex-wrap gap-3 py-2 min-h-[50px]">
                </div>
        </div>

        <div id="numpad-container" class="shard p-4 mb-10">
            </div>

    </main>

    <div id="archive-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/95 backdrop-blur-md hidden">
        <div class="max-w-sm w-full p-8 shard text-center relative border border-emerald-500/50">
            <h2 class="cinzel text-2xl text-emerald-400 mb-4 uppercase tracking-widest font-black">Commit Archive</h2>
            <input type="text" id="archive-name" placeholder="SESSION NAME" class="w-full bg-slate-950 border border-emerald-900/50 rounded p-3 mb-6 uppercase text-white text-center outline-none">
            <button onclick="confirmArchive()" class="w-full p-4 bg-emerald-900/40 border border-emerald-500 text-emerald-400 uppercase font-black tracking-widest rounded hover:bg-emerald-500 hover:text-slate-900 transition-all">Save Archive</button>
            <button onclick="document.getElementById('archive-modal').classList.add('hidden')" class="mt-4 text-[10px] text-slate-500 uppercase tracking-widest">Cancel</button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-6 py-2 rounded-full text-xs font-black uppercase tracking-widest opacity-0 transition-opacity pointer-events-none z-[200]">Saved</div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBSUXdz7HqwkENhQqEJLItxYm-LAwkgbmY", authDomain: "zombielords-playhouse.firebaseapp.com", projectId: "zombielords-playhouse", storageBucket: "zombielords-playhouse.firebasestorage.app", messagingSenderId: "795162260246", appId: "1:795162260246:web:97f0361751ac1359b31637" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(); const auth = firebase.auth();
        let sessionData = null; let currentUid = null;
        const redNums = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];

        auth.onAuthStateChanged(user => { if(user){ currentUid = user.uid; initTracker(); } else window.location.href="index.html"; });

        async function initTracker() {
            const doc = await db.collection("users").doc(currentUid).collection("sessions").doc("active_session").get();
            if(doc.exists) {
                sessionData = doc.data(); if(!sessionData.rolls) sessionData.rolls = [];
                const btn = document.getElementById('btn-save-archive');
                btn.innerText = sessionData.name ? "SAVE" : "ARCHIVE";
                renderNumpad(); renderHistory(); updateHUD();
            } else window.location.assign('roulette-config.html');
        }

        function getChipColor(n) {
            if(n === '0' || n === '00' || n === '000') return 'chip-green';
            return redNums.includes(parseInt(n)) ? 'chip-red' : 'chip-black';
        }

        function renderNumpad() {
            const container = document.getElementById('numpad-container');
            const wheel = sessionData.wheel || "US";
            let zeroes = wheel === 'TZ' ? ['000','00','0'] : (wheel === 'US' ? ['00','0'] : ['0']);
            
            let html = `<div class="grid grid-cols-2 md:grid-cols-9 gap-2">`;
            
            // Render Zeroes first
            zeroes.forEach(z => {
                html += `<button onclick="inputRoll('${z}')" class="numpad-btn btn-green h-16 md:h-20 rounded-md text-2xl cinzel">${z}</button>`;
            });

            // Render 1-36
            for(let i=1; i<=36; i++) {
                const c = redNums.includes(i) ? 'btn-red' : 'btn-black';
                html += `<button onclick="inputRoll('${i}')" class="numpad-btn ${c} h-16 md:h-20 rounded-md text-2xl cinzel">${i}</button>`;
            }
            html += `</div>`;
            container.innerHTML = html;
        }

        function renderHistory() {
            const limit = parseInt(document.getElementById('view-limit').value);
            const container = document.getElementById('history-chips');
            const rolls = sessionData.rolls || [];
            
            if(rolls.length === 0) {
                container.innerHTML = `<span class="text-[10px] text-slate-600 uppercase tracking-widest italic">Awaiting Input...</span>`;
                return;
            }

            const slice = rolls.slice(0, limit);
            container.innerHTML = slice.map((r, i) => `
                <div class="w-10 h-10 md:w-12 md:h-12 flex items-center justify-center rounded-full font-black text-lg shadow-lg transition-all ${getChipColor(r.n)} ${i === 0 ? 'latest-chip' : 'opacity-80 scale-90'}">
                    ${r.n}
                </div>
            `).join('');
        }

        function updateHUD() {
            const rolls = sessionData.rolls || [];
            document.getElementById('hud-count').innerText = `${rolls.length} ROLLS`;
            const last = rolls[0] ? rolls[0].n : '--';
            const el = document.getElementById('hud-last');
            el.innerText = last;
            el.className = `cinzel text-3xl font-black ${last==='--' ? 'text-slate-600' : (getChipColor(last).replace('chip','text'))}`;
        }

        async function inputRoll(n) {
            sessionData.rolls.unshift({ n: n.toString(), t: Date.now() });
            renderHistory(); updateHUD();
            await db.collection("users").doc(currentUid).collection("sessions").doc("active_session").update({ rolls: sessionData.rolls });
        }

        async function undoRoll() {
            if(sessionData.rolls.length > 0) {
                sessionData.rolls.shift(); renderHistory(); updateHUD();
                await db.collection("users").doc(currentUid).collection("sessions").doc("active_session").update({ rolls: sessionData.rolls });
            }
        }

        async function resetRolls() {
            if(confirm("Wipe session rolls?")) {
                sessionData.rolls = []; renderHistory(); updateHUD();
                await db.collection("users").doc(currentUid).collection("sessions").doc("active_session").update({ rolls: [] });
            }
        }

        async function handleSaveArchive() {
            if(sessionData.name) {
                const snap = await db.collection("users").doc(currentUid).collection("sessions").where("name","==",sessionData.name).get();
                if(!snap.empty) {
                    await snap.docs[0].ref.update({ rolls: sessionData.rolls, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                    showToast();
                }
            } else { document.getElementById('archive-modal').classList.remove('hidden'); }
        }

        async function confirmArchive() {
            const name = document.getElementById('archive-name').value.toUpperCase().trim() || "SESSION_" + Date.now();
            const data = { ...sessionData, name, timestamp: firebase.firestore.FieldValue.serverTimestamp() };
            await db.collection("users").doc(currentUid).collection("sessions").add(data);
            await db.collection("users").doc(currentUid).collection("sessions").doc("active_session").update({ name });
            sessionData.name = name; document.getElementById('archive-modal').classList.add('hidden');
            document.getElementById('btn-save-archive').innerText = "SAVE"; showToast();
        }

        function showToast() { 
            const t = document.getElementById('toast'); t.classList.remove('opacity-0'); 
            setTimeout(()=>t.classList.add('opacity-0'), 2000); 
        }
    </script>
</body>
</html>
