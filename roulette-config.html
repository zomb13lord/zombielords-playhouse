<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roulette Calibration | Zombie Lord's</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@300;600&display=swap');
        
        :root { 
            --gold: #c5a059; 
            --bg-dark: #020617; 
            --emerald: #10b981; 
        }

        body { 
            margin: 0; padding: 0;
            background-color: var(--bg-dark); 
            color: #f8fafc; 
            font-family: 'Cinzel', serif; 
            min-height: 100vh;
            background-image: linear-gradient(to bottom, rgba(2, 6, 23, 0.4) 0%, rgba(2, 6, 23, 0.95) 100%), 
                              url('https://zomb13lord.github.io/zombielords-playhouse/background.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .emerald-text { color: #10b981; text-shadow: 0 0 12px rgba(16, 185, 129, 0.4); }
        .gold-text { color: var(--gold); text-shadow: 0 0 5px rgba(197, 160, 89, 0.3); }
        
        /* Tactical Shard Buttons (Entry List) */
        .shard-btn { 
            background: rgba(15, 23, 42, 0.75); 
            backdrop-filter: blur(16px);
            border: 1px solid rgba(16, 185, 129, 0.2); 
            padding: 18px 30px; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px;
            border-radius: 4px; 
            width: 100%;
            margin-bottom: 12px;
        }
        .shard-btn:not(.disabled):hover { 
            border-color: #10b981; 
            background: rgba(16, 185, 129, 0.1);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.2);
            transform: translateY(-3px);
        }
        .shard-btn.disabled { opacity: 0.2; cursor: not-allowed; pointer-events: none; filter: grayscale(1); }
        .primary-shard { border-color: rgba(16, 185, 129, 0.6); background: rgba(16, 185, 129, 0.05); }

        /* Configuration Grid Styling */
        .shard { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(16, 185, 129, 0.2); }
        .config-input { background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 2px; width: 100%; outline: none; font-size: 11px; font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body class="flex flex-col">

    <nav class="p-4 flex justify-between items-center bg-slate-950/60 backdrop-blur-xl border-b border-emerald-900/30 sticky top-0 z-[100]">
        <div class="flex flex-col items-center cursor-pointer" onclick="window.location.href='lobby.html'">
            <h2 class="text-sm font-black emerald-text tracking-tighter uppercase leading-none">Zombie Lord's</h2>
            <span class="text-[9px] text-slate-200 tracking-[0.4em] uppercase font-bold mt-1">Playhouse</span>
        </div>
        <div class="flex items-center gap-6">
            <span id="user-tag" class="text-[9px] tracking-[0.2em] uppercase text-emerald-500/70 font-bold hidden md:block"></span>
            <a href="lobby.html" class="text-[9px] tracking-[0.2em] uppercase text-slate-400 hover:text-emerald-400 font-bold transition-all">Lobby</a>
            <button onclick="logout()" class="text-[10px] border border-red-500/40 px-4 py-1.5 bg-red-950/30 hover:bg-red-600 hover:text-white transition-all uppercase font-black tracking-[0.2em]">
                Extinguish
            </button>
        </div>
    </nav>

    <div id="vault-modal" class="fixed inset-0 z-[80] flex items-center justify-center bg-black/95 backdrop-blur-md hidden">
        <div class="max-w-md w-full p-8 text-center mt-20">
            <h1 class="cinzel text-4xl emerald-text mb-12 uppercase tracking-[0.2em]">Archived Sessions</h1>
            
            <div class="flex flex-col">
                <div onclick="startFresh()" class="shard-btn primary-shard">
                    <i class="fa-solid fa-plus text-white text-sm"></i>
                    <h3 class="cinzel text-[12px] uppercase tracking-widest">New</h3>
                </div>
                <div id="btn-resume" onclick="resumeToTracker()" class="shard-btn">
                    <i class="fa-solid fa-play text-emerald-400 text-sm"></i>
                    <h3 class="cinzel text-[12px] uppercase tracking-widest">Resume</h3>
                </div>
                <div id="btn-edit" onclick="editCurrentConfig()" class="shard-btn">
                    <i class="fa-solid fa-pen-ruler text-emerald-400 text-sm"></i>
                    <h3 class="cinzel text-[12px] uppercase tracking-widest">Configure</h3>
                </div>
                <div id="btn-load-main" onclick="toggleArchiveList(true)" class="shard-btn">
                    <i class="fa-solid fa-box-archive text-slate-400 text-sm"></i>
                    <h3 class="cinzel text-[12px] uppercase tracking-widest">Load</h3>
                </div>
            </div>
        </div>
    </div>

    <main class="flex-grow flex flex-col items-center justify-start p-6 pt-12">
        <div id="calibration-shard" class="max-w-6xl w-full shard p-8 md:p-12 mb-20">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="md:col-span-3 border-b border-emerald-900/30 pb-2">
                    <span class="cinzel emerald-text text-xs uppercase tracking-widest font-black">Core_Geometry</span>
                </div>
                <div>
                    <label class="text-[10px] uppercase font-semibold text-emerald-500 mb-2 block">Wheel Architecture</label>
                    <select id="wheel-type" class="config-input" onchange="updateWheelSubtypes()">
                        <option value="EU">European (37)</option>
                        <option value="US">American (38)</option>
                        <option value="TZ">Triple Zero (39)</option>
                    </select>
                </div>
                <div><label class="text-[10px] uppercase font-semibold text-emerald-500 mb-2 block">Sub-Layout</label><select id="wheel-subtype" class="config-input"></select></div>
                <div><label class="text-[10px] uppercase font-semibold text-emerald-500 mb-2 block">Base Unit ($)</label><input type="number" id="base-unit" class="config-input" value="1" step="0.1"></div>

                <div class="md:col-span-3 border-b border-emerald-900/30 pb-2 mt-6">
                    <span class="cinzel emerald-text text-xs uppercase tracking-widest font-black">Execution_Protocols</span>
                </div>
                <div>
                    <label class="text-[10px] uppercase font-semibold text-emerald-500 mb-2 block">Main Domain</label>
                    <select id="main-domain" class="config-input" onchange="updateSubDomains()">
                        <option value="inside">Inside</option>
                        <option value="outside">Outside</option>
                        <option value="sectors">Sectors</option>
                    </select>
                </div>
                <div><label class="text-[10px] uppercase font-semibold text-emerald-500 mb-2 block">Category</label><select id="sub-domain" class="config-input" onchange="updateSubTypes()"></select></div>
                <div><label class="text-[10px] uppercase font-semibold text-emerald-500 mb-2 block">Protocol</label><select id="sub-type" class="config-input" onchange="toggleNeighborBox()"></select></div>

                <div class="md:col-span-3 mt-12">
                    <button onclick="commitAndLaunch()" class="shard-btn w-full cinzel emerald-text text-sm tracking-[0.5em] primary-shard">Initialize_Node</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBSUXdz7HqwkENhQqEJLItxYm-LAwkgbmY", authDomain: "zombielords-playhouse.firebaseapp.com", projectId: "zombielords-playhouse", storageBucket: "zombielords-playhouse.firebasestorage.app", messagingSenderId: "795162260246", appId: "1:795162260246:web:97f0361751ac1359b31637" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();

        auth.onAuthStateChanged(async user => {
            if (!user) { window.location.href = "index.html"; return; }
            document.getElementById('user-tag').innerText = user.displayName || "Wicked Soul";
            
            const activeDoc = await db.collection("users").doc(user.uid).collection("sessions").doc("active_session").get();
            const archiveSnap = await db.collection("users").doc(user.uid).collection("sessions").get();
            
            if (!activeDoc.exists) {
                document.getElementById('btn-resume').classList.add('disabled');
                document.getElementById('btn-edit').classList.add('disabled');
            }
            
            const archivesExist = archiveSnap.docs.some(doc => doc.id !== "active_session");
            if (!archivesExist) document.getElementById('btn-load-main').classList.add('disabled');

            document.getElementById('vault-modal').classList.remove('hidden');
            updateWheelSubtypes(); updateSubDomains();
        });

        function logout() { auth.signOut().then(() => { window.location.href = "index.html"; }); }

        // Core Functions (Synchronized)
        function updateWheelSubtypes() {
            const wheelMap = { EU: ["Standard", "French"], US: ["Standard"], TZ: ["Standard", "EU Layout", "US Layout"] };
            const type = document.getElementById('wheel-type').value;
            const sub = document.getElementById('wheel-subtype');
            sub.innerHTML = wheelMap[type].map(s => `<option value="${s}">${s}</option>`).join('');
        }
        function updateSubDomains() {
            const domainMap = { inside: { "Straight Up": ["Single"], "Splits": ["Standard"] }, outside: { "Even Money": ["Red/Black"] }, sectors: { "Neighbors": ["Size (S)"] } };
            const d = document.getElementById('main-domain').value;
            document.getElementById('sub-domain').innerHTML = Object.keys(domainMap[d]).map(k => `<option value="${k}">${k}</option>`).join('');
            updateSubTypes();
        }
        function updateSubTypes() { /* logic */ }
        function toggleNeighborBox() { /* logic */ }
        async function resumeToTracker() { window.location.href = "roulette.html"; }
        function startFresh() { document.getElementById('vault-modal').classList.add('hidden'); }
        async function editCurrentConfig() { 
            const doc = await db.collection("users").doc(auth.currentUser.uid).collection("sessions").doc("active_session").get();
            if(doc.exists) loadValues(doc.data());
            document.getElementById('vault-modal').classList.add('hidden'); 
        }
        function toggleArchiveList(show) { /* archive modal logic */ }
    </script>
</body>
</html>
