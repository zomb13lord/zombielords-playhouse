<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roulette Calibration | Strategic Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;600&display=swap');
        :root { --gold: #c5a059; --bg-dark: #0a0a0c; --crimson: #8b0000; }
        body { background-color: var(--bg-dark); color: #e2e8f0; font-family: 'Montserrat', sans-serif; letter-spacing: 0.05em; }
        .cinzel { font-family: 'Cinzel', serif; }
        .gold-text { color: var(--gold); text-shadow: 0 0 5px rgba(197, 160, 89, 0.3); }
        
        /* Elite Casino Shard Buttons - List Format */
        .shard-btn { 
            background: linear-gradient(145deg, #16161a, #0f0f12); 
            border: 1px solid rgba(197, 160, 89, 0.2); 
            padding: 18px 30px; 
            transition: 0.3s; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px;
            border-radius: 4px; 
            width: 100%;
            margin-bottom: 12px;
        }
        .shard-btn:not(.disabled):hover { border-color: var(--gold); background: rgba(197, 160, 89, 0.05); }
        .shard-btn.disabled { opacity: 0.2; cursor: not-allowed; pointer-events: none; }
        .shard-btn.danger-shard { border-color: rgba(139, 0, 0, 0.4); }
        .shard-btn.danger-shard:hover { border-color: var(--crimson); background: rgba(139, 0, 0, 0.05); }

        .shard { background: rgba(20, 20, 23, 0.98); border: 1px solid rgba(255, 255, 255, 0.05); }
        .config-input { background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 2px; width: 100%; outline: none; font-size: 11px; }
        label { font-size: 10px; text-transform: uppercase; font-weight: 600; color: var(--gold); margin-bottom: 8px; display: block; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="vault-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/95 backdrop-blur-md hidden">
        <div class="max-w-md w-full p-8 text-center">
            <h1 class="cinzel text-4xl gold-text mb-2 uppercase tracking-[0.2em]">Archived Sessions</h1>
            <p class="text-[10px] text-slate-500 tracking-[0.6em] mb-12 uppercase">Calibration Entry Point</p>
            
            <div class="flex flex-col">
                <div id="btn-resume" onclick="resumeToTracker()" class="shard-btn">
                    <i class="fa-solid fa-play text-gold text-sm"></i>
                    <h3 class="cinzel text-[11px] uppercase tracking-widest">Resume Session</h3>
                </div>
                <div id="btn-edit" onclick="editCurrentConfig()" class="shard-btn">
                    <i class="fa-solid fa-pen-ruler text-gold text-sm"></i>
                    <h3 class="cinzel text-[11px] uppercase tracking-widest">Edit Configuration</h3>
                </div>
                <div onclick="toggleArchiveList(true)" class="shard-btn">
                    <i class="fa-solid fa-box-archive text-slate-400 text-sm"></i>
                    <h3 class="cinzel text-[11px] uppercase tracking-widest">Load Session</h3>
                </div>
                <div onclick="startFresh()" class="shard-btn danger-shard">
                    <i class="fa-solid fa-rotate text-red-700 text-sm"></i>
                    <h3 class="cinzel text-[11px] uppercase tracking-widest text-red-500">New Session</h3>
                </div>
            </div>
        </div>
    </div>

    <div id="archive-portal" class="fixed inset-0 z-[60] flex items-center justify-center bg-black/98 hidden">
        <div class="max-w-3xl w-full p-10 shard border border-gold/20">
            <div class="flex justify-between items-center mb-10 border-b border-gold/20 pb-6">
                <h2 class="cinzel text-2xl gold-text uppercase tracking-widest">Archived Sessions</h2>
                <button onclick="toggleArchiveList(false)" class="text-slate-500 hover:text-white text-2xl">✕</button>
            </div>
            <div id="session-list" class="space-y-3 max-h-[60vh] overflow-y-auto pr-2"></div>
        </div>
    </div>

    <nav class="flex justify-between items-center mb-10 bg-black/40 p-6 border-b border-gold/10 sticky top-0 z-40">
        <h2 class="cinzel gold-text text-lg tracking-[0.3em] uppercase">Calibration</h2>
        <button onclick="window.location.href='lobby.html'" class="text-[10px] uppercase font-semibold text-slate-500">Exit</button>
    </nav>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBSUXdz7HqwkENhQqEJLItxYm-LAwkgbmY", authDomain: "zombielords-playhouse.firebaseapp.com", projectId: "zombielords-playhouse", storageBucket: "zombielords-playhouse.firebasestorage.app", messagingSenderId: "795162260246", appId: "1:795162260246:web:97f0361751ac1359b31637" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();

        async function initCalibration() {
            auth.onAuthStateChanged(async user => {
                if (!user) return;
                const doc = await db.collection("users").doc(user.uid).collection("sessions").doc("active_session").get();
                if (!doc.exists) {
                    document.getElementById('btn-resume').classList.add('disabled');
                    document.getElementById('btn-edit').classList.add('disabled');
                }
                document.getElementById('vault-modal').classList.remove('hidden');
            });
        }

        async function refreshArchiveList() {
            const listDiv = document.getElementById('session-list');
            listDiv.innerHTML = '';
            const snap = await db.collection("users").doc(auth.currentUser.uid).collection("sessions").orderBy("timestamp", "desc").get();
            
            snap.forEach(doc => {
                if(doc.id === "active_session") return;
                const d = doc.data();
                const row = document.createElement('div');
                row.className = "flex items-center justify-between p-4 bg-black/40 border border-white/5 rounded";
                
                row.innerHTML = `
                    <div class="text-left flex-grow">
                        <input type="text" id="name-${doc.id}" value="${d.name || 'Unnamed'}" readOnly 
                            onkeydown="if(event.key==='Enter') { this.blur(); finalizeNameChange('${doc.id}'); }"
                            onblur="finalizeNameChange('${doc.id}')"
                            class="bg-transparent text-gold cinzel text-sm uppercase focus:outline-none w-full cursor-default">
                    </div>
                    <div class="flex items-center gap-4 ml-4">
                        <i class="fa-solid fa-pen-to-square text-slate-600 hover:text-gold cursor-pointer text-xs" onclick="toggleEdit('${doc.id}')"></i>
                        <button onclick="loadArchive('${doc.id}')" class="cinzel text-[10px] gold-text px-4 py-1 border border-gold/30 hover:bg-gold hover:text-black transition">LOAD</button>
                        <i class="fa-solid fa-xmark text-red-900 hover:text-red-500 cursor-pointer text-lg" onclick="deleteArchive('${doc.id}')"></i>
                    </div>`;
                listDiv.appendChild(row);
            });
        }

        async function getUniqueName(name, currentId) {
            const snap = await db.collection("users").doc(auth.currentUser.uid).collection("sessions").where("name", "==", name).get();
            const filtered = snap.docs.filter(doc => doc.id !== currentId);
            if (filtered.length === 0) return name;
            const now = new Date();
            const ts = `${now.getFullYear()}${(now.getMonth()+1).toString().padStart(2,'0')}${now.getDate()}_${now.getHours()}${now.getMinutes()}`;
            return `${name}_${ts}`;
        }

        async function finalizeNameChange(id) {
            const input = document.getElementById(`name-${id}`);
            if (input.readOnly) return;
            const rawValue = input.value.trim();
            const uniqueName = await getUniqueName(rawValue, id);
            input.value = uniqueName;
            input.readOnly = true;
            input.classList.remove('border-b', 'border-gold/50');
            await db.collection("users").doc(auth.currentUser.uid).collection("sessions").doc(id).update({ name: uniqueName });
        }

        function toggleEdit(id) {
            const input = document.getElementById(`name-${id}`);
            input.readOnly = false;
            input.classList.add('border-b', 'border-gold/50');
            input.focus();
        }

        function toggleArchiveList(show) {
            document.getElementById('archive-portal').classList.toggle('hidden', !show);
            if(show) refreshArchiveList();
        }

        async function resumeToTracker() { window.location.href = "roulette.html"; }
        function startFresh() { document.getElementById('vault-modal').classList.add('hidden'); }
        async function editCurrentConfig() {
            const doc = await db.collection("users").doc(auth.currentUser.uid).collection("sessions").doc("active_session").get();
            // loadValues(doc.data()) logic would fire here
            document.getElementById('vault-modal').classList.add('hidden');
        }
        async function deleteArchive(id) { if(confirm("DELETE?")) { await db.collection("users").doc(auth.currentUser.uid).collection("sessions").doc(id).delete(); refreshArchiveList(); } }
        async function loadArchive(id) {
            const doc = await db.collection("users").doc(auth.currentUser.uid).collection("sessions").doc(id).get();
            await db.collection("users").doc(auth.currentUser.uid).collection("sessions").doc("active_session").set(doc.data());
            window.location.href = "roulette.html";
        }

        initCalibration();
    </script>
</body>
</html>
