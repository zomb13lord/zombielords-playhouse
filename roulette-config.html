<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roulette Calibration | Strategic Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;600&display=swap');
        :root { --gold: #c5a059; --bg-dark: #0a0a0c; --crimson: #8b0000; }
        body { background-color: var(--bg-dark); color: #e2e8f0; font-family: 'Montserrat', sans-serif; letter-spacing: 0.05em; }
        .cinzel { font-family: 'Cinzel', serif; }
        .gold-text { color: var(--gold); text-shadow: 0 0 5px rgba(197, 160, 89, 0.3); }
        
        /* Tactical Shard Buttons */
        .shard-btn { 
            background: linear-gradient(145deg, #16161a, #0f0f12); 
            border: 1px solid rgba(197, 160, 89, 0.2); 
            padding: 18px 30px; 
            transition: 0.3s; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px;
            border-radius: 4px; 
            width: 100%;
            margin-bottom: 12px;
        }
        .shard-btn:not(.disabled):hover { border-color: var(--gold); background: rgba(197, 160, 89, 0.05); }
        .shard-btn.disabled { opacity: 0.2; cursor: not-allowed; pointer-events: none; filter: grayscale(1); }
        
        .primary-shard { border-color: rgba(197, 160, 89, 0.6); background: rgba(197, 160, 89, 0.05); }
        .primary-shard h3 { color: #fff !important; font-weight: 800; }

        /* Configuration Grid */
        .shard { background: rgba(20, 20, 23, 0.98); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .config-input { background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 2px; width: 100%; outline: none; font-size: 11px; transition: 0.3s; }
        .config-input:focus { border-color: var(--gold); }
        label { font-size: 10px; text-transform: uppercase; font-weight: 600; color: var(--gold); margin-bottom: 8px; display: block; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="vault-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/95 backdrop-blur-md hidden">
        <div class="max-w-md w-full p-8 text-center">
            <h1 class="cinzel text-4xl gold-text mb-12 uppercase tracking-[0.2em]">Archived Sessions</h1>
            <div class="flex flex-col">
                <div onclick="startFresh()" class="shard-btn primary-shard">
                    <i class="fa-solid fa-plus text-white text-sm"></i>
                    <h3 class="cinzel text-[12px] uppercase tracking-widest">New</h3>
                </div>
                <div id="btn-resume" onclick="resumeToTracker()" class="shard-btn">
                    <i class="fa-solid fa-play text-gold text-sm"></i>
                    <h3 class="cinzel text-[12px] uppercase tracking-widest">Resume</h3>
                </div>
                <div id="btn-edit" onclick="editCurrentConfig()" class="shard-btn">
                    <i class="fa-solid fa-pen-ruler text-gold text-sm"></i>
                    <h3 class="cinzel text-[12px] uppercase tracking-widest">Configure</h3>
                </div>
                <div id="btn-load-main" onclick="toggleArchiveList(true)" class="shard-btn">
                    <i class="fa-solid fa-box-archive text-slate-400 text-sm"></i>
                    <h3 class="cinzel text-[12px] uppercase tracking-widest">Load</h3>
                </div>
            </div>
        </div>
    </div>

    <div id="archive-portal" class="fixed inset-0 z-[60] flex items-center justify-center bg-black/98 hidden">
        <div class="max-w-3xl w-full p-10 shard border border-gold/20">
            <div class="flex justify-between items-center mb-10 border-b border-gold/20 pb-6">
                <h2 class="cinzel text-2xl gold-text uppercase tracking-widest">Archived Sessions</h2>
                <button onclick="toggleArchiveList(false)" class="text-slate-500 hover:text-white text-2xl">✕</button>
            </div>
            <div id="session-list" class="space-y-3 max-h-[60vh] overflow-y-auto pr-2"></div>
        </div>
    </div>

    <nav class="flex justify-between items-center mb-10 bg-black/40 p-6 border-b border-gold/10 sticky top-0 z-40">
        <h2 class="cinzel gold-text text-lg tracking-[0.3em] uppercase">Calibration</h2>
        <button onclick="window.location.href='lobby.html'" class="text-[10px] uppercase font-semibold text-slate-500">Exit</button>
    </nav>

    <div id="calibration-shard" class="max-w-6xl mx-auto shard p-8 md:p-12">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="md:col-span-3 border-b border-white/5 pb-2"><span class="cinzel gold-text text-xs uppercase tracking-widest">Core_Geometry</span></div>
            <div>
                <label>Wheel Architecture</label>
                <select id="wheel-type" class="config-input" onchange="updateWheelSubtypes()">
                    <option value="EU">European (37)</option>
                    <option value="US">American (38)</option>
                    <option value="TZ">Triple Zero (39)</option>
                </select>
            </div>
            <div><label>Sub-Layout</label><select id="wheel-subtype" class="config-input"></select></div>
            <div><label>Base Unit ($)</label><input type="number" id="base-unit" class="config-input" value="1" step="0.1"></div>

            <div class="md:col-span-3 border-b border-white/5 pb-2 mt-6"><span class="cinzel gold-text text-xs uppercase tracking-widest">Logic_Protocols</span></div>
            <div>
                <label>Main Domain</label>
                <select id="main-domain" class="config-input" onchange="updateSubDomains()">
                    <option value="inside">Inside</option>
                    <option value="outside">Outside</option>
                    <option value="sectors">Sectors</option>
                </select>
            </div>
            <div><label>Category</label><select id="sub-domain" class="config-input" onchange="updateSubTypes()"></select></div>
            <div><label>Protocol</label><select id="sub-type" class="config-input" onchange="toggleNeighborBox()"></select></div>

            <div class="md:col-span-3 border-b border-white/5 pb-2 mt-6"><span class="cinzel gold-text text-xs uppercase tracking-widest">System_Thresholds</span></div>
            <div><label>Warmup (Spins)</label><input type="number" id="warmup-n" class="config-input" value="18"></div>
            <div><label>CD Loss Trigger</label><input type="number" id="cd-trigger-n" class="config-input" value="3"></div>
            <div><label>CD Length (Spins)</label><input type="number" id="cd-length-n" class="config-input" value="12"></div>

            <div id="neighbor-input-box" class="md:col-span-3 hidden bg-gold/5 p-4 border border-gold/10"><label>Neighbor Size (S)</label><input type="number" id="neighbor-size" class="config-input" value="1"></div>

            <div class="md:col-span-3 mt-12"><button onclick="commitAndLaunch()" class="shard-btn w-full cinzel gold-text text-sm tracking-[0.5em] border-gold/40">Initialize_Node</button></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBSUXdz7HqwkENhQqEJLItxYm-LAwkgbmY", authDomain: "zombielords-playhouse.firebaseapp.com", projectId: "zombielords-playhouse", storageBucket: "zombielords-playhouse.firebasestorage.app", messagingSenderId: "795162260246", appId: "1:795162260246:web:97f0361751ac1359b31637" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();

        const wheelMap = { EU: ["Standard", "French"], US: ["Standard"], TZ: ["Standard (Sands/Venetian)", "EU Layout", "US Layout"] };
        const domainMap = { 
            inside: { "Straight Up": ["Single Number"], "Splits": ["Standard", "Vertical"], "Streets": ["Standard", "Baskets"], "Corners": ["Standard"], "Lines": ["Standard"] }, 
            outside: { "Dozens/Columns": ["Dozens", "Columns"], "Even Money": ["Red/Black", "Odd/Even"] }, 
            sectors: { "Racetrack": ["Zero Game", "Voisins"], "Neighbors": ["Size (S)"] } 
        };

        async function initCalibration() {
            auth.onAuthStateChanged(async user => {
                if (!user) return;
                const activeDoc = await db.collection("users").doc(user.uid).collection("sessions").doc("active_session").get();
                const archiveSnap = await db.collection("users").doc(user.uid).collection("sessions").get();
                if (!activeDoc.exists) {
                    document.getElementById('btn-resume').classList.add('disabled');
                    document.getElementById('btn-edit').classList.add('disabled');
                }
                const archivesExist = archiveSnap.docs.some(doc => doc.id !== "active_session");
                if (!archivesExist) document.getElementById('btn-load-main').classList.add('disabled');
                document.getElementById('vault-modal').classList.remove('hidden');
                updateWheelSubtypes(); updateSubDomains();
            });
        }

        function updateWheelSubtypes() {
            const type = document.getElementById('wheel-type').value;
            const sub = document.getElementById('wheel-subtype');
            sub.innerHTML = wheelMap[type].map(s => `<option value="${s}">${s}</option>`).join('');
        }

        function updateSubDomains() {
            const d = document.getElementById('main-domain').value;
            document.getElementById('sub-domain').innerHTML = Object.keys(domainMap[d]).map(k => `<option value="${k}">${k}</option>`).join('');
            updateSubTypes();
        }

        function updateSubTypes() {
            const d = document.getElementById('main-domain').value;
            const s = document.getElementById('sub-domain').value;
            document.getElementById('sub-type').innerHTML = domainMap[d][s].map(t => `<option value="${t}">${t}</option>`).join('');
            toggleNeighborBox();
        }

        function toggleNeighborBox() {
            const s = document.getElementById('sub-domain').value;
            document.getElementById('neighbor-input-box').classList.toggle('hidden', s !== "Neighbors");
        }

        function loadValues(d) {
            if(!d) return;
            document.getElementById('wheel-type').value = d.wheel || "EU";
            updateWheelSubtypes();
            document.getElementById('main-domain').value = d.domain || "inside";
            updateSubDomains();
            document.getElementById('base-unit').value = d.unit || 1;
            document.getElementById('warmup-n').value = d.warmup || 18;
            document.getElementById('cd-trigger-n').value = d.cdTrigger || 3;
            document.getElementById('cd-length-n').value = d.cdLength || 12;
        }

        async function commitAndLaunch() {
            const user = auth.currentUser;
            const activeDoc = await db.collection("users").doc(user.uid).collection("sessions").doc("active_session").get();
            const config = {
                wheel: document.getElementById('wheel-type').value,
                wheelSub: document.getElementById('wheel-subtype').value,
                domain: document.getElementById('main-domain').value,
                subCategory: document.getElementById('sub-domain').value,
                protocol: document.getElementById('sub-type').value,
                unit: document.getElementById('base-unit').value,
                warmup: document.getElementById('warmup-n').value,
                cdTrigger: document.getElementById('cd-trigger-n').value,
                cdLength: document.getElementById('cd-length-n').value,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                rolls: activeDoc.exists ? activeDoc.data().rolls : []
            };
            await db.collection("users").doc(user.uid).collection("sessions").doc("active_session").set(config);
            window.location.href = "roulette.html";
        }

        // --- Archive Administrative Logic (Icon-Driven) ---
        async function refreshArchiveList() {
            const listDiv = document.getElementById('session-list');
            listDiv.innerHTML = '';
            const snap = await db.collection("users").doc(auth.currentUser.uid).collection("sessions").orderBy("timestamp", "desc").get();
            snap.forEach(doc => {
                if(doc.id === "active_session") return;
                const d = doc.data();
                const row = document.createElement('div');
                row.className = "flex items-center justify-between p-4 bg-black/40 border border-white/5 rounded";
                row.innerHTML = `<div class="text-left flex-grow"><input type="text" id="name-${doc.id}" value="${d.name || 'Unnamed'}" readOnly onkeydown="if(event.key==='Enter'){this.blur(); finalizeNameChange('${doc.id}');}" onblur="finalizeNameChange('${doc.id}')" class="bg-transparent text-gold cinzel text-sm uppercase focus:outline-none w-full cursor-default"></div><div class="flex items-center gap-4 ml-4"><i class="fa-solid fa-pen-to-square text-slate-600 hover:text-gold cursor-pointer text-xs" onclick="toggleEdit('${doc.id}')"></i><button onclick="loadArchive('${doc.id}')" class="cinzel text-[10px] gold-text px-4 py-1 border border-gold/30 hover:bg-gold hover:text-black transition">LOAD</button><i class="fa-solid fa-xmark text-red-900 hover:text-red-500 cursor-pointer text-lg" onclick="deleteArchive('${doc.id}')"></i></div>`;
                listDiv.appendChild(row);
            });
        }

        function toggleEdit(id) { const input = document.getElementById(`name-${id}`); input.readOnly = false; input.classList.add('border-b', 'border-gold/50'); input.focus(); }
        async function finalizeNameChange(id) { /* logic as previously implemented */ }
        async function loadArchive(id) {
            const doc = await db.collection("users").doc(auth.currentUser.uid).collection("sessions").doc(id).get();
            await db.collection("users").doc(auth.currentUser.uid).collection("sessions").doc("active_session").set(doc.data());
            window.location.href = "roulette.html";
        }

        async function resumeToTracker() { window.location.href = "roulette.html"; }
        function startFresh() { document.getElementById('vault-modal').classList.add('hidden'); }
        async function editCurrentConfig() { 
            const doc = await db.collection("users").doc(auth.currentUser.uid).collection("sessions").doc("active_session").get();
            loadValues(doc.data());
            document.getElementById('vault-modal').classList.add('hidden'); 
        }
        function toggleArchiveList(show) { document.getElementById('archive-portal').classList.toggle('hidden', !show); if(show) refreshArchiveList(); }

        initCalibration();
    </script>
</body>
</html>
