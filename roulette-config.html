<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roulette Calibration | Zombie Lord's</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@300;600&display=swap');
        
        :root { --gold: #c5a059; --bg-dark: #020617; --emerald: #10b981; }

        body { 
            margin: 0; padding: 0; background-color: var(--bg-dark); color: #f8fafc; 
            font-family: 'Cinzel', serif; min-height: 100vh;
            background-image: linear-gradient(to bottom, rgba(2, 6, 23, 0.4) 0%, rgba(2, 6, 23, 0.95) 100%), 
                              url('https://zomb13lord.github.io/zombielords-playhouse/background.png');
            background-size: cover; background-position: center; background-attachment: fixed;
        }

        .emerald-text { color: #10b981; text-shadow: 0 0 12px rgba(16, 185, 129, 0.4); }
        .shard { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 8px; }
        
        .config-input { 
            background-color: #0f172a; border: 1px solid #059669; color: #f8fafc; 
            padding: 10px 12px; border-radius: 6px; width: 100%; outline: none; 
            font-size: 11px; font-family: 'Montserrat', sans-serif; transition: all 0.3s ease; 
            appearance: none; 
        }
        select.config-input {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23059669' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 12px center;
            background-size: 16px; padding-right: 40px; cursor: pointer;
        }
        .config-input:focus { border-color: #10b981; box-shadow: 0 0 12px rgba(16,185,129,0.4); }

        label { font-size: 10px; text-transform: uppercase; font-weight: 600; color: #34d399; margin-bottom: 8px; display: block; letter-spacing: 0.1em; }

        .felt-btn {
            cursor: pointer; transition: all 0.15s ease-in-out;
            border: 1px solid rgba(255,255,255,0.05); user-select: none;
            position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 700; color: #fff; text-transform: uppercase;
        }
        
        .felt-selected {
            border-color: #10b981 !important; color: #fff !important;
            box-shadow: inset 0 0 15px rgba(16, 185, 129, 0.4), 0 0 10px rgba(16, 185, 129, 0.6) !important;
            background-color: rgba(16, 185, 129, 0.3) !important;
            z-index: 5;
        }

        .bg-red-felt { background-color: #7f1d1d; }
        .bg-black-felt { background-color: #000000; }
        .bg-green-felt { background-color: #065f46; }

        .shard-btn { 
            background: rgba(15, 23, 42, 0.75); border: 1px solid rgba(16, 185, 129, 0.2); 
            padding: 18px 30px; transition: 0.4s ease; cursor: pointer; border-radius: 4px; 
            display: flex; align-items: center; justify-content: center; gap: 15px; width: 100%;
        }
        .shard-btn:hover { border-color: #10b981; background: rgba(16, 185, 129, 0.1); transform: translateY(-3px); }
        .primary-shard { border-color: rgba(16, 185, 129, 0.6); background: rgba(16, 185, 129, 0.05); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex flex-col">

    <nav class="p-4 flex justify-between items-center bg-slate-950/60 backdrop-blur-xl border-b border-emerald-900/30 sticky top-0 z-[100] h-[76px]">
        <div class="flex flex-col items-center cursor-pointer" onclick="window.location.href='lobby.html'">
            <h2 class="text-sm font-black emerald-text tracking-tighter uppercase leading-none">Zombie Lord's</h2>
            <span class="text-[9px] text-slate-200 tracking-[0.4em] uppercase font-bold mt-1">Playhouse</span>
        </div>
        <div class="flex items-center gap-6">
            <span id="user-tag" class="text-[9px] tracking-[0.2em] uppercase text-emerald-500/70 font-bold hidden md:block"></span>
            <a href="archives.html" class="text-[9px] tracking-[0.2em] uppercase text-slate-400 hover:text-emerald-400 font-bold transition-all">Vault</a>
            <button onclick="auth.signOut().then(() => window.location.href='index.html')" class="text-[10px] border border-red-500/40 px-4 py-1.5 bg-red-950/30 hover:bg-red-600 hover:text-white transition-all uppercase font-black tracking-[0.2em]">Logout</button>
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-start p-4 md:p-6 pt-12">
        <div class="w-full max-w-5xl mb-20">
            
            <div class="shard p-6 md:p-8 mb-6 rounded shadow-lg">
                <div class="border-b border-emerald-900/30 pb-4 mb-6">
                    <h2 class="cinzel emerald-text text-lg uppercase tracking-widest font-black">Wheel Layout</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <label>Type</label>
                        <select id="wheel-type" class="config-input" onchange="updateWheelSubtypes()">
                            <option value="EU">European (37)</option>
                            <option value="US">American (38)</option>
                            <option value="TZ">Triple Zero (39)</option>
                        </select>
                    </div>
                    <div>
                        <label>Style</label>
                        <select id="wheel-subtype" class="config-input" onchange="evaluateLogicFlows()">
                            <option value="Standard">Standard</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="shard p-6 md:p-8 mb-6 rounded shadow-lg">
                <div class="border-b border-emerald-900/30 pb-4 mb-6">
                    <h2 class="cinzel emerald-text text-lg uppercase tracking-widest font-black">Strategy</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-6">
                    <div>
                        <label>Domain</label>
                        <select id="main-domain" class="config-input" onchange="updateSubDomains()">
                            <option value="inside">Inside</option>
                            <option value="outside">Outside</option>
                            <option value="sectors">Sectors</option>
                        </select>
                    </div>
                    <div>
                        <label>Category</label>
                        <select id="sub-domain" class="config-input" onchange="updateSubTypes()">
                            </select>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div id="type-container" class="relative">
                        <label id="type-label">Type</label>
                        <select id="sub-type" class="config-input" onchange="evaluateLogicFlows()">
                            </select>
                        <div id="dynamic-value-box" style="display: none;">
                            <input type="number" id="dynamic-type-input" class="config-input" value="1">
                        </div>
                    </div>
                    <div>
                        <label>Strategy</label>
                        <select id="strategy" class="config-input" onchange="evaluateLogicFlows()">
                            <option value="fixed">Fixed</option>
                            <option value="cold">Cold</option>
                            <option value="hot">Hot</option>
                        </select>
                    </div>
                </div>

                <div id="target-selection-box" style="display: none;" class="mt-8 bg-emerald-950/20 p-4 border border-emerald-900/30 rounded">
                    <div class="flex justify-between items-center mb-4">
                        <label id="target-selection-label" style="margin-bottom: 0;">Target Selection</label>
                        <button type="button" onclick="clearTargetSelection()" class="text-[9px] border border-red-500/40 text-red-400 px-3 py-1 bg-red-950/30 hover:bg-red-600 hover:text-white transition-all uppercase font-bold rounded">Clear All</button>
                    </div>
                    <div id="felt-board-container" class="w-full relative overflow-x-auto no-scrollbar">
                        </div>
                </div>
            </div>

            <div class="shard p-6 md:p-8 mb-6 rounded shadow-lg">
                <div class="border-b border-emerald-900/30 pb-4 mb-6">
                    <h2 class="cinzel emerald-text text-lg uppercase tracking-widest font-black">Bet Commander</h2>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-6">
                    <div><label>Warmup</label><input type="number" id="warmup-n" class="config-input" value="16"></div>
                    <div><label>Loss Trigger</label><input type="number" id="cd-trigger-n" class="config-input" value="2"></div>
                    <div><label>CD Length</label><input type="number" id="cd-length-n" class="config-input" value="6"></div>
                    <div><label>Stabilization</label><input type="number" id="stabilization-n" class="config-input" value="3"></div>
                    <div>
                        <label>Bet Prompt</label>
                        <select id="bet-prompt" class="config-input"><option value="place">Place</option><option value="avoid">Avoid</option></select>
                    </div>
                    <div>
                        <label>Lookback</label>
                        <select id="lookback-w" class="config-input">
                            <option value="short">Short</option><option value="standard">Standard</option>
                            <option value="long" selected>Long</option><option value="all">All</option>
                        </select>
                    </div>
                </div>
                
                <div id="hedge-commander-box" style="display: none;" class="grid grid-cols-2 gap-4 mt-6 pt-6 border-t border-emerald-900/20">
                    <div>
                        <label>Top Line Hedge</label>
                        <select id="hedge-commander" class="config-input"><option value="always">Always On</option><option value="dynamic">Dynamic</option></select>
                    </div>
                    <div>
                        <label>Hedge Directive</label>
                        <select id="hedge-progression" class="config-input"><option value="push">Push</option><option value="profit">Profit</option></select>
                    </div>
                </div>
            </div>

            <div class="shard p-6 md:p-8 mb-8 rounded shadow-lg">
                <div class="border-b border-emerald-900/30 pb-4 mb-6">
                    <h2 class="cinzel emerald-text text-lg uppercase tracking-widest font-black">Progression</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div><label>Base Unit ($)</label><input type="number" id="base-unit" class="config-input" value="5" step="0.1"></div>
                    <div>
                        <label>Neg. Progression</label>
                        <select id="neg-progression" class="config-input">
                            <option value="flat">Flat</option><option value="martingale" selected>Martingale</option>
                            <option value="martingale_plus">Martingale Plus</option><option value="fibonacci">Fibonacci</option>
                            <option value="dalambert">D'Alambert</option><option value="ladder">Ladder</option>
                        </select>
                    </div>
                    <div>
                        <label>Pos. Progression</label>
                        <select id="pos-progression" class="config-input"><option value="flat">Flat</option><option value="parole">Parole</option></select>
                    </div>
                </div>
            </div>

            <button id="btn-start-session" onclick="commitAndLaunch()" class="shard-btn w-full cinzel emerald-text text-xl tracking-[0.5em] primary-shard py-6 font-black">
                START SESSION
            </button>
        </div>
    </main>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBSUXdz7HqwkENhQqEJLItxYm-LAwkgbmY", authDomain: "zombielords-playhouse.firebaseapp.com", projectId: "zombielords-playhouse", storageBucket: "zombielords-playhouse.firebasestorage.app", messagingSenderId: "795162260246", appId: "1:795162260246:web:97f0361751ac1359b31637" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();

        window.activeBetTargets = new Set();
        const redNums = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];

        const domainMap = { 
            inside: { "Straight Up": ["Fixed", "Dynamic"], "Streets": ["Standard", "Top Line"], "Corners": ["Standard"], "Lines": ["Standard", "Top Line"] }, 
            outside: { "Dozens/Columns": ["Dozens", "Columns"], "Even Money": ["Red/Black", "Odd/Even", "High/Low"] }, 
            sectors: { "Racetrack": ["Zero Game", "Voisins", "Orphelins", "Tier"], "Neighbors": ["Size (S)"] } 
        };

        auth.onAuthStateChanged(user => {
            if (!user) { window.location.href = "index.html"; return; }
            document.getElementById('user-tag').innerText = user.displayName || "Wicked Soul";
            checkActiveSession();
        });

        async function checkActiveSession() {
            const doc = await db.collection("users").doc(auth.currentUser.uid).collection("sessions").doc("active_session").get();
            if(doc.exists) loadValues(doc.data());
            else bootstrapUI();
        }

        function bootstrapUI() {
            document.getElementById('main-domain').value = "inside";
            updateSubDomains();
        }

        function updateSubDomains() {
            const d = document.getElementById('main-domain').value;
            document.getElementById('sub-domain').innerHTML = Object.keys(domainMap[d]).map(k => `<option value="${k}">${k}</option>`).join('');
            updateSubTypes();
        }

        function updateSubTypes() {
            const d = document.getElementById('main-domain').value;
            const s = document.getElementById('sub-domain').value;
            document.getElementById('sub-type').innerHTML = domainMap[d][s].map(t => `<option value="${t}">${t}</option>`).join('');
            evaluateLogicFlows();
        }

        function evaluateLogicFlows() {
            const cat = document.getElementById('sub-domain').value;
            const strat = document.getElementById('strategy').value;
            const type = document.getElementById('sub-type').value;

            document.getElementById('dynamic-value-box').style.display = (cat === "Neighbors") ? 'block' : 'none';
            document.getElementById('target-selection-box').style.display = (strat === "fixed") ? 'block' : 'none';
            document.getElementById('hedge-commander-box').style.display = (type === "Top Line") ? 'grid' : 'none';

            if (strat === "fixed") renderFeltLayout();
        }

        function renderFeltLayout() {
            const container = document.getElementById('felt-board-container');
            const wheel = document.getElementById('wheel-type').value;
            container.innerHTML = '';
            
            const grid = document.createElement('div');
            grid.className = 'grid grid-cols-13 gap-1 min-w-[700px] h-[160px]';
            
            // Zeros Column
            const zeroCol = document.createElement('div');
            zeroCol.className = 'flex flex-col gap-1';
            const zeroes = wheel === 'EU' ? ['0'] : (wheel === 'US' ? ['00','0'] : ['000','00','0']);
            zeroes.forEach(z => {
                const btn = document.createElement('button');
                btn.className = 'felt-btn bg-green-felt h-full rounded';
                btn.innerText = z;
                btn.dataset.val = z;
                btn.onclick = () => toggleTarget(z);
                zeroCol.appendChild(btn);
            });
            grid.appendChild(zeroCol);

            // Numbers 1-36 mapped to 3-row columns
            const layout = [
                [3, 6, 9, 12, 15, 18, 21, 24, 27, 30, 33, 36], 
                [2, 5, 8, 11, 14, 17, 20, 23, 26, 29, 32, 35], 
                [1, 4, 7, 10, 13, 16, 19, 22, 25, 28, 31, 34]  
            ];

            for(let col = 0; col < 12; col++) {
                const colDiv = document.createElement('div');
                colDiv.className = 'flex flex-col gap-1';
                for(let row = 0; row < 3; row++) {
                    const n = layout[row][col];
                    const btn = document.createElement('button');
                    btn.className = `felt-btn flex-1 rounded ${redNums.includes(n) ? 'bg-red-felt' : 'bg-black-felt'}`;
                    btn.innerText = n;
                    btn.dataset.val = n.toString();
                    btn.onclick = () => toggleTarget(n.toString());
                    colDiv.appendChild(btn);
                }
                grid.appendChild(colDiv);
            }
            container.appendChild(grid);
            updateSelectionUI();
        }

        function toggleTarget(val) {
            if (window.activeBetTargets.has(val)) window.activeBetTargets.delete(val);
            else window.activeBetTargets.add(val);
            updateSelectionUI();
        }

        function updateSelectionUI() {
            document.querySelectorAll('.felt-btn').forEach(btn => {
                if (window.activeBetTargets.has(btn.dataset.val)) btn.classList.add('felt-selected');
                else btn.classList.remove('felt-selected');
            });
            const count = Array.from(window.activeBetTargets).length;
            document.getElementById('target-selection-label').innerText = count > 0 ? `Target Selection (${count})` : "Target Selection";
        }

        function clearTargetSelection() {
            window.activeBetTargets.clear();
            updateSelectionUI();
        }

        function loadValues(d) {
            document.getElementById('wheel-type').value = d.wheel || "US";
            document.getElementById('main-domain').value = d.domain || "inside";
            updateSubDomains();
            document.getElementById('sub-domain').value = d.subCategory || "Straight Up";
            updateSubTypes();
            document.getElementById('sub-type').value = d.protocol || "Fixed";
            document.getElementById('strategy').value = d.strategy || "fixed";
            if(d.targets) window.activeBetTargets = new Set(d.targets);
            
            document.getElementById('warmup-n').value = d.warmup || 16;
            document.getElementById('base-unit').value = d.unit || 5;
            document.getElementById('neg-progression').value = d.negProg || "martingale";
            evaluateLogicFlows();
        }

        async function commitAndLaunch() {
            const user = auth.currentUser;
            const activeDocRef = db.collection("users").doc(user.uid).collection("sessions").doc("active_session");
            const activeDoc = await activeDocRef.get();
            const existingRolls = (activeDoc.exists && activeDoc.data().rolls) ? activeDoc.data().rolls : [];

            const config = {
                uid: user.uid,
                wheel: document.getElementById('wheel-type').value,
                strategy: document.getElementById('strategy').value,
                domain: document.getElementById('main-domain').value,
                subCategory: document.getElementById('sub-domain').value,
                protocol: document.getElementById('sub-type').value,
                warmup: Number(document.getElementById('warmup-n').value),
                unit: Number(document.getElementById('base-unit').value),
                negProg: document.getElementById('neg-progression').value,
                targets: Array.from(window.activeBetTargets),
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                rolls: existingRolls,
                originId: activeDoc.exists ? (activeDoc.data().originId || null) : null
            };

            if (config.protocol === "Top Line") {
                config.hedgeCmd = document.getElementById('hedge-commander').value;
                config.hedgeProg = document.getElementById('hedge-progression').value;
            }

            await activeDocRef.set(config, { merge: true });
            window.location.href = "roulette.html";
        }
    </script>
</body>
</html>
