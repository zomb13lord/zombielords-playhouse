<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roulette Calibration | Strategic Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;600&display=swap');
        :root { --gold: #c5a059; --bg-dark: #0a0a0c; --crimson: #8b0000; }
        body { background-color: var(--bg-dark); color: #e2e8f0; font-family: 'Montserrat', sans-serif; letter-spacing: 0.05em; }
        .cinzel { font-family: 'Cinzel', serif; }
        .gold-text { color: var(--gold); text-shadow: 0 0 5px rgba(197, 160, 89, 0.3); }
        
        /* Elite Casino Shard Buttons */
        .shard-btn { background: linear-gradient(145deg, #16161a, #0f0f12); border: 1px solid rgba(197, 160, 89, 0.2); padding: 25px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; text-align: center; border-radius: 4px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .shard-btn:not(.disabled):hover { border-color: var(--gold); transform: translateY(-3px); box-shadow: 0 15px 30px rgba(197, 160, 89, 0.15); }
        .shard-btn.disabled { opacity: 0.2; cursor: not-allowed; pointer-events: none; }
        .shard-btn.danger-shard { border-color: rgba(139, 0, 0, 0.4); }
        .shard-btn.danger-shard:hover { border-color: var(--crimson); background: rgba(139, 0, 0, 0.05); }

        /* Navigation & Containers */
        .shard { background: rgba(20, 20, 23, 0.95); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .config-input { background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 2px; width: 100%; outline: none; font-size: 11px; transition: 0.3s; }
        .config-input:focus { border-color: var(--gold); }
        label { font-size: 10px; text-transform: uppercase; font-weight: 600; color: var(--gold); margin-bottom: 8px; display: block; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="vault-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/95 backdrop-blur-md hidden">
        <div class="max-w-2xl w-full p-8 text-center">
            <h1 class="cinzel text-4xl gold-text mb-2 uppercase tracking-[0.2em]">Archived Sessions</h1>
            <p class="text-[10px] text-slate-500 tracking-[0.6em] mb-12 uppercase">Strategic Data Calibration</p>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div id="btn-resume" onclick="resumeToTracker()" class="shard-btn">
                    <i class="fa-solid fa-arrow-right-to-bracket mb-3 text-gold-text text-xl"></i>
                    <h3 class="cinzel text-xs uppercase tracking-widest">Resume Active</h3>
                </div>
                <div id="btn-edit" onclick="editCurrentConfig()" class="shard-btn">
                    <i class="fa-solid fa-pen-ruler mb-3 text-gold-text text-xl"></i>
                    <h3 class="cinzel text-xs uppercase tracking-widest">Edit Configuration</h3>
                </div>
                <div onclick="toggleArchiveList(true)" class="shard-btn">
                    <i class="fa-solid fa-box-archive mb-3 text-slate-400 text-xl"></i>
                    <h3 class="cinzel text-xs uppercase tracking-widest">Load Archives</h3>
                </div>
                <div onclick="startFresh()" class="shard-btn danger-shard">
                    <i class="fa-solid fa-rotate mb-3 text-red-700 text-xl"></i>
                    <h3 class="cinzel text-xs uppercase tracking-widest text-red-500">New Trial</h3>
                </div>
            </div>
        </div>
    </div>

    <div id="archive-portal" class="fixed inset-0 z-[60] flex items-center justify-center bg-black/98 hidden">
        <div class="max-w-3xl w-full p-10 shard">
            <div class="flex justify-between items-center mb-10 border-b border-gold/20 pb-6">
                <h2 class="cinzel text-2xl gold-text uppercase tracking-widest">Stored_Nodes</h2>
                <button onclick="toggleArchiveList(false)" class="text-slate-500 hover:text-white transition text-2xl">✕</button>
            </div>
            <div id="session-list" class="space-y-4 max-h-[60vh] overflow-y-auto pr-4"></div>
        </div>
    </div>

    <nav class="flex justify-between items-center mb-10 bg-black/40 p-6 border-b border-gold/10 backdrop-blur-sm sticky top-0 z-40">
        <h2 class="cinzel gold-text text-lg tracking-[0.3em] uppercase">Calibration_Module</h2>
        <button onclick="window.location.href='lobby.html'" class="text-[10px] uppercase font-semibold text-slate-500 hover:text-white transition">Exit to Lobby</button>
    </nav>

    <div id="calibration-shard" class="max-w-6xl mx-auto shard p-8 md:p-12">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="md:col-span-3 border-b border-white/5 pb-2"><span class="cinzel gold-text text-xs uppercase tracking-widest font-black">Core_Geometry</span></div>
            <div><label>Wheel Architecture</label><select id="wheel-type" class="config-input" onchange="updateWheelSubtypes()"><option value="EU">European (37)</option><option value="US">American (38)</option><option value="TZ">Triple Zero (39)</option></select></div>
            <div><label>Sub-Layout</label><select id="wheel-subtype" class="config-input"></select></div>
            <div><label>Base Unit ($)</label><input type="number" id="base-unit" class="config-input" value="1" step="0.1"></div>

            <div class="md:col-span-3 border-b border-white/5 pb-2 mt-6"><span class="cinzel gold-text text-xs uppercase tracking-widest font-black">Execution_Protocols</span></div>
            <div><label>Bet Strategy</label><select id="strategy" class="config-input"><option value="cold">Cold Hunt</option><option value="hot">Hot Streak</option><option value="fixed">Fixed Target</option></select></div>
            <div><label>Neg. Progression</label><select id="neg-progression" class="config-input"><option value="flat">Flat</option><option value="martingale">Martingale</option></select></div>
            <div><label>Pos. Progression</label><select id="pos-progression" class="config-input"><option value="flat">Flat</option><option value="parole">Parole</option></select></div>

            <div class="md:col-span-3 mt-12"><button onclick="commitAndLaunch()" class="shard-btn w-full cinzel gold-text text-sm tracking-[0.5em] border-gold/40">Initialize_Node</button></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBSUXdz7HqwkENhQqEJLItxYm-LAwkgbmY", authDomain: "zombielords-playhouse.firebaseapp.com", projectId: "zombielords-playhouse", storageBucket: "zombielords-playhouse.firebasestorage.app", messagingSenderId: "795162260246", appId: "1:795162260246:web:97f0361751ac1359b31637" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();

        // Naming Uniqueness Protocol
        async function getUniqueName(name) {
            const snap = await db.collection("users").doc(auth.currentUser.uid).collection("sessions").where("name", "==", name).get();
            if (snap.empty) return name;
            const now = new Date();
            const ts = `[${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')}_${now.getHours().toString().padStart(2,'0')}${now.getMinutes().toString().padStart(2,'0')}]`;
            return `${name}_${ts}`;
        }

        async function initCalibration() {
            const user = auth.currentUser;
            const doc = await db.collection("users").doc(user.uid).collection("sessions").doc("active_session").get();
            if (!doc.exists) {
                document.getElementById('btn-resume').classList.add('disabled');
                document.getElementById('btn-edit').classList.add('disabled');
            }
            if (!document.referrer.includes('roulette.html') || !doc.exists) {
                document.getElementById('vault-modal').classList.remove('hidden');
            } else { loadValues(doc.data()); }
        }

        async function refreshArchiveList() {
            const listDiv = document.getElementById('session-list');
            listDiv.innerHTML = '';
            const snap = await db.collection("users").doc(auth.currentUser.uid).collection("sessions").orderBy("timestamp", "desc").get();
            
            snap.forEach(doc => {
                if(doc.id === "active_session") return;
                const d = doc.data();
                const row = document.createElement('div');
                row.className = "flex items-center justify-between p-6 bg-black/40 border border-white/5 rounded";
                row.innerHTML = `
                    <div class="flex-grow flex items-center gap-6">
                        <input type="text" id="name-${doc.id}" value="${d.name || 'Unnamed'}" readOnly 
                            onkeydown="if(event.key==='Enter') toggleEdit('${doc.id}')"
                            onblur="finalizeNameChange('${doc.id}')"
                            class="bg-transparent text-gold cinzel text-sm uppercase focus:outline-none w-1/2 cursor-default">
                        <i class="fa-solid fa-pen-to-square text-slate-600 hover:text-gold cursor-pointer" onclick="toggleEdit('${doc.id}')"></i>
                    </div>
                    <div class="flex items-center gap-6">
                        <button onclick="loadArchive('${doc.id}')" class="cinzel text-[10px] gold-text px-6 py-2 border border-gold/30 hover:bg-gold hover:text-black transition">LOAD</button>
                        <i class="fa-solid fa-xmark text-red-900 hover:text-red-500 cursor-pointer text-xl" onclick="deleteArchive('${doc.id}')"></i>
                    </div>`;
                listDiv.appendChild(row);
            });
        }

        function toggleEdit(id) {
            const input = document.getElementById(`name-${id}`);
            if (input.readOnly) {
                input.readOnly = false;
                input.focus();
                input.classList.add('border-b', 'border-gold/50');
                input.classList.remove('cursor-default');
            } else { finalizeNameChange(id); }
        }

        async function finalizeNameChange(id) {
            const input = document.getElementById(`name-${id}`);
            if (input.readOnly) return;
            input.readOnly = true;
            input.classList.remove('border-b', 'border-gold/50');
            input.classList.add('cursor-default');
            const uniqueName = await getUniqueName(input.value);
            input.value = uniqueName;
            await db.collection("users").doc(auth.currentUser.uid).collection("sessions").doc(id).update({ name: uniqueName });
        }

        async function commitAndLaunch() {
            const user = auth.currentUser;
            const currentDoc = await db.collection("users").doc(user.uid).collection("sessions").doc("active_session").get();
            const rawName = document.getElementById('name-active')?.value || "Session";
            const uniqueName = await getUniqueName(rawName);
            
            const config = {
                name: uniqueName,
                wheel: document.getElementById('wheel-type').value,
                unit: document.getElementById('base-unit').value,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                rolls: currentDoc.exists ? currentDoc.data().rolls : []
            };
            await db.collection("users").doc(user.uid).collection("sessions").doc("active_session").set(config);
            window.location.href = "roulette.html";
        }

        // Logic inherited from previous state remains operational...
        function updateWheelSubtypes() { /* logic */ }
        function loadValues(d) { /* logic */ }
        auth.onAuthStateChanged(user => { if (!user) window.location.href = "index.html"; else initCalibration(); });
    </script>
</body>
</html>
