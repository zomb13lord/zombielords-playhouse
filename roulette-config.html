<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calibration | Strategic Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --bg: #020617; --emerald: #10b981; --hazard: #ef4444; }
        body { background-color: var(--bg); background-image: linear-gradient(to bottom, rgba(2, 6, 23, 0.95), rgba(2, 6, 23, 0.99)), url('https://zomb13lord.github.io/zombielords-playhouse/background.png'); background-size: cover; background-attachment: fixed; color: #f8fafc; font-family: 'JetBrains Mono', monospace; }
        .cinzel { font-family: 'Cinzel', serif; }
        .emerald-text { color: var(--emerald); text-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }
        
        /* Tactical Shard Buttons */
        .shard-btn { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(16, 185, 129, 0.2); padding: 20px; transition: 0.3s; cursor: pointer; text-align: center; border-radius: 2px; position: relative; overflow: hidden; }
        .shard-btn:not(.disabled):hover { border-color: var(--emerald); background: rgba(16, 185, 129, 0.1); box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
        .shard-btn.disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }
        .shard-btn.danger-shard { border-color: rgba(239, 68, 68, 0.3); }
        .shard-btn.danger-shard:hover { border-color: var(--hazard); background: rgba(239, 68, 68, 0.1); box-shadow: 0 0 20px rgba(239, 68, 68, 0.2); }

        /* Configuration Styling */
        .shard { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(16, 185, 129, 0.2); backdrop-filter: blur(16px); }
        .config-input { background: rgba(0, 0, 0, 0.7); border: 1px solid rgba(16, 185, 129, 0.3); color: white; padding: 12px; border-radius: 4px; width: 100%; outline: none; font-size: 11px; }
        label { font-size: 9px; text-transform: uppercase; font-weight: bold; color: var(--emerald); margin-bottom: 8px; display: block; letter-spacing: 0.1em; }

        /* Archive Console Icons */
        .admin-icon { cursor: pointer; transition: 0.2s; padding: 8px; opacity: 0.6; }
        .admin-icon:hover { opacity: 1; transform: scale(1.1); }
        .edit-icon:hover { color: var(--emerald); }
        .delete-icon { color: var(--hazard); }
        .delete-icon:hover { text-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="vault-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/98 backdrop-blur-xl hidden">
        <div class="max-w-xl w-full p-8 text-center">
            <h1 class="cinzel text-4xl emerald-text mb-2 uppercase tracking-tighter">Vault_Access</h1>
            <p class="text-[10px] text-slate-500 tracking-[0.5em] mb-12 uppercase">Session Management Interface</p>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div id="btn-resume" onclick="resumeToTracker()" class="shard-btn">
                    <i class="fa-solid fa-play mb-3 text-emerald-500"></i>
                    <h3 class="cinzel text-sm uppercase">Resume Session</h3>
                </div>
                <div id="btn-edit" onclick="editCurrentConfig()" class="shard-btn">
                    <i class="fa-solid fa-sliders mb-3 text-emerald-500"></i>
                    <h3 class="cinzel text-sm uppercase">Edit Config</h3>
                </div>
                <div onclick="toggleArchiveList(true)" class="shard-btn">
                    <i class="fa-solid fa-database mb-3 text-slate-400"></i>
                    <h3 class="cinzel text-sm uppercase">Load Session</h3>
                </div>
                <div onclick="startFresh()" class="shard-btn danger-shard">
                    <i class="fa-solid fa-bolt mb-3 text-red-500"></i>
                    <h3 class="cinzel text-sm uppercase text-red-400">New Session</h3>
                </div>
            </div>
        </div>
    </div>

    <div id="archive-portal" class="fixed inset-0 z-[60] flex items-center justify-center bg-black/95 hidden">
        <div class="max-w-2xl w-full p-8 shard">
            <div class="flex justify-between items-center mb-6 border-b border-emerald-900/30 pb-4">
                <h2 class="cinzel text-xl emerald-text uppercase">Stored_Nodes</h2>
                <button onclick="toggleArchiveList(false)" class="text-slate-500 hover:text-white">✕</button>
            </div>
            <div id="session-list" class="space-y-4 max-h-[60vh] overflow-y-auto"></div>
        </div>
    </div>

    <nav class="flex justify-between items-center mb-8 bg-slate-950/60 p-4 border border-emerald-900/20 backdrop-blur-md sticky top-0 z-40">
        <h2 class="cinzel emerald-text text-sm tracking-widest uppercase">System_Calibration</h2>
        <button onclick="window.location.href='lobby.html'" class="text-[9px] uppercase font-bold text-slate-400">Lobby</button>
    </nav>

    <div id="calibration-shard" class="max-w-5xl mx-auto shard p-6 md:p-10">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-3 border-b border-emerald-900/30 pb-2"><span class="cinzel text-emerald-500 text-[11px] uppercase tracking-widest font-black">Core_Geometry</span></div>
            <div><label>Wheel Type</label><select id="wheel-type" class="config-input" onchange="updateWheelSubtypes()"><option value="EU">European (37)</option><option value="US">American (38)</option><option value="TZ">Triple Zero (39)</option></select></div>
            <div><label>Wheel Subtype</label><select id="wheel-subtype" class="config-input"></select></div>
            <div><label>Base Unit</label><input type="number" id="base-unit" class="config-input" value="1" step="0.1"></div>

            <div class="md:col-span-3 border-b border-emerald-900/30 pb-2 mt-4"><span class="cinzel text-emerald-500 text-[11px] uppercase tracking-widest font-black">Logic_Protocols</span></div>
            <div><label>Main Domain</label><select id="main-domain" class="config-input" onchange="updateSubDomains()"><option value="inside">Inside</option><option value="outside">Outside</option><option value="sectors">Sectors</option></select></div>
            <div><label>Category</label><select id="sub-domain" class="config-input" onchange="updateSubTypes()"></select></div>
            <div><label>Protocol</label><select id="sub-type" class="config-input" onchange="toggleNeighborBox()"></select></div>

            <div class="md:col-span-3 border-b border-emerald-900/30 pb-2 mt-4"><span class="cinzel text-emerald-500 text-[11px] uppercase tracking-widest font-black">Financial_Execution</span></div>
            <div><label>Strategy</label><select id="strategy" class="config-input"><option value="cold">Cold Hunt</option><option value="hot">Hot Streak</option><option value="fixed">Fixed Target</option></select></div>
            <div><label>Neg. Progression</label><select id="neg-progression" class="config-input"><option value="flat">Flat (None)</option><option value="martingale">Martingale</option><option value="martingale_plus">Martingale Plus</option><option value="fibonacci">Fibonacci</option><option value="dalambert">D’Alambert</option></select></div>
            <div><label>Pos. Progression</label><select id="pos-progression" class="config-input"><option value="flat">Flat (None)</option><option value="parole">Parole</option></select></div>

            <div class="md:col-span-3 border-b border-emerald-900/30 pb-2 mt-4"><span class="cinzel text-emerald-500 text-[11px] uppercase tracking-widest font-black">System_Thresholds</span></div>
            <div><label>Warmup (Spins)</label><input type="number" id="warmup-n" class="config-input" value="18"></div>
            <div><label>CD Loss Trigger</label><input type="number" id="cd-trigger-n" class="config-input" value="3"></div>
            <div><label>CD Length (Spins)</label><input type="number" id="cd-length-n" class="config-input" value="12"></div>

            <div id="neighbor-input-box" class="md:col-span-3 hidden bg-emerald-950/20 p-4 border border-emerald-900/30"><label>Neighbor Size (S)</label><input type="number" id="neighbor-size" class="config-input" value="1"></div>

            <div class="md:col-span-3 mt-8"><button onclick="commitAndLaunch()" class="shard-btn w-full tracking-[0.4em] cinzel text-emerald-500 border-emerald-500/40">Initialize_Node</button></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBSUXdz7HqwkENhQqEJLItxYm-LAwkgbmY", authDomain: "zombielords-playhouse.firebaseapp.com", projectId: "zombielords-playhouse", storageBucket: "zombielords-playhouse.firebasestorage.app", messagingSenderId: "795162260246", appId: "1:795162260246:web:97f0361751ac1359b31637" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();

        const wheelMap = { EU: ["Standard", "French"], US: ["Standard"], TZ: ["Standard (Sands/Venetian)", "EU Layout", "US Layout"] };
        const domainMap = { inside: { "Straight Up": ["Single Number"], "Splits": ["Standard", "Vertical"], "Streets": ["Standard", "Baskets"], "Corners": ["Standard"], "Lines": ["Standard"] }, outside: { "Dozens/Columns": ["Dozens", "Columns"], "Even Money": ["Red/Black", "Odd/Even"] }, sectors: { "Racetrack": ["Zero Game", "Voisins"], "Neighbors": ["Size (S)"] } };

        async function initCalibration() {
            const user = auth.currentUser;
            const doc = await db.collection("users").doc(user.uid).collection("sessions").doc("active_session").get();
            const exists = doc.exists;

            if (!exists) {
                document.getElementById('btn-resume').classList.add('disabled');
                document.getElementById('btn-edit').classList.add('disabled');
            }
            
            if (!document.referrer.includes('roulette.html') || !exists) {
                document.getElementById('vault-modal').classList.remove('hidden');
            } else {
                loadValues(doc.data());
            }
        }

        async function resumeToTracker() {
            if (document.getElementById('btn-resume').classList.contains('disabled')) return;
            window.location.href = "roulette.html";
        }

        async function editCurrentConfig() {
            if (document.getElementById('btn-edit').classList.contains('disabled')) return;
            const doc = await db.collection("users").doc(auth.currentUser.uid).collection("sessions").doc("active_session").get();
            loadValues(doc.data());
            document.getElementById('vault-modal').classList.add('hidden');
        }

        function startFresh() {
            document.getElementById('vault-modal').classList.add('hidden');
            updateWheelSubtypes(); updateSubDomains();
        }

        async function refreshArchiveList() {
            const listDiv = document.getElementById('session-list');
            listDiv.innerHTML = '';
            const snap = await db.collection("users").doc(auth.currentUser.uid).collection("sessions").orderBy("timestamp", "desc").get();
            
            snap.forEach(doc => {
                if(doc.id === "active_session") return;
                const d = doc.data();
                const row = document.createElement('div');
                row.className = "flex items-center justify-between p-4 shard border-emerald-900/30";
                row.innerHTML = `
                    <div class="flex-grow flex items-center gap-4">
                        <input type="text" id="name-${doc.id}" value="${d.name || 'Unnamed'}" readOnly 
                            class="bg-transparent text-emerald-400 cinzel text-xs uppercase border-none focus:outline-none w-1/2">
                        <i class="fa-solid fa-pencil admin-icon edit-icon" onclick="toggleEdit('${doc.id}')"></i>
                    </div>
                    <div class="flex items-center gap-4">
                        <button onclick="loadArchive('${doc.id}')" class="cinzel text-[10px] emerald-text px-4 py-1 border border-emerald-900/50 hover:bg-emerald-500 hover:text-black transition">LOAD</button>
                        <i class="fa-solid fa-xmark admin-icon delete-icon" onclick="deleteArchive('${doc.id}')"></i>
                    </div>`;
                listDiv.appendChild(row);
            });
        }

        function toggleEdit(id) {
            const input = document.getElementById(`name-${id}`);
            if (input.readOnly) {
                input.readOnly = false;
                input.classList.add('border-b', 'border-emerald-500');
                input.focus();
            } else {
                input.readOnly = true;
                input.classList.remove('border-b', 'border-emerald-500');
                db.collection("users").doc(auth.currentUser.uid).collection("sessions").doc(id).update({ name: input.value });
            }
        }

        async function deleteArchive(id) {
            if (confirm("PERMANENT_DELETE?")) {
                await db.collection("users").doc(auth.currentUser.uid).collection("sessions").doc(id).delete();
                refreshArchiveList();
            }
        }

        async function loadArchive(id) {
            const doc = await db.collection("users").doc(auth.currentUser.uid).collection("sessions").doc(id).get();
            await db.collection("users").doc(auth.currentUser.uid).collection("sessions").doc("active_session").set(doc.data());
            window.location.href = "roulette.html";
        }

        function toggleArchiveList(show) {
            document.getElementById('archive-portal').classList.toggle('hidden', !show);
            if(show) refreshArchiveList();
        }

        function updateWheelSubtypes() {
            const type = document.getElementById('wheel-type').value;
            const sub = document.getElementById('wheel-subtype');
            sub.innerHTML = wheelMap[type].map(s => `<option value="${s}">${s}</option>`).join('');
        }
        function updateSubDomains() {
            const d = document.getElementById('main-domain').value;
            document.getElementById('sub-domain').innerHTML = Object.keys(domainMap[d]).map(k => `<option value="${k}">${k}</option>`).join('');
            updateSubTypes();
        }
        function updateSubTypes() {
            const d = document.getElementById('main-domain').value;
            const s = document.getElementById('sub-domain').value;
            document.getElementById('sub-type').innerHTML = domainMap[d][s].map(t => `<option value="${t}">${t}</option>`).join('');
            toggleNeighborBox();
        }
        function toggleNeighborBox() {
            const s = document.getElementById('sub-domain').value;
            document.getElementById('neighbor-input-box').classList.toggle('hidden', s !== "Neighbors");
        }

        function loadValues(d) {
            document.getElementById('wheel-type').value = d.wheel || "EU";
            updateWheelSubtypes();
            document.getElementById('wheel-subtype').value = d.wheelSub || "Standard";
            document.getElementById('main-domain').value = d.domain || "inside";
            updateSubDomains();
            document.getElementById('sub-domain').value = d.subCategory || "Streets";
            updateSubTypes();
            document.getElementById('sub-type').value = d.protocol || "Standard";
            document.getElementById('base-unit').value = d.unit || 1;
        }

        async function commitAndLaunch() {
            const user = auth.currentUser;
            const currentDoc = await db.collection("users").doc(user.uid).collection("sessions").doc("active_session").get();
            const config = {
                wheel: document.getElementById('wheel-type').value,
                wheelSub: document.getElementById('wheel-subtype').value,
                domain: document.getElementById('main-domain').value,
                subCategory: document.getElementById('sub-domain').value,
                protocol: document.getElementById('sub-type').value,
                unit: document.getElementById('base-unit').value,
                strategy: document.getElementById('strategy').value,
                negProg: document.getElementById('neg-progression').value,
                posProg: document.getElementById('pos-progression').value,
                warmup: document.getElementById('warmup-n').value,
                cdTrigger: document.getElementById('cd-trigger-n').value,
                cdLength: document.getElementById('cd-length-n').value,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                rolls: currentDoc.exists ? currentDoc.data().rolls : []
            };
            await db.collection("users").doc(user.uid).collection("sessions").doc("active_session").set(config);
            window.location.href = "roulette.html";
        }

        auth.onAuthStateChanged(user => { if (!user) window.location.href = "index.html"; else initCalibration(); });
    </script>
</body>
</html>
