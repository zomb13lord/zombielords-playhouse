<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roulette Calibration | Zombie Lord's</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@300;600&display=swap');
        
        :root { 
            --gold: #c5a059; 
            --bg-dark: #020617; 
            --emerald: #10b981; 
        }

        body { 
            margin: 0; padding: 0;
            background-color: var(--bg-dark); 
            color: #f8fafc; 
            font-family: 'Cinzel', serif; 
            min-height: 100vh;
            background-image: linear-gradient(to bottom, rgba(2, 6, 23, 0.4) 0%, rgba(2, 6, 23, 0.95) 100%), 
                              url('https://zomb13lord.github.io/zombielords-playhouse/background.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .emerald-text { color: #10b981; text-shadow: 0 0 12px rgba(16, 185, 129, 0.4); }
        
        .shard-btn { 
            background: rgba(15, 23, 42, 0.75); 
            backdrop-filter: blur(16px);
            border: 1px solid rgba(16, 185, 129, 0.2); 
            padding: 18px 30px; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px;
            border-radius: 4px; 
            width: 100%;
            margin-bottom: 12px;
        }
        .shard-btn:hover { 
            border-color: #10b981; 
            background: rgba(16, 185, 129, 0.1);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.2);
            transform: translateY(-3px);
        }
        .primary-shard { border-color: rgba(16, 185, 129, 0.6); background: rgba(16, 185, 129, 0.05); }

        .shard { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(16, 185, 129, 0.3); }
        
        .config-input { 
            background-color: #0f172a; border: 1px solid #059669; color: #f8fafc; 
            padding: 10px 12px; border-radius: 6px; width: 100%; outline: none; 
            font-size: 11px; font-family: 'Montserrat', sans-serif; transition: all 0.3s ease; 
            appearance: none; 
        }
        select.config-input {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23059669' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 12px center;
            background-size: 16px; padding-right: 40px; cursor: pointer;
        }
        .config-input:focus { border-color: #10b981; box-shadow: 0 0 12px rgba(16,185,129,0.4); }
        
        label { font-size: 10px; text-transform: uppercase; font-weight: 600; color: #34d399; margin-bottom: 8px; display: block; letter-spacing: 0.1em; }
        .modal-offset { top: 76px; }

        /* THE UNIFIED ROULETTE FELT BOARD */
        .felt-btn {
            cursor: pointer; transition: all 0.15s ease-in-out;
            border: 1px solid rgba(255,255,255,0.05); user-select: none;
            position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 700; color: #fff; text-transform: uppercase;
        }
        @media (min-width: 768px) { .felt-btn { font-size: 12px; } }
        
        .felt-btn:hover { border-color: rgba(16, 185, 129, 0.8); z-index: 10; }
        
        .felt-selected {
            border-color: #10b981 !important; color: #fff !important;
            box-shadow: inset 0 0 15px rgba(16, 185, 129, 0.4), 0 0 10px rgba(16, 185, 129, 0.6) !important;
            opacity: 1 !important; background-color: rgba(16, 185, 129, 0.3) !important;
            z-index: 5;
        }

        .felt-dimmed { opacity: 0.2; pointer-events: none; filter: grayscale(1); }
        .bg-red-felt { background-color: #7f1d1d; }
        .bg-black-felt { background-color: #0f172a; }
        .bg-green-felt { background-color: #065f46; }
        .bg-outside-felt { background-color: rgba(30, 41, 59, 0.6); }

    </style>
</head>
<body class="flex flex-col">

    <main class="flex-grow flex flex-col items-center justify-start p-4 md:p-6 pt-12">
        <div class="w-full max-w-5xl mb-20">
            
            <div class="shard p-6 md:p-8 mb-6 rounded shadow-lg">
                <div class="border-b border-emerald-900/30 pb-4 mb-6 md:mb-8">
                    <h2 class="cinzel emerald-text text-lg uppercase tracking-widest font-black">Wheel Layout</h2>
                </div>

                    <div>
                        <label>Type</label>

                        <label>Style</label>

            </div>

            <div class="shard p-6 md:p-8 mb-6 rounded shadow-lg">
                <div class="border-b border-emerald-900/30 pb-4 mb-6 md:mb-8">
                    <h2 class="cinzel emerald-text text-lg uppercase tracking-widest font-black">Strategy</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-6">

                        <div id="dynamic-value-box" style="display: none;">
                            <input type="number" id="dynamic-type-input" class="config-input" value="1">
                        </div>
                    </div>
                    <div>
                        <label>Strategy</label>
                        <select id="strategy" class="config-input" onchange="evaluateLogicFlows()">
                            <option value="fixed">Fixed</option>
                            <option value="cold">Cold</option>
                            <option value="hot">Hot</option>
                            <option value="radar">Radar</option>
                        </select>
                    </div>
                </div>

                <div id="target-selection-box" style="display: none;" class="mt-8 bg-emerald-950/20 p-4 md:p-6 border border-emerald-900/30 rounded overflow-hidden">
                    <label id="target-selection-label" class="mb-4">Target Selection</label>
                    <input type="number" id="target-dynamic-input" style="display: none;" class="config-input mb-4" placeholder="Number of Pockets">
                    
                    <div id="felt-board-container" class="w-full relative">
                        </div>
                </div>
            </div>

            <div class="shard p-6 md:p-8 mb-6 rounded shadow-lg">
                <div class="border-b border-emerald-900/30 pb-4 mb-6 md:mb-8">
                    <h2 class="cinzel emerald-text text-lg uppercase tracking-widest font-black">Bet Commander</h2>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-6">
                    <div><label>Warmup</label><input type="number" id="warmup-n" class="config-input" value="16"></div>
                    <div><label>Loss Trigger</label><input type="number" id="cd-trigger-n" class="config-input" value="2"></div>
                    <div><label>CD Length</label><input type="number" id="cd-length-n" class="config-input" value="6"></div>
                    <div><label>Stabilization</label><input type="number" id="stabilization-n" class="config-input" value="3"></div>
                    <div>
                        <label>Bet Prompt</label>
                        <select id="bet-prompt" class="config-input"><option value="place">Place</option><option value="avoid">Avoid</option></select>
                    </div>
                    <div>
                        <label>Lookback</label>
                        <select id="lookback-w" class="config-input">
                            <option value="short">Short</option><option value="standard">Standard</option>
                            <option value="long">Long</option><option value="all">All</option>
                        </select>
                    </div>
                    
                    <div id="hedge-commander-box" style="display: none;" class="col-span-2 md:col-span-3 lg:col-span-6 bg-slate-900/60 p-4 rounded border border-emerald-900/40">
                        <label>Top Line Hedge</label>
                        <select id="hedge-commander" class="config-input"><option value="always">Always On</option><option value="dynamic">Dynamic</option></select>
                    </div>
                </div>
            </div>

            <div class="shard p-6 md:p-8 mb-8 rounded shadow-lg">
                <div class="border-b border-emerald-900/30 pb-4 mb-6 md:mb-8">
                    <h2 class="cinzel emerald-text text-lg uppercase tracking-widest font-black">Progression</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
                    <div><label>Base Unit ($)</label><input type="number" id="base-unit" class="config-input" value="5" step="0.1"></div>
                    <div>
                        <label>Neg. Progression</label>
                        <select id="neg-progression" class="config-input" onchange="evaluateLogicFlows()">
                            <option value="flat">Flat</option><option value="martingale">Martingale</option>
                            <option value="martingale_plus">Martingale Plus</option><option value="fibonacci">Fibonacci</option>
                            <option value="dalambert">D'Alambert</option><option value="ladder">Ladder</option>
                        </select>
                    </div>
                    <div>
                        <label>Pos. Progression</label>
                        <select id="pos-progression" class="config-input"><option value="flat">Flat</option><option value="parole">Parole</option></select>
                    </div>
                    <div id="hedge-progression-box" style="display: none;">
                        <label>Hedge Directive</label>
                        <select id="hedge-progression" class="config-input"><option value="push">Push</option><option value="profit">Profit</option></select>
                    </div>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6">
                    <div id="prog-multi-box" style="display: none;" class="bg-slate-900/60 p-4 rounded border border-emerald-900/40"><label>Multiplier</label><input type="number" id="prog-multi" class="config-input" value="2" step="0.1"></div>
                    <div id="prog-plus-box" style="display: none;" class="bg-slate-900/60 p-4 rounded border border-emerald-900/40"><label>Plus Mod</label><input type="number" id="prog-plus" class="config-input" value="1" step="0.1"></div>
                    <div id="prog-inc-box" style="display: none;" class="bg-slate-900/60 p-4 rounded border border-emerald-900/40"><label>Increase (Loss)</label><input type="number" id="prog-inc" class="config-input" value="1" step="1"></div>
                    <div id="prog-dec-box" style="display: none;" class="bg-slate-900/60 p-4 rounded border border-emerald-900/40"><label>Decrease (Win)</label><input type="number" id="prog-dec" class="config-input" value="1" step="1"></div>
                </div>

            <button onclick="commitAndLaunch()" class="shard-btn w-full cinzel emerald-text text-xl tracking-[0.5em] primary-shard py-6 font-black">
                START SESSION
            </button>
        </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBSUXdz7HqwkENhQqEJLItxYm-LAwkgbmY", authDomain: "zombielords-playhouse.firebaseapp.com", projectId: "zombielords-playhouse", storageBucket: "zombielords-playhouse.firebasestorage.app", messagingSenderId: "795162260246", appId: "1:795162260246:web:97f0361751ac1359b31637" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); 
        const db = firebase.firestore();

        // Target Storage Map
        window.activeBetTargets = window.activeBetTargets || new Set();

        const wheelMap = { EU: ["Standard", "La Partage"], US: ["Standard"], TZ: ["Standard (Sands/Venetian)", "EU Layout", "US Layout"] };
        const domainMap = { 
            inside: { 
                "Straight Up": ["Fixed", "Dynamic"], 
                "Splits": ["Horizontal", "Vertical", "Both"], 
                "Streets": ["Standard", "Baskets", "Top Line"], 
                "Corners": ["Standard"], 
                "Lines": ["Standard", "Full", "Top Line"] 
            }, 
            outside: { 
                "Dozens/Columns": ["Dozens", "Columns", "Both"], 
                "Even Money": ["Red/Black", "Odd/Even", "High/Low", "All"] 
            }, 
            sectors: { 
                "Racetrack": ["Zero Game", "Voisins", "Orphelins", "Tier"], 
                "Neighbors": ["Size (S)"], 
                "Heat Map": ["Dynamic"] 
            } 
        };

        // Standard Init Check
        auth.onAuthStateChanged(async user => {
            if (!user) { window.location.href = "index.html"; return; }
            document.getElementById('user-tag').innerText = user.displayName || "Wicked Soul";
            
            const activeDoc = await db.collection("users").doc(user.uid).collection("sessions").doc("active_session").get();
            const archiveSnap = await db.collection("users").doc(user.uid).collection("sessions").get();
            
            if (!activeDoc.exists && !archiveSnap.docs.some(doc => doc.id !== "active_session")) {
                document.getElementById('vault-modal').classList.add('hidden');
                loadValues(null); 
            } else {
                if (!activeDoc.exists) { document.getElementById('btn-resume').classList.add('disabled'); document.getElementById('btn-edit').classList.add('disabled'); }
                if (!archiveSnap.docs.some(doc => doc.id !== "active_session")) document.getElementById('btn-load-main').classList.add('disabled');
                document.getElementById('vault-modal').classList.remove('hidden');
            }
        });

        function logout() { auth.signOut().then(() => { window.location.href = "index.html"; }); }

        function toggleVisibility(element, show, displayType = 'block') {
            if (!element) return;
            element.style.display = show ? displayType : 'none';
        }

        function updateWheelSubtypes() {
            const type = document.getElementById('wheel-type').value;
            document.getElementById('wheel-subtype').innerHTML = wheelMap[type].map(s => `<option value="${s}">${s}</option>`).join('');
            evaluateLogicFlows();
        }

        function updateSubDomains() {
            const d = document.getElementById('main-domain').value;
            document.getElementById('sub-domain').innerHTML = Object.keys(domainMap[d]).map(k => `<option value="${k}">${k}</option>`).join('');
            updateSubTypes();
        }

        function updateSubTypes() {
            const d = document.getElementById('main-domain').value;
            const s = document.getElementById('sub-domain').value;
            document.getElementById('sub-type').innerHTML = domainMap[d][s].map(t => `<option value="${t}">${t}</option>`).join('');
            evaluateLogicFlows();
        }

        // ---------- SPATIAL LOGIC & ROULETTE FELT ----------

        // Helper: Convert Bet Identifier to literal pockets
        function getPocketsForBet(betStr, wheel) {
            if (!betStr) return [];
            if (betStr.includes('-')) {
                // Splits, Corners, Lines store as "2-5", "1-2-4-5", "1-6"
                let parts = betStr.split(' ')[1] || betStr;
                if(parts.includes('-')) {
                    const bounds = parts.split('-');
                    if(betStr.startsWith('Line')) {
                        let start = parseInt(bounds[0]);
                        return Array.from({length:6}, (_,i) => (start+i).toString());
                    }
                    return bounds;
                }
            }
            if (betStr.startsWith('Street')) {
                let start = (parseInt(betStr.replace('Street ','')) - 1) * 3 + 1;
                return [start, start+1, start+2].map(String);
            }
            if (betStr === 'Red') return [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36].map(String);
            if (betStr === 'Black') return [2,4,6,8,10,11,13,15,17,20,22,24,26,28,29,31,33,35].map(String);
            if (betStr === 'Even') return Array.from({length:18}, (_,i)=> String((i+1)*2));
            if (betStr === 'Odd') return Array.from({length:18}, (_,i)=> String((i*2)+1));
            if (betStr === 'Low') return Array.from({length:18}, (_,i)=> String(i+1));
            if (betStr === 'High') return Array.from({length:18}, (_,i)=> String(i+19));
            if (betStr.startsWith('Dozen')) {
                let d = parseInt(betStr.replace('Dozen ',''));
                let start = (d-1)*12 + 1;
                return Array.from({length:12}, (_,i)=> String(start+i));
            }
            if (betStr.startsWith('Column')) {
                let c = parseInt(betStr.replace('Column ',''));
                let colMap = {1: [1,4,7,10,13,16,19,22,25,28,31,34], 2: [2,5,8,11,14,17,20,23,26,29,32,35], 3: [3,6,9,12,15,18,21,24,27,30,33,36]};
                return colMap[c].map(String);
            }
            // Literal pockets (e.g. "0", "17", "00")
            return [betStr];
        }

        function updateSelectionUI() {
            const wheel = document.getElementById('wheel-type').value;
            
            // Clear board visuals
            document.querySelectorAll('.felt-btn').forEach(b => {
                b.classList.remove('felt-selected');
                b.dataset.selected = 'false';
            });

            let allPockets = new Set();
            
            // Highlight explicit buttons that match the active bets directly
            window.activeBetTargets.forEach(bet => {
                const exactBtn = document.querySelector(`.felt-btn[data-val="${bet}"]`);
                if (exactBtn) {
                    exactBtn.classList.add('felt-selected');
                    exactBtn.dataset.selected = 'true';
                }
                
                // Add underlying pockets to global counter set
                getPocketsForBet(bet, wheel).forEach(p => allPockets.add(p));
            });

            // Update Dynamic Counter Label
            const label = document.getElementById('target-selection-label');
            if (label) label.innerText = allPockets.size > 0 ? `Target Selection (${allPockets.size} Pockets)` : `Target Selection`;
        }

        function handleFeltClick(e, btn) {
            const wheel = document.getElementById('wheel-type').value;
            const category = document.getElementById('sub-domain').value;
            const type = document.getElementById('sub-type').value;
            const val = btn.dataset.val;
            
            let finalBetStr = val; // Default is exact button name

            const isDesktop = window.innerWidth >= 768;
            const rect = btn.getBoundingClientRect();
            const dLeft = (e.clientX - rect.left) / rect.width;
            const dTop = (e.clientY - rect.top) / rect.height;
            const dRight = 1 - dLeft;
            const dBottom = 1 - dTop;

            const isZero = (val === '0' || val === '00' || val === '000');
            const isNumber = !isNaN(val) && !isZero;

            // --- SPATIAL MAPPING LOGIC ---
            if (isNumber) {
                const n = parseInt(val);
                
                if (category === "Streets") {
                    finalBetStr = `Street ${Math.ceil(n/3)}`;
                } else if (category === "Lines") {
                    if (type === "Standard") {
                        finalBetStr = `Line ${(Math.ceil(n/6)-1)*6 + 1}-${(Math.ceil(n/6)-1)*6 + 6}`;
                    } else if (type === "Full") {
                        let isPrev = isDesktop ? dLeft < dRight : dTop < dBottom;
                        let s = Math.ceil(n/3);
                        if (isPrev && s > 1) finalBetStr = `Line ${(s-2)*3 + 1}-${(s-2)*3 + 6}`;
                        else if (s < 12) finalBetStr = `Line ${(s-1)*3 + 1}-${(s-1)*3 + 6}`;
                        else finalBetStr = `Line 31-36`; // Clamp Edge
                    }
                } else if (category === "Splits") {
                    let dH = isDesktop ? dTop : dRight;
                    let dL = isDesktop ? dBottom : dLeft;
                    let dN = isDesktop ? dRight : dBottom;
                    let dP = isDesktop ? dLeft : dTop;

                    let opts = [];
                    if (type === "Horizontal" || type === "Both") {
                        if (n <= 33) opts.push({d: dN, t: n+3});
                        if (n >= 4) opts.push({d: dP, t: n-3});
                    }
                    if (type === "Vertical" || type === "Both") {
                        if (n%3 !== 0) opts.push({d: dH, t: n+1});
                        if (n%3 !== 1) opts.push({d: dL, t: n-1});
                    }
                    if (opts.length > 0) {
                        opts.sort((a,b) => a.d - b.d);
                        let t = opts[0].t;
                        finalBetStr = `Split ${Math.min(n,t)}-${Math.max(n,t)}`;
                    }
                } else if (category === "Corners") {
                    let dTL = isDesktop ? Math.hypot(dLeft, dTop) : Math.hypot(dTop, dRight);
                    let dTR = isDesktop ? Math.hypot(dRight, dTop) : Math.hypot(dBottom, dRight);
                    let dBL = isDesktop ? Math.hypot(dLeft, dBottom) : Math.hypot(dTop, dLeft);
                    let dBR = isDesktop ? Math.hypot(dRight, dBottom) : Math.hypot(dBottom, dLeft);

                    let c = [];
                    if (n%3 !== 0 && n > 3) c.push({ d: isDesktop ? dTL : dTR, t: [n-3, n-2, n, n+1] });
                    if (n%3 !== 1 && n > 3) c.push({ d: isDesktop ? dBL : dTL, t: [n-4, n-3, n-1, n] });
                    if (n%3 !== 0 && n < 34) c.push({ d: isDesktop ? dTR : dBR, t: [n, n+1, n+3, n+4] });
                    if (n%3 !== 1 && n < 34) c.push({ d: isDesktop ? dBR : dBL, t: [n-1, n, n+2, n+3] });

                    if (c.length > 0) {
                        c.sort((a,b) => a.d - b.d);
                        finalBetStr = `Corner ${c[0].t.join('-')}`;
                    }
                }
            } else if (isZero) {
                // Zero Top Line Intercepts
                if ((category === "Streets" || category === "Lines") && type === "Top Line") {
                    finalBetStr = wheel === 'EU' ? "0-1-2-3" : (wheel === 'US' ? "0-00-1-2-3" : "0-00-000-1-2-3");
                } 
                // Zero Baskets
                else if (category === "Streets" && type === "Baskets") {
                    if (wheel === 'EU') {
                        finalBetStr = (isDesktop ? dTop < 0.5 : dRight < 0.5) ? "0-2-3" : "0-1-2";
                    } else {
                        if (val === '00') finalBetStr = (isDesktop ? dBottom < 0.5 : dRight < 0.5) ? "0-00-2" : "00-2-3";
                        else if (val === '0') finalBetStr = (isDesktop ? dTop < 0.5 : dLeft < 0.5) ? "0-00-2" : "0-1-2";
                        else finalBetStr = "000-00-3"; 
                    }
                }
                // Zero Splits
                else if (category === "Splits") {
                    if (wheel === 'EU') {
                        if (isDesktop) finalBetStr = dTop < 0.33 ? "0-3" : (dTop > 0.66 ? "0-1" : "0-2");
                        else finalBetStr = dLeft < 0.33 ? "0-1" : (dRight < 0.33 ? "0-3" : "0-2");
                    } else {
                        // For US/TZ logic fallback, attach to nearest
                        finalBetStr = `${val}-${isDesktop ? '2' : '2'}`; 
                    }
                }
            }

            // Execute Toggle
            if (window.activeBetTargets.has(finalBetStr)) window.activeBetTargets.delete(finalBetStr);
            else window.activeBetTargets.add(finalBetStr);

            updateSelectionUI();
        }

        // Generates the DOM Layout
        function renderFeltLayout(category, type, wheel) {
            const container = document.getElementById('felt-board-container');
            const newSignature = `${category}-${type}-${wheel}`;
            
            if(container.dataset.signature === newSignature) return; 
            container.dataset.signature = newSignature;
            container.innerHTML = ''; 
            
            window.activeBetTargets.clear();
            document.getElementById('target-selection-label').innerText = "Target Selection";

            const createFeltBtn = (label, bgClass, val, gridClasses = "") => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = `felt-btn ${bgClass} ${gridClasses} p-1 md:p-2 rounded`;
                btn.innerText = label;
                btn.dataset.val = val;
                btn.onclick = (e) => handleFeltClick(e, btn);
                
                // Dimming Logic: Outside buttons dimmed if Category is Inside, etc.
                if (['inside'].includes(document.getElementById('main-domain').value)) {
                    if (['Red','Black','Odd','Even','High','Low'].includes(val) || val.includes('Dozen') || val.includes('Column')) {
                        btn.classList.add('felt-dimmed');
                    }
                }
                return btn;
            };

            const redNums = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];

            // 1. Desktop Layout (14 Columns, 5 Rows)
            const desktopGrid = document.createElement('div');
            desktopGrid.className = 'hidden md:grid gap-1 mb-2';
            desktopGrid.style.gridTemplateColumns = '60px repeat(12, 1fr) 60px';
            desktopGrid.style.gridTemplateRows = 'repeat(5, 45px)';

            // Zeros (Col 1, Row 1-3)
            const zeroDivD = document.createElement('div');
            zeroDivD.className = "flex flex-col gap-1 col-start-1 row-start-1 row-span-3";
            if (wheel === 'EU') zeroDivD.appendChild(createFeltBtn('0', 'bg-green-felt', '0', 'flex-1'));
            else if (wheel === 'US') {
                zeroDivD.appendChild(createFeltBtn('00', 'bg-green-felt', '00', 'flex-1'));
                zeroDivD.appendChild(createFeltBtn('0', 'bg-green-felt', '0', 'flex-1'));
            } else {
                zeroDivD.appendChild(createFeltBtn('000', 'bg-green-felt', '000', 'flex-1'));
                zeroDivD.appendChild(createFeltBtn('00', 'bg-green-felt', '00', 'flex-1'));
                zeroDivD.appendChild(createFeltBtn('0', 'bg-green-felt', '0', 'flex-1'));
            }
            desktopGrid.appendChild(zeroDivD);

            // Numbers (Cols 2-13, Rows 1-3)
            for(let i=1; i<=36; i++) {
                const bg = redNums.includes(i) ? 'bg-red-felt' : 'bg-black-felt';
                const col = Math.ceil(i/3) + 1;
                const row = 3 - ((i-1)%3);
                desktopGrid.appendChild(createFeltBtn(i.toString(), bg, i.toString(), `col-start-${col} row-start-${row}`));
            }

            // Columns (2to1) (Col 14, Rows 1-3)
            desktopGrid.appendChild(createFeltBtn('2to1', 'bg-outside-felt', 'Column 3', 'col-start-14 row-start-1'));
            desktopGrid.appendChild(createFeltBtn('2to1', 'bg-outside-felt', 'Column 2', 'col-start-14 row-start-2'));
            desktopGrid.appendChild(createFeltBtn('2to1', 'bg-outside-felt', 'Column 1', 'col-start-14 row-start-3'));

            // Dozens (Row 4)
            desktopGrid.appendChild(createFeltBtn('1st 12', 'bg-outside-felt', 'Dozen 1', 'col-start-2 col-span-4 row-start-4'));
            desktopGrid.appendChild(createFeltBtn('2nd 12', 'bg-outside-felt', 'Dozen 2', 'col-start-6 col-span-4 row-start-4'));
            desktopGrid.appendChild(createFeltBtn('3rd 12', 'bg-outside-felt', 'Dozen 3', 'col-start-10 col-span-4 row-start-4'));

            // Even Money (Row 5)
            desktopGrid.appendChild(createFeltBtn('1-18', 'bg-outside-felt', 'Low', 'col-start-2 col-span-2 row-start-5'));
            desktopGrid.appendChild(createFeltBtn('Even', 'bg-outside-felt', 'Even', 'col-start-4 col-span-2 row-start-5'));
            desktopGrid.appendChild(createFeltBtn('Red', 'bg-red-felt', 'Red', 'col-start-6 col-span-2 row-start-5'));
            desktopGrid.appendChild(createFeltBtn('Black', 'bg-black-felt', 'Black', 'col-start-8 col-span-2 row-start-5'));
            desktopGrid.appendChild(createFeltBtn('Odd', 'bg-outside-felt', 'Odd', 'col-start-10 col-span-2 row-start-5'));
            desktopGrid.appendChild(createFeltBtn('19-36', 'bg-outside-felt', 'High', 'col-start-12 col-span-2 row-start-5'));


            // 2. Mobile Layout (6 Columns, 18 Rows)
            const mobileGrid = document.createElement('div');
            mobileGrid.className = 'grid md:hidden gap-1';
            mobileGrid.style.gridTemplateColumns = 'repeat(6, 1fr)';
            mobileGrid.style.gridAutoRows = 'minmax(40px, auto)';

            // Zeros (Row 1)
            const zeroDivM = document.createElement('div');
            zeroDivM.className = `col-span-6 grid gap-1 ${wheel === 'TZ' ? 'grid-cols-3' : (wheel === 'US' ? 'grid-cols-2' : 'grid-cols-1')}`;
            if (wheel === 'EU') zeroDivM.appendChild(createFeltBtn('0', 'bg-green-felt', '0'));
            else if (wheel === 'US') {
                zeroDivM.appendChild(createFeltBtn('00', 'bg-green-felt', '00')); zeroDivM.appendChild(createFeltBtn('0', 'bg-green-felt', '0'));
            } else {
                zeroDivM.appendChild(createFeltBtn('000', 'bg-green-felt', '000')); zeroDivM.appendChild(createFeltBtn('00', 'bg-green-felt', '00')); zeroDivM.appendChild(createFeltBtn('0', 'bg-green-felt', '0'));
            }
            mobileGrid.appendChild(zeroDivM);

            // Numbers (Rows 2-13)
            for(let i=1; i<=36; i++) {
                const bg = redNums.includes(i) ? 'bg-red-felt' : 'bg-black-felt';
                mobileGrid.appendChild(createFeltBtn(i.toString(), bg, i.toString(), 'col-span-2'));
            }

            // Columns (Row 14)
            mobileGrid.appendChild(createFeltBtn('2to1', 'bg-outside-felt', 'Column 1', 'col-span-2'));
            mobileGrid.appendChild(createFeltBtn('2to1', 'bg-outside-felt', 'Column 2', 'col-span-2'));
            mobileGrid.appendChild(createFeltBtn('2to1', 'bg-outside-felt', 'Column 3', 'col-span-2'));

            // Dozens (Row 15)
            mobileGrid.appendChild(createFeltBtn('1st 12', 'bg-outside-felt', 'Dozen 1', 'col-span-2'));
            mobileGrid.appendChild(createFeltBtn('2nd 12', 'bg-outside-felt', 'Dozen 2', 'col-span-2'));
            mobileGrid.appendChild(createFeltBtn('3rd 12', 'bg-outside-felt', 'Dozen 3', 'col-span-2'));

            // Even Money (Rows 16-18)
            mobileGrid.appendChild(createFeltBtn('1-18', 'bg-outside-felt', 'Low', 'col-span-3'));
            mobileGrid.appendChild(createFeltBtn('Even', 'bg-outside-felt', 'Even', 'col-span-3'));
            mobileGrid.appendChild(createFeltBtn('Red', 'bg-red-felt', 'Red', 'col-span-3'));
            mobileGrid.appendChild(createFeltBtn('Black', 'bg-black-felt', 'Black', 'col-span-3'));
            mobileGrid.appendChild(createFeltBtn('Odd', 'bg-outside-felt', 'Odd', 'col-span-3'));
            mobileGrid.appendChild(createFeltBtn('19-36', 'bg-outside-felt', 'High', 'col-span-3'));

            container.appendChild(desktopGrid);
            container.appendChild(mobileGrid);
        }

        // Logic Cascade Evaluator
        function evaluateLogicFlows() {
            const wheelSelect = document.getElementById('wheel-type');
            const categorySelect = document.getElementById('sub-domain');
            const typeSelect = document.getElementById('sub-type');
            const strategySelect = document.getElementById('strategy');
            const negProgSelect = document.getElementById('neg-progression');

            if(!categorySelect || !typeSelect || !strategySelect) return;

            const wheel = wheelSelect.value;
            const category = categorySelect.value;
            const type = typeSelect.value;
            const strategy = strategySelect.value;
            const negProg = negProgSelect.value;

            const typeLabel = document.getElementById('type-label');
            const dynBox = document.getElementById('dynamic-value-box');
            const targetBox = document.getElementById('target-selection-box');
            const targetLabel = document.getElementById('target-selection-label');
            
            const targetFeltBoard = document.getElementById('felt-board');
            const targetDynamicInput = document.getElementById('target-dynamic-input');
            const hedgeCmd = document.getElementById('hedge-commander-box');
            const hedgeProg = document.getElementById('hedge-progression-box');

            const pMulti = document.getElementById('prog-multi-box');
            const pPlus = document.getElementById('prog-plus-box');
            const pInc = document.getElementById('prog-inc-box');
            const pDec = document.getElementById('prog-dec-box');

            toggleVisibility(typeSelect, true);
            toggleVisibility(dynBox, false);
            toggleVisibility(targetBox, false);
            toggleVisibility(targetFeltBoard, false); 
            toggleVisibility(targetDynamicInput, false);
            toggleVisibility(hedgeCmd, false);
            toggleVisibility(hedgeProg, false);
            toggleVisibility(pMulti, false);
            toggleVisibility(pPlus, false);
            toggleVisibility(pInc, false);
            toggleVisibility(pDec, false);
            
            typeLabel.innerText = "Type";

            if (category === "Neighbors") {
                toggleVisibility(typeSelect, false);
                toggleVisibility(dynBox, true);
                typeLabel.innerText = "Neighbor Size (S)";
            } 

            let showFelt = false;
            let showDynInput = false;

            if (category === "Straight Up" && type === "Dynamic") {
                showDynInput = true;
                targetLabel.innerText = "Number of Pockets";
            } else if (strategy === "fixed" || (category === "Straight Up" && type === "Fixed")) {
                showFelt = true;
                targetLabel.innerText = "Target Selection";
                renderFeltLayout(category, type, wheel);
            }

            if (showDynInput || showFelt) {
                toggleVisibility(targetBox, true);
                toggleVisibility(targetDynamicInput, showDynInput);
                if(showFelt) { targetFeltBoard.style.display = 'block'; }
            }

            if (type === "Top Line") {
                toggleVisibility(hedgeCmd, true);
                toggleVisibility(hedgeProg, true);
            }

            switch(negProg) {
                case 'martingale':
                    toggleVisibility(pMulti, true); break;
                case 'martingale_plus':
                    toggleVisibility(pMulti, true); toggleVisibility(pPlus, true); break;
                case 'fibonacci':
                case 'dalambert':
                    toggleVisibility(pInc, true); toggleVisibility(pDec, true); break;
                case 'ladder':
                    toggleVisibility(pInc, true); break;
            }
        }

        async function resumeToTracker() { window.location.href = "roulette.html"; }
        
        function startFresh() { 
            document.getElementById('vault-modal').classList.add('hidden'); 
            loadValues(null); 
        }
        
        async function editCurrentConfig() { 
            const doc = await db.collection("users").doc(auth.currentUser.uid).collection("sessions").doc("active_session").get();
            if(doc.exists) loadValues(doc.data());
            document.getElementById('vault-modal').classList.add('hidden'); 
        }

        function loadValues(d) {
            if(!d) {
                document.getElementById('wheel-type').value = "US";
                document.getElementById('wheel-subtype').innerHTML = wheelMap["US"].map(s => `<option value="${s}">${s}</option>`).join('');
                document.getElementById('wheel-subtype').value = "Standard";
                
                document.getElementById('main-domain').value = "inside";
                document.getElementById('sub-domain').innerHTML = Object.keys(domainMap["inside"]).map(k => `<option value="${k}">${k}</option>`).join('');
                document.getElementById('sub-domain').value = "Streets";
                
                document.getElementById('sub-type').innerHTML = domainMap["inside"]["Streets"].map(t => `<option value="${t}">${t}</option>`).join('');
                document.getElementById('sub-type').value = "Top Line";
                document.getElementById('strategy').value = "cold";
                
                document.getElementById('warmup-n').value = 16;
                document.getElementById('cd-trigger-n').value = 2;
                document.getElementById('cd-length-n').value = 6;
                document.getElementById('stabilization-n').value = 3;
                document.getElementById('lookback-w').value = "long";
                document.getElementById('bet-prompt').value = "avoid";

                document.getElementById('hedge-commander').value = "always";
                document.getElementById('hedge-progression').value = "push";

                document.getElementById('base-unit').value = 5;
                document.getElementById('neg-progression').value = "martingale";
                document.getElementById('pos-progression').value = "flat";
                document.getElementById('prog-multi').value = 2;

                evaluateLogicFlows();
                return;
            }
            
            document.getElementById('wheel-type').value = d.wheel || "US";
            updateWheelSubtypes();
            document.getElementById('wheel-subtype').value = d.wheelSub || "Standard";
            
            document.getElementById('strategy').value = d.strategy || "fixed";
            document.getElementById('main-domain').value = d.domain || "inside";
            updateSubDomains();
            document.getElementById('sub-domain').value = d.subCategory || "Straight Up";
            updateSubTypes();
            
            if (d.subCategory === "Neighbors" || (d.subCategory === "Straight Up" && d.protocol === "Dynamic")) {
                document.getElementById('dynamic-type-input').value = d.dynamicValue || d.nSize || 1;
                document.getElementById('target-dynamic-input').value = d.numPockets || 1;
                document.getElementById('sub-type').value = d.protocol || "Dynamic";
            } else {
                document.getElementById('sub-type').value = d.protocol || "Fixed";
            }

            evaluateLogicFlows(); 

            if((d.strategy === "fixed" || d.protocol === "Fixed") && d.targets) {
                window.activeBetTargets = new Set(d.targets);
                updateSelectionUI();
            }
            
            document.getElementById('warmup-n').value = d.warmup || 16;
            document.getElementById('cd-trigger-n').value = d.cdTrigger || 2;
            document.getElementById('cd-length-n').value = d.cdLength || 6;
            document.getElementById('stabilization-n').value = d.stabilization || 3;
            document.getElementById('lookback-w').value = d.lookback || "long";
            document.getElementById('bet-prompt').value = d.betPrompt || "avoid";

            if (d.protocol === "Top Line") {
                document.getElementById('hedge-commander').value = d.hedgeCmd || "always";
                document.getElementById('hedge-progression').value = d.hedgeProg || "push";
            }

            document.getElementById('base-unit').value = d.unit || 5;
            document.getElementById('neg-progression').value = d.negProg || "martingale";
            document.getElementById('pos-progression').value = d.posProg || "flat";

            document.getElementById('prog-multi').value = d.pMulti || 2;
            document.getElementById('prog-plus').value = d.pPlus || 1;
            document.getElementById('prog-inc').value = d.pInc || 1;
            document.getElementById('prog-dec').value = d.pDec || 1;

            evaluateLogicFlows(); 
        }

        async function commitAndLaunch() {
            const user = auth.currentUser;
            const activeDoc = await db.collection("users").doc(user.uid).collection("sessions").doc("active_session").get();
            
            const isDynamic = (document.getElementById('sub-domain').value === "Neighbors" || 
                              (document.getElementById('sub-domain').value === "Straight Up" && document.getElementById('sub-type').value === "Dynamic"));

            const targetArray = Array.from(window.activeBetTargets);

            const config = {
                wheel: document.getElementById('wheel-type').value,
                wheelSub: document.getElementById('wheel-subtype').value,
                strategy: document.getElementById('strategy').value,
                domain: document.getElementById('main-domain').value,
                subCategory: document.getElementById('sub-domain').value,
                protocol: isDynamic ? document.getElementById('type-label').innerText : document.getElementById('sub-type').value,
                dynamicValue: document.getElementById('sub-domain').value === "Neighbors" ? document.getElementById('dynamic-type-input').value : null,
                numPockets: document.getElementById('sub-type').value === "Dynamic" ? document.getElementById('target-dynamic-input').value : null,
                targets: (document.getElementById('strategy').value === "fixed" || document.getElementById('sub-type').value === "Fixed") ? targetArray : null,
                warmup: document.getElementById('warmup-n').value,
                cdTrigger: document.getElementById('cd-trigger-n').value,
                cdLength: document.getElementById('cd-length-n').value,
                stabilization: document.getElementById('stabilization-n').value,
                lookback: document.getElementById('lookback-w').value,
                betPrompt: document.getElementById('bet-prompt').value,
                hedgeCmd: document.getElementById('sub-type').value === "Top Line" ? document.getElementById('hedge-commander').value : null,
                hedgeProg: document.getElementById('sub-type').value === "Top Line" ? document.getElementById('hedge-progression').value : null,
                unit: document.getElementById('base-unit').value,
                negProg: document.getElementById('neg-progression').value,
                posProg: document.getElementById('pos-progression').value,
                pMulti: document.getElementById('prog-multi').value,
                pPlus: document.getElementById('prog-plus').value,
                pInc: document.getElementById('prog-inc').value,
                pDec: document.getElementById('prog-dec').value,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                rolls: activeDoc.exists ? activeDoc.data().rolls : []
            };
            await db.collection("users").doc(user.uid).collection("sessions").doc("active_session").set(config);
            window.location.href = "roulette.html";
        }
    </script>
