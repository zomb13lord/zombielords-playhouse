<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roulette Calibration | Zombie Lord's</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@300;600&display=swap');
        
        :root { 
            --gold: #c5a059; 
            --bg-dark: #020617; 
            --emerald: #10b981; 
        }

        body { 
            margin: 0; padding: 0;
            background-color: var(--bg-dark); 
            color: #f8fafc; 
            font-family: 'Cinzel', serif; 
            min-height: 100vh;
            background-image: linear-gradient(to bottom, rgba(2, 6, 23, 0.4) 0%, rgba(2, 6, 23, 0.95) 100%), 
                              url('https://zomb13lord.github.io/zombielords-playhouse/background.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .emerald-text { color: #10b981; text-shadow: 0 0 12px rgba(16, 185, 129, 0.4); }
        
        .shard-btn { 
            background: rgba(15, 23, 42, 0.75); 
            backdrop-filter: blur(16px);
            border: 1px solid rgba(16, 185, 129, 0.2); 
            padding: 18px 30px; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px;
            border-radius: 4px; 
            width: 100%;
            margin-bottom: 12px;
        }
        .shard-btn:not(.disabled):hover { 
            border-color: #10b981; 
            background: rgba(16, 185, 129, 0.1);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.2);
            transform: translateY(-3px);
        }
        .shard-btn.disabled { opacity: 0.2; cursor: not-allowed; pointer-events: none; filter: grayscale(1); }
        .primary-shard { border-color: rgba(16, 185, 129, 0.6); background: rgba(16, 185, 129, 0.05); }

        .shard { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(16, 185, 129, 0.3); }
        .config-input { background: rgba(0,0,0,0.6); border: 1px solid #333; color: #fff; padding: 12px; border-radius: 2px; width: 100%; outline: none; font-size: 11px; font-family: 'Montserrat', sans-serif; transition: 0.3s; }
        .config-input:focus { border-color: var(--emerald); }
        label { font-size: 10px; text-transform: uppercase; font-weight: 600; color: var(--emerald); margin-bottom: 8px; display: block; }
        
        .modal-offset { top: 76px; }

        /* Dynamic Felt Selection Styling */
        .felt-btn {
            cursor: pointer; transition: all 0.2s ease-in-out;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .felt-btn:hover { border-color: rgba(16, 185, 129, 0.6); transform: translateY(-1px); }
        .felt-selected {
            border-color: #10b981 !important;
            color: #fff !important;
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.6) !important;
            opacity: 1 !important;
        }
    </style>
</head>
<body class="flex flex-col">

    <nav class="p-4 flex justify-between items-center bg-slate-950/60 backdrop-blur-xl border-b border-emerald-900/30 sticky top-0 z-[100] h-[76px]">
        <div class="flex flex-col items-center cursor-pointer" onclick="window.location.href='lobby.html'">
            <h2 class="text-sm font-black emerald-text tracking-tighter uppercase leading-none">Zombie Lord's</h2>
            <span class="text-[9px] text-slate-200 tracking-[0.4em] uppercase font-bold mt-1">Playhouse</span>
        </div>
        <div class="flex items-center gap-6">
            <span id="user-tag" class="text-[9px] tracking-[0.2em] uppercase text-emerald-500/70 font-bold hidden md:block"></span>
            <a href="lobby.html" class="text-[9px] tracking-[0.2em] uppercase text-slate-400 hover:text-emerald-400 font-bold transition-all">Lobby</a>
            <button onclick="logout()" class="text-[10px] border border-red-500/40 px-4 py-1.5 bg-red-950/30 hover:bg-red-600 hover:text-white transition-all uppercase font-black tracking-[0.2em]">
                Extinguish
            </button>
        </div>
    </nav>

    <div id="vault-modal" class="fixed inset-x-0 bottom-0 modal-offset z-[80] flex items-center justify-center bg-black/95 backdrop-blur-md hidden">
        <div class="max-w-md w-full p-8 text-center -mt-10">
            <h1 class="cinzel text-4xl emerald-text mb-12 uppercase tracking-[0.2em]">Archived Sessions</h1>
            <div class="flex flex-col">
                <div onclick="startFresh()" class="shard-btn primary-shard">
                    <i class="fa-solid fa-plus text-white text-sm"></i><h3 class="cinzel text-[12px] uppercase tracking-widest text-white">New</h3>
                </div>
                <div id="btn-resume" onclick="resumeToTracker()" class="shard-btn">
                    <i class="fa-solid fa-play text-emerald-400 text-sm"></i><h3 class="cinzel text-[12px] uppercase tracking-widest text-emerald-400">Resume</h3>
                </div>
                <div id="btn-edit" onclick="editCurrentConfig()" class="shard-btn">
                    <i class="fa-solid fa-pen-ruler text-emerald-400 text-sm"></i><h3 class="cinzel text-[12px] uppercase tracking-widest text-emerald-400">Configure</h3>
                </div>
                <div id="btn-load-main" onclick="toggleArchiveList(true)" class="shard-btn">
                    <i class="fa-solid fa-box-archive text-slate-400 text-sm"></i><h3 class="cinzel text-[12px] uppercase tracking-widest text-slate-300">Load</h3>
                </div>
            </div>
        </div>
    </div>

    <main class="flex-grow flex flex-col items-center justify-start p-6 pt-12">
        <div class="w-full max-w-4xl mb-20">
            
            <div class="shard p-8 mb-6 rounded shadow-lg">
                <div class="border-b border-emerald-900/30 pb-4 mb-8 flex justify-between items-center">
                    <h2 class="cinzel emerald-text text-lg uppercase tracking-widest font-black">Wheel Layout</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <label class="text-[10px] uppercase font-semibold text-slate-400 mb-2 block tracking-widest">Type</label>
                        <select id="wheel-type" class="config-input" onchange="updateWheelSubtypes()">
                            <option value="EU">European (37)</option>
                            <option value="US">American (38)</option>
                            <option value="TZ">Triple Zero (39)</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-semibold text-slate-400 mb-2 block tracking-widest">Style</label>
                        <select id="wheel-subtype" class="config-input"></select>
                    </div>
                </div>
            </div>

            <div class="shard p-8 mb-6 rounded shadow-lg">
                <div class="border-b border-emerald-900/30 pb-4 mb-8 flex justify-between items-center">
                    <h2 class="cinzel emerald-text text-lg uppercase tracking-widest font-black">Strategy</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-6">
                    <div>
                        <label class="text-[10px] uppercase font-semibold text-slate-400 mb-2 block tracking-widest">Domain</label>
                        <select id="main-domain" class="config-input" onchange="updateSubDomains()">
                            <option value="inside">Inside</option>
                            <option value="outside">Outside</option>
                            <option value="sectors">Sectors</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-semibold text-slate-400 mb-2 block tracking-widest">Category</label>
                        <select id="sub-domain" class="config-input" onchange="updateSubTypes()"></select>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div id="type-container" class="relative">
                        <label id="type-label" class="text-[10px] uppercase font-semibold text-slate-400 mb-2 block tracking-widest">Type</label>
                        <select id="sub-type" class="config-input" onchange="evaluateLogicFlows()"></select>
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-semibold text-slate-400 mb-2 block tracking-widest">Strategy</label>
                        <select id="strategy" class="config-input" onchange="evaluateLogicFlows()">
                            <option value="fixed">Fixed</option>
                            <option value="cold">Cold</option>
                            <option value="hot">Hot</option>
                            <option value="radar">Radar</option>
                        </select>
                    </div>
                </div>

                <div id="target-selection-box" class="mt-6 hidden bg-emerald-950/20 p-6 border border-emerald-900/30 rounded">
                    <label id="target-selection-label" class="text-[10px] uppercase font-semibold text-emerald-500 mb-4 block tracking-widest">Target Selection</label>
                    
                    <input type="number" id="target-dynamic-input" class="config-input border-emerald-500/50 hidden" placeholder="Enter pocket quantity (e.g. 5)">
                    
                    <div id="felt-board" class="w-full flex flex-col gap-1 hidden"></div>
                </div>
            </div>

            <div class="shard p-8 mb-6 rounded shadow-lg">
                <div class="border-b border-emerald-900/30 pb-4 mb-8 flex justify-between items-center">
                    <h2 class="cinzel emerald-text text-lg uppercase tracking-widest font-black">Bet Commander</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-6">
                    <div>
                        <label class="text-[10px] uppercase font-semibold text-slate-400 mb-2 block tracking-widest">Warmup</label>
                        <input type="number" id="warmup-n" class="config-input" value="16">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-semibold text-slate-400 mb-2 block tracking-widest">Loss Trigger</label>
                        <input type="number" id="cd-trigger-n" class="config-input" value="2">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-semibold text-slate-400 mb-2 block tracking-widest">CD Length</label>
                        <input type="number" id="cd-length-n" class="config-input" value="6">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-semibold text-slate-400 mb-2 block tracking-widest">Stabilization</label>
                        <input type="number" id="stabilization-n" class="config-input" value="3">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-semibold text-slate-400 mb-2 block tracking-widest">Bet Prompt</label>
                        <select id="bet-prompt" class="config-input">
                            <option value="place">Place</option>
                            <option value="avoid">Avoid</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-semibold text-slate-400 mb-2 block tracking-widest">Lookback</label>
                        <select id="lookback-w" class="config-input">
                            <option value="short">Short</option>
                            <option value="standard">Standard</option>
                            <option value="long">Long</option>
                            <option value="all">All</option>
                        </select>
                    </div>
                    
                    <div id="hedge-commander-box" class="hidden lg:col-span-6 bg-slate-900/40 p-3 rounded border border-emerald-900/20">
                        <label class="text-[10px] uppercase font-semibold text-emerald-500 mb-2 block tracking-widest">Top Line Hedge</label>
                        <select id="hedge-commander" class="config-input">
                            <option value="always">Always On</option>
                            <option value="dynamic">Dynamic</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="shard p-8 mb-8 rounded shadow-lg">
                <div class="border-b border-emerald-900/30 pb-4 mb-8 flex justify-between items-center">
                    <h2 class="cinzel emerald-text text-lg uppercase tracking-widest font-black">Progression</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
                    <div>
                        <label class="text-[10px] uppercase font-semibold text-slate-400 mb-2 block tracking-widest">Base Unit ($)</label>
                        <input type="number" id="base-unit" class="config-input" value="5" step="0.1">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-semibold text-slate-400 mb-2 block tracking-widest">Neg. Progression</label>
                        <select id="neg-progression" class="config-input" onchange="evaluateLogicFlows()">
                            <option value="flat">Flat</option>
                            <option value="martingale">Martingale</option>
                            <option value="martingale_plus">Martingale Plus</option>
                            <option value="fibonacci">Fibonacci</option>
                            <option value="dalambert">D'Alambert</option>
                            <option value="ladder">Ladder</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-semibold text-slate-400 mb-2 block tracking-widest">Pos. Progression</label>
                        <select id="pos-progression" class="config-input">
                            <option value="flat">Flat</option>
                            <option value="parole">Parole</option>
                        </select>
                    </div>

                    <div id="hedge-progression-box" class="hidden">
                        <label class="text-[10px] uppercase font-semibold text-emerald-500 mb-2 block tracking-widest">Hedge Directive</label>
                        <select id="hedge-progression" class="config-input">
                            <option value="push">Push</option>
                            <option value="profit">Profit</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mt-6">
                    <div id="prog-multi-box" class="hidden bg-slate-900/40 p-3 rounded border border-emerald-900/30">
                        <label class="text-[9px] uppercase font-semibold text-emerald-400 mb-2 block">Multiplier</label>
                        <input type="number" id="prog-multi" class="config-input" value="2" step="0.1">
                    </div>
                    <div id="prog-plus-box" class="hidden bg-slate-900/40 p-3 rounded border border-emerald-900/30">
                        <label class="text-[9px] uppercase font-semibold text-emerald-400 mb-2 block">Plus Mod</label>
                        <input type="number" id="prog-plus" class="config-input" value="1" step="0.1">
                    </div>
                    <div id="prog-inc-box" class="hidden bg-slate-900/40 p-3 rounded border border-emerald-900/30">
                        <label class="text-[9px] uppercase font-semibold text-emerald-400 mb-2 block">Increase (Loss)</label>
                        <input type="number" id="prog-inc" class="config-input" value="1" step="1">
                    </div>
                    <div id="prog-dec-box" class="hidden bg-slate-900/40 p-3 rounded border border-emerald-900/30">
                        <label class="text-[9px] uppercase font-semibold text-emerald-400 mb-2 block">Decrease (Win)</label>
                        <input type="number" id="prog-dec" class="config-input" value="1" step="1">
                    </div>
                </div>
            </div>

            <button onclick="commitAndLaunch()" class="shard-btn w-full cinzel emerald-text text-lg tracking-[0.5em] primary-shard py-6">
                Initialize_Node
            </button>
        </div>
    </main>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBSUXdz7HqwkENhQqEJLItxYm-LAwkgbmY", authDomain: "zombielords-playhouse.firebaseapp.com", projectId: "zombielords-playhouse", storageBucket: "zombielords-playhouse.firebasestorage.app", messagingSenderId: "795162260246", appId: "1:795162260246:web:97f0361751ac1359b31637" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); 
        const db = firebase.firestore();

        const wheelMap = { 
            EU: ["Standard", "La Partage"], 
            US: ["Standard"], 
            TZ: ["Standard (Sands/Venetian)", "EU Layout", "US Layout"] 
        };

        const domainMap = { 
            inside: { 
                "Straight Up": ["Dynamic", "Fixed"], 
                "Splits": ["Horizontal", "Vertical", "Both"], 
                "Streets": ["Standard", "Baskets", "Top Line"], 
                "Corners": ["Standard"], 
                "Lines": ["Standard", "Full", "Baskets", "Top Line"] 
            }, 
            outside: { 
                "Dozens/Columns": ["Dozens", "Columns", "Both"], 
                "Even Money": ["Red/Black", "Odd/Even", "High/Low", "All"] 
            }, 
            sectors: { 
                "Racetrack": ["Zero Game", "Voisins", "Orphelins", "Tier"], 
                "Neighbors": ["Size (S)"], 
                "Heat Map": ["Dynamic"] 
            } 
        };

        auth.onAuthStateChanged(async user => {
            if (!user) { window.location.href = "index.html"; return; }
            document.getElementById('user-tag').innerText = user.displayName || "Wicked Soul";
            
            const activeDoc = await db.collection("users").doc(user.uid).collection("sessions").doc("active_session").get();
            const archiveSnap = await db.collection("users").doc(user.uid).collection("sessions").get();
            
            const hasActive = activeDoc.exists;
            const hasArchives = archiveSnap.docs.some(doc => doc.id !== "active_session");

            if (!hasActive && !hasArchives) {
                document.getElementById('vault-modal').classList.add('hidden');
                loadValues(null); 
            } else {
                if (!hasActive) {
                    document.getElementById('btn-resume').classList.add('disabled');
                    document.getElementById('btn-edit').classList.add('disabled');
                }
                if (!hasArchives) {
                    document.getElementById('btn-load-main').classList.add('disabled');
                }
                document.getElementById('vault-modal').classList.remove('hidden');
            }
        });

        function logout() { auth.signOut().then(() => { window.location.href = "index.html"; }); }

        function updateWheelSubtypes() {
            const type = document.getElementById('wheel-type').value;
            const sub = document.getElementById('wheel-subtype');
            sub.innerHTML = wheelMap[type].map(s => `<option value="${s}">${s}</option>`).join('');
            evaluateLogicFlows();
        }

        function updateSubDomains() {
            const d = document.getElementById('main-domain').value;
            document.getElementById('sub-domain').innerHTML = Object.keys(domainMap[d]).map(k => `<option value="${k}">${k}</option>`).join('');
            updateSubTypes();
        }

        function updateSubTypes() {
            const d = document.getElementById('main-domain').value;
            const s = document.getElementById('sub-domain').value;
            document.getElementById('sub-type').innerHTML = domainMap[d][s].map(t => `<option value="${t}">${t}</option>`).join('');
            evaluateLogicFlows();
        }

        // Generate Felt Layout UI
        function renderFeltLayout(category, type, wheel) {
            const container = document.getElementById('felt-board');
            container.innerHTML = ''; 

            const createBtn = (label, bgClass, val, colSpan = "col-span-1") => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = `felt-btn ${bgClass} ${colSpan} p-3 text-white text-[10px] md:text-xs font-bold rounded opacity-50 hover:opacity-100 uppercase text-center`;
                btn.innerText = label;
                btn.dataset.val = val;
                btn.onclick = () => {
                    const isSelected = btn.dataset.selected === 'true';
                    btn.dataset.selected = !isSelected;
                    if(!isSelected) {
                        btn.classList.add('felt-selected');
                    } else {
                        btn.classList.remove('felt-selected');
                    }
                };
                return btn;
            };

            const redNums = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
            const getBg = (n) => redNums.includes(n) ? 'bg-red-800' : 'bg-slate-900';

            if (category === "Straight Up") {
                const topGrid = document.createElement('div');
                topGrid.className = `grid gap-1 mb-1 ${wheel === 'TZ' ? 'grid-cols-3' : (wheel === 'US' ? 'grid-cols-2' : 'grid-cols-1')}`;
                topGrid.appendChild(createBtn('0', 'bg-green-800', '0', 'col-span-1'));
                if(wheel === 'US' || wheel === 'TZ') topGrid.appendChild(createBtn('00', 'bg-green-800', '00', 'col-span-1'));
                if(wheel === 'TZ') topGrid.appendChild(createBtn('000', 'bg-green-800', '000', 'col-span-1'));
                container.appendChild(topGrid);

                const numGrid = document.createElement('div');
                numGrid.className = 'grid grid-cols-3 gap-1';
                for(let i=1; i<=36; i++) {
                    numGrid.appendChild(createBtn(i.toString(), getBg(i), i.toString()));
                }
                container.appendChild(numGrid);

            } else if (category === "Streets") {
                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-2 md:grid-cols-3 gap-2';
                for(let i=1; i<=12; i++) {
                    const start = (i-1)*3 + 1;
                    grid.appendChild(createBtn(`Street ${i} (${start}-${start+2})`, 'bg-slate-800', `Street ${i}`));
                }
                container.appendChild(grid);

            } else if (category === "Lines") {
                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-2 gap-2';
                for(let i=1; i<=11; i++) grid.appendChild(createBtn(`Line ${i}`, 'bg-slate-800', `Line ${i}`));
                container.appendChild(grid);

            } else if (category === "Corners") {
                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-3 gap-2';
                for(let i=1; i<=22; i++) grid.appendChild(createBtn(`Corner ${i}`, 'bg-slate-800', `Corner ${i}`));
                container.appendChild(grid);

            } else if (category === "Splits") {
                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-4 gap-2';
                for(let i=1; i<=57; i++) grid.appendChild(createBtn(`Split ${i}`, 'bg-slate-800', `Split ${i}`));
                container.appendChild(grid);

            } else if (category === "Dozens/Columns") {
                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-3 gap-2';
                ["Dozen 1", "Dozen 2", "Dozen 3", "Column 1", "Column 2", "Column 3"].forEach(opt => {
                    grid.appendChild(createBtn(opt, 'bg-slate-800', opt));
                });
                container.appendChild(grid);

            } else if (category === "Even Money") {
                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-2 md:grid-cols-3 gap-2';
                ["Red", "Black", "Odd", "Even", "High", "Low"].forEach(opt => {
                    const bg = opt === "Red" ? "bg-red-800" : (opt === "Black" ? "bg-slate-900" : "bg-slate-800");
                    grid.appendChild(createBtn(opt, bg, opt));
                });
                container.appendChild(grid);

            } else if (category === "Racetrack") {
                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-2 gap-2';
                ["Zero Game", "Voisins", "Orphelins", "Tier"].forEach(opt => {
                    grid.appendChild(createBtn(opt, 'bg-slate-800', opt));
                });
                container.appendChild(grid);
            }
        }

        function evaluateLogicFlows() {
            const wheel = document.getElementById('wheel-type').value;
            const category = document.getElementById('sub-domain').value;
            const typeSelect = document.getElementById('sub-type');
            const type = typeSelect.value;
            const strategy = document.getElementById('strategy').value;
            const negProg = document.getElementById('neg-progression').value;

            const typeLabel = document.getElementById('type-label');
            const dynBox = document.getElementById('dynamic-value-box');
            const targetBox = document.getElementById('target-selection-box');
            const targetLabel = document.getElementById('target-selection-label');
            
            const targetFeltBoard = document.getElementById('felt-board');
            const targetDynamicInput = document.getElementById('target-dynamic-input');
            const hedgeCmd = document.getElementById('hedge-commander-box');
            const hedgeProg = document.getElementById('hedge-progression-box');

            const pMulti = document.getElementById('prog-multi-box');
            const pPlus = document.getElementById('prog-plus-box');
            const pInc = document.getElementById('prog-inc-box');
            const pDec = document.getElementById('prog-dec-box');

            // Reset UI states
            typeSelect.classList.remove('hidden');
            dynBox.classList.add('hidden');
            targetBox.classList.add('hidden');
            targetFeltBoard.classList.add('hidden');
            targetDynamicInput.classList.add('hidden');
            hedgeCmd.classList.add('hidden');
            hedgeProg.classList.add('hidden');
            pMulti.classList.add('hidden'); pPlus.classList.add('hidden');
            pInc.classList.add('hidden'); pDec.classList.add('hidden');
            typeLabel.innerText = "Type";

            // Logic Intercepts
            if (category === "Neighbors") {
                typeSelect.classList.add('hidden');
                dynBox.classList.remove('hidden');
                typeLabel.innerText = "Neighbor Size (S)";
            } 

            if (category === "Straight Up" && type === "Dynamic") {
                targetBox.classList.remove('hidden');
                targetDynamicInput.classList.remove('hidden');
                targetLabel.innerText = "Number of Pockets";
            } else if (strategy === "fixed" || (category === "Straight Up" && type === "Fixed")) {
                // Spawn Felt Layout if Fixed strategy is active, OR if Straight Up -> Fixed is active
                targetBox.classList.remove('hidden');
                targetFeltBoard.classList.remove('hidden');
                targetLabel.innerText = "Target Selection";
                renderFeltLayout(category, type, wheel);
            }

            if (type === "Top Line") {
                hedgeCmd.classList.remove('hidden');
                hedgeProg.classList.remove('hidden');
            }

            switch(negProg) {
                case 'martingale':
                    pMulti.classList.remove('hidden'); break;
                case 'martingale_plus':
                    pMulti.classList.remove('hidden'); pPlus.classList.remove('hidden'); break;
                case 'fibonacci':
                case 'dalambert':
                    pInc.classList.remove('hidden'); pDec.classList.remove('hidden'); break;
                case 'ladder':
                    pInc.classList.remove('hidden'); break;
            }
        }

        async function resumeToTracker() { window.location.href = "roulette.html"; }
        
        function startFresh() { 
            document.getElementById('vault-modal').classList.add('hidden'); 
            loadValues(null); 
        }
        
        async function editCurrentConfig() { 
            const doc = await db.collection("users").doc(auth.currentUser.uid).collection("sessions").doc("active_session").get();
            if(doc.exists) loadValues(doc.data());
            document.getElementById('vault-modal').classList.add('hidden'); 
        }

        function loadValues(d) {
            if(!d) {
                // HARDCODED INITIALIZATION DEFAULTS
                document.getElementById('wheel-type').value = "US";
                updateWheelSubtypes();
                document.getElementById('wheel-subtype').value = "Standard";
                
                document.getElementById('main-domain').value = "inside";
                updateSubDomains();
                document.getElementById('sub-domain').value = "Streets";
                updateSubTypes();
                document.getElementById('sub-type').value = "Top Line";
                document.getElementById('strategy').value = "cold";
                
                document.getElementById('warmup-n').value = 16;
                document.getElementById('cd-trigger-n').value = 2;
                document.getElementById('cd-length-n').value = 6;
                document.getElementById('stabilization-n').value = 3;
                document.getElementById('bet-prompt').value = "avoid";
                document.getElementById('lookback-w').value = "long";

                document.getElementById('hedge-commander').value = "always";
                document.getElementById('hedge-progression').value = "push";

                document.getElementById('base-unit').value = 5;
                document.getElementById('neg-progression').value = "martingale";
                document.getElementById('pos-progression').value = "flat";
                document.getElementById('prog-multi').value = 2;

                evaluateLogicFlows();
                return;
            }
            
            // Standard Load Protocol
            document.getElementById('wheel-type').value = d.wheel || "US";
            updateWheelSubtypes();
            document.getElementById('wheel-subtype').value = d.wheelSub || "Standard";
            
            document.getElementById('strategy').value = d.strategy || "fixed";
            document.getElementById('main-domain').value = d.domain || "inside";
            updateSubDomains();
            document.getElementById('sub-domain').value = d.subCategory || "Straight Up";
            updateSubTypes();
            
            if (d.subCategory === "Neighbors" || (d.subCategory === "Straight Up" && d.protocol === "Dynamic")) {
                document.getElementById('dynamic-type-input').value = d.dynamicValue || d.nSize || 1;
                document.getElementById('target-dynamic-input').value = d.numPockets || 1;
                document.getElementById('sub-type').value = d.protocol || "Dynamic";
            } else {
                document.getElementById('sub-type').value = d.protocol || "Fixed";
            }

            evaluateLogicFlows(); // Render Felt UI Before Marking Selected

            if((d.strategy === "fixed" || d.protocol === "Fixed") && d.targets) {
                const btns = document.querySelectorAll('.felt-btn');
                btns.forEach(btn => { 
                    if(d.targets.includes(btn.dataset.val)) {
                        btn.dataset.selected = 'true';
                        btn.classList.add('felt-selected');
                    }
                });
            }
            
            document.getElementById('warmup-n').value = d.warmup || 16;
            document.getElementById('cd-trigger-n').value = d.cdTrigger || 2;
            document.getElementById('cd-length-n').value = d.cdLength || 6;
            document.getElementById('stabilization-n').value = d.stabilization || 3;
            document.getElementById('lookback-w').value = d.lookback || "long";
            document.getElementById('bet-prompt').value = d.betPrompt || "avoid";

            if (d.protocol === "Top Line") {
                document.getElementById('hedge-commander').value = d.hedgeCmd || "always";
                document.getElementById('hedge-progression').value = d.hedgeProg || "push";
            }

            document.getElementById('base-unit').value = d.unit || 5;
            document.getElementById('neg-progression').value = d.negProg || "martingale";
            document.getElementById('pos-progression').value = d.posProg || "flat";

            document.getElementById('prog-multi').value = d.pMulti || 2;
            document.getElementById('prog-plus').value = d.pPlus || 1;
            document.getElementById('prog-inc').value = d.pInc || 1;
            document.getElementById('prog-dec').value = d.pDec || 1;

            evaluateLogicFlows(); 
        }

        async function commitAndLaunch() {
            const user = auth.currentUser;
            const activeDoc = await db.collection("users").doc(user.uid).collection("sessions").doc("active_session").get();
            
            const isDynamic = (document.getElementById('sub-domain').value === "Neighbors" || 
                              (document.getElementById('sub-domain').value === "Straight Up" && document.getElementById('sub-type').value === "Dynamic"));

            const targetArray = Array.from(document.querySelectorAll('.felt-btn[data-selected="true"]')).map(btn => btn.dataset.val);

            const config = {
                wheel: document.getElementById('wheel-type').value,
                wheelSub: document.getElementById('wheel-subtype').value,
                strategy: document.getElementById('strategy').value,
                domain: document.getElementById('main-domain').value,
                subCategory: document.getElementById('sub-domain').value,
                protocol: isDynamic ? document.getElementById('type-label').innerText : document.getElementById('sub-type').value,
                dynamicValue: document.getElementById('sub-domain').value === "Neighbors" ? document.getElementById('dynamic-type-input').value : null,
                numPockets: document.getElementById('sub-type').value === "Dynamic" ? document.getElementById('target-dynamic-input').value : null,
                targets: (document.getElementById('strategy').value === "fixed" || document.getElementById('sub-type').value === "Fixed") ? targetArray : null,
                warmup: document.getElementById('warmup-n').value,
                cdTrigger: document.getElementById('cd-trigger-n').value,
                cdLength: document.getElementById('cd-length-n').value,
                stabilization: document.getElementById('stabilization-n').value,
                lookback: document.getElementById('lookback-w').value,
                betPrompt: document.getElementById('bet-prompt').value,
                hedgeCmd: document.getElementById('sub-type').value === "Top Line" ? document.getElementById('hedge-commander').value : null,
                hedgeProg: document.getElementById('sub-type').value === "Top Line" ? document.getElementById('hedge-progression').value : null,
                unit: document.getElementById('base-unit').value,
                negProg: document.getElementById('neg-progression').value,
                posProg: document.getElementById('pos-progression').value,
                pMulti: document.getElementById('prog-multi').value,
                pPlus: document.getElementById('prog-plus').value,
                pInc: document.getElementById('prog-inc').value,
                pDec: document.getElementById('prog-dec').value,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                rolls: activeDoc.exists ? activeDoc.data().rolls : []
            };
            await db.collection("users").doc(user.uid).collection("sessions").doc("active_session").set(config);
            window.location.href = "roulette.html";
        }
    </script>
