<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zombie Lord's Playhouse</title>
    
    <meta property="og:title" content="Zombie Lord's Playhouse">
    <meta property="og:type" content="website">
    <meta name="twitter:title" content="Zombie Lord's Playhouse">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Creepster&display=swap');

        body {
            margin: 0; 
            padding: 0; 
            height: 100dvh; /* Dynamic viewport height to lock scroll */
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Anchors content to the bottom */
            align-items: center;
            background-color: #020617;
            /* Gradient applied only to the bottom 40% for text contrast */
            background-image: linear-gradient(to bottom, rgba(0,0,0,0) 60%, rgba(0,0,0,0.85) 100%), 
                              url('https://zomb13lord.github.io/zombielords-playhouse/background.png');
            background-size: cover;
            background-position: center top; 
            background-attachment: fixed;
            font-family: 'Cinzel', serif;
            overflow: hidden; 
        }

        .gate-container {
            width: 90%; 
            max-width: 420px; 
            padding-bottom: 8vh; /* Padding from bottom screen edge */
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .bleeding-header {
            font-family: 'Creepster', system-ui;
            font-size: clamp(2.5rem, 12vw, 5rem);
            color: #ffffff; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            /* Aggressive shadow matrix for legibility without a container */
            text-shadow: 0 0 15px rgba(16, 185, 129, 0.9), 3px 3px 0px #000, -1px -1px 0px #000;
        }

        .text-shadow-heavy {
            text-shadow: 1px 1px 3px #000, 0 0 12px rgba(0,0,0,0.9);
        }

        .wicked-btn {
            background: white; 
            color: #020617; 
            font-weight: 900; 
            text-transform: uppercase;
            letter-spacing: 0.1em; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-bottom: 4px solid #94a3b8;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
        }

        .wicked-btn:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }
    </style>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBSUXdz7HqwkENhQqEJLItxYm-LAwkgbmY",
            authDomain: "zombielords-playhouse.firebaseapp.com",
            projectId: "zombielords-playhouse",
            storageBucket: "zombielords-playhouse.firebasestorage.app",
            messagingSenderId: "795162260246",
            appId: "1:795162260246:web:97f0361751ac1359b31637"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        async function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                await auth.signInWithPopup(provider);
                window.location.href = "lobby.html";
            } catch (error) {
                console.error(error);
            }
        }
    </script>
</head>
<body>
    <div class="gate-container">
        <h1 class="bleeding-header mb-1">Zombie Lord's</h1>
        <p class="text-[10px] text-emerald-400 font-bold uppercase tracking-[0.5em] mb-6 text-shadow-heavy">Playhouse</p>
        
        <p class="text-slate-300 text-[11px] italic mb-8 leading-relaxed font-serif px-2 text-shadow-heavy">
            "Kneel before <span class="text-emerald-400 font-bold">Emerald Throne</span>,<br>
            where <span class="text-emerald-500/80 uppercase font-bold">broken dreams</span> bleed into gold."
        </p>

        <button onclick="loginWithGoogle()" class="wicked-btn w-full py-4 flex items-center justify-center gap-3">
            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="16" alt="G">
            <span class="text-[12px]">Claim Your Soul</span>
        </button>

        <p class="mt-8 text-[7px] tracking-[0.5em] text-emerald-500/60 font-bold uppercase text-shadow-heavy">System M11 Active</p>
    </div>
</body>
</html>
