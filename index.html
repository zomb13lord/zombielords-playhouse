<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zombie Lord's Playhouse</title>
    
    <meta property="og:title" content="Zombie Lord's Playhouse">
    <meta property="og:type" content="website">
    <meta name="twitter:title" content="Zombie Lord's Playhouse">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Creepster&display=swap');

        body {
            margin: 0; 
            padding: 0; 
            height: 100dvh; 
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Dual-Axis Split */
            align-items: center;
            background-color: #020617;
            /* Gradient darkens top and bottom text zones, leaves center completely exposed */
            background-image: 
                linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 25%, rgba(0,0,0,0) 65%, rgba(0,0,0,0.95) 100%), 
                url('https://zomb13lord.github.io/zombielords-playhouse/background.png');
            background-size: cover;
            background-position: center top; 
            background-attachment: fixed;
            font-family: 'Cinzel', serif;
            overflow: hidden; 
        }

        .top-module {
            margin-top: 10vh;
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bottom-module {
            margin-bottom: 6vh;
            width: 90%; 
            max-width: 420px; 
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .bleeding-header {
            font-family: 'Creepster', system-ui;
            font-size: clamp(3rem, 14vw, 5.5rem);
            color: #ffffff; 
            text-transform: uppercase; 
            letter-spacing: 3px;
            line-height: 1.1;
            /* High-Intensity Shadow Matrix */
            text-shadow: 
                0 0 25px rgba(16, 185, 129, 0.9), 
                0 0 10px rgba(16, 185, 129, 0.6), 
                4px 4px 0px #000, 
                -2px -2px 0px #000;
            animation: pulse-glow 3s infinite alternate;
        }

        @keyframes pulse-glow {
            0% { text-shadow: 0 0 15px rgba(16, 185, 129, 0.6), 4px 4px 0px #000; }
            100% { text-shadow: 0 0 35px rgba(16, 185, 129, 1), 0 0 15px rgba(16, 185, 129, 0.8), 4px 4px 0px #000; }
        }

        .text-shadow-heavy {
            text-shadow: 2px 2px 5px #000, 0 0 15px rgba(0,0,0,0.9), 0 0 30px rgba(0,0,0,1);
        }

        .wicked-btn {
            background: linear-gradient(180deg, #064e3b 0%, #022c22 100%); /* Deep Obsidian/Emerald */
            color: #a7f3d0; /* Pale glowing green */
            font-weight: 900; 
            text-transform: uppercase;
            letter-spacing: 0.15em; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #10b981;
            border-bottom: 3px solid #047857;
            border-radius: 6px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.8), inset 0 1px 1px rgba(16, 185, 129, 0.4);
        }

        .wicked-btn:hover {
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.5), inset 0 1px 1px rgba(16, 185, 129, 0.6);
            border-color: #34d399;
            color: #ffffff;
        }

        .wicked-btn:active {
            transform: translateY(2px);
            border-bottom-width: 1px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }
    </style>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBSUXdz7HqwkENhQqEJLItxYm-LAwkgbmY",
            authDomain: "zombielords-playhouse.firebaseapp.com",
            projectId: "zombielords-playhouse",
            storageBucket: "zombielords-playhouse.firebasestorage.app",
            messagingSenderId: "795162260246",
            appId: "1:795162260246:web:97f0361751ac1359b31637"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        async function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                await auth.signInWithPopup(provider);
                window.location.href = "lobby.html";
            } catch (error) {
                console.error("Authentication Error:", error);
            }
        }
    </script>
</head>
<body>
    
    <div class="top-module">
        <h1 class="bleeding-header">Zombie<br>Lord's</h1>
        <p class="text-[12px] text-emerald-400 font-bold uppercase tracking-[0.8em] mt-3 text-shadow-heavy">Playhouse</p>
    </div>

    <div class="bottom-module">
        <p class="text-slate-300 text-[12px] italic mb-8 leading-relaxed font-serif px-2 text-shadow-heavy">
            "Humble yourself before the <span class="text-emerald-400 font-bold">Emerald Throne</span>, upon which the <span class="text-emerald-500/80 uppercase font-bold">Zombie Lord</span> reigns.<br>
            Surrender your fate to the odds of the damned."
        </p>

        <button onclick="loginWithGoogle()" class="wicked-btn w-full py-4 flex items-center justify-center gap-3">
            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="16" alt="G" style="filter: brightness(0) invert(1) opacity(0.8);">
            <span class="text-[13px]">Accept The Odds</span>
        </button>

        <p class="mt-8 text-[8px] tracking-[0.6em] text-emerald-500/40 font-bold uppercase text-shadow-heavy">System M11 Active</p>
    </div>

</body>
</html>
